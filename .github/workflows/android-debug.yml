name: android-debug

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      # ✅ (추가) Yarn/Gradle 캐시
      - name: Cache Yarn
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/yarn
            ~/.yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install deps
        run: npm install

      - name: Fetch entry-offline source (git clone)
        run: |
          set -Eeuo pipefail
          rm -rf entry-offline || true
          git clone --depth 1 https://github.com/entrylabs/entry-offline.git entry-offline

          echo "== entry-offline top =="
          ls -la entry-offline | head -n 50 || true

          echo "== find main.html =="
          find entry-offline -type f -name "main.html" -print | head -n 50 || true

      # ✅ 추가: Linux(case-sensitive)에서 ./components/Index import 깨지는 문제 자동 보정
      - name: Patch entry-offline import casing (Index -> index)
        run: |
          set -Eeuo pipefail

          rm -f entry-offline/src/renderer/components/Index.tsx \
                entry-offline/src/renderer/components/Index.ts \
                entry-offline/src/renderer/components/Index.jsx \
                entry-offline/src/renderer/components/Index.js || true

          TARGET="entry-offline/src/renderer/renderEntry.tsx"
          if [ -f "$TARGET" ]; then
            sed -i 's#\./components/Index#./components/index#g' "$TARGET"
            sed -i 's#\./components/Index\.tsx#./components/index.tsx#g' "$TARGET" || true
            echo "PATCHED: $TARGET"
            grep -n "components/index" "$TARGET" || true
          else
            echo "ERROR: not found: $TARGET"
            exit 1
          fi

          grep -RIn --exclude-dir=node_modules "components/Index" entry-offline/src/renderer || true
          if grep -RIn --exclude-dir=node_modules "components/Index" entry-offline/src/renderer >/dev/null 2>&1; then
            find entry-offline/src/renderer -type f \( -name '*.ts' -o -name '*.tsx' -o -name '*.js' -o -name '*.jsx' \) -print0 \
              | xargs -0 sed -i 's#\./components/Index#./components/index#g'
            echo "PATCHED: renderer sources (bulk)"
          fi

          ls -la entry-offline/src/renderer/components | head -n 200 || true
          test ! -f entry-offline/src/renderer/components/Index.tsx || (echo "Index.tsx still exists" && exit 1)

      # ✅ entry-offline renderer_build 생성 시도 (Node18 OpenSSL 이슈 대응 포함)
      - name: Build entry-offline renderer bundles (try)
        run: |
          set -Eeuo pipefail
          corepack enable || true

          echo "== yarn install (entry-offline) =="
          yarn --cwd entry-offline install --frozen-lockfile || yarn --cwd entry-offline install

          echo "== try webpack build with openssl legacy provider (Node18 fix) =="
          set +e
          NODE_OPTIONS="--openssl-legacy-provider" yarn --cwd entry-offline webpack
          code=$?
          set -e

          if [ $code -ne 0 ]; then
            echo "WARN: entry-offline webpack build failed, but renderer_build might already exist in repo."
          fi

          echo "== find renderer_build output =="
          find entry-offline -maxdepth 8 -type d -name "renderer_build" -print | head -n 20 || true
          find entry-offline -maxdepth 10 -type f -name "init.bundle.js" -print | head -n 20 || true
          find entry-offline -maxdepth 10 -type f -name "render.bundle.js" -print | head -n 20 || true

          test -f entry-offline/src/renderer_build/init.bundle.js
          test -f entry-offline/src/renderer_build/render.bundle.js

      - name: Fetch assets into www
        run: |
          set -Eeuo pipefail
          bash scripts/fetch_entry_assets.sh
          du -sh www || true
          ls -la www | head -n 80 || true
          - name: Replace broken PNGs with 1x1 transparent fallback (safe)
        run: |
          set -Eeuo pipefail
          sudo apt-get update -y
          sudo apt-get install -y imagemagick

          # 1x1 투명 PNG 생성
          mkdir -p www/images
          convert -size 1x1 xc:none PNG32:www/images/__transparent_1x1.png

          # 깨진 png(너무 작은 파일) -> 투명 1x1로 교체
          find www -type f -name "*.png" -size -200c ! -path "*/__transparent_1x1.png" -print0 \
            | while IFS= read -r -d '' f; do
                echo "REPLACE broken tiny png: $f"
                cp -f "www/images/__transparent_1x1.png" "$f"
              done

      # ✅✅ 핵심: ./images (루트) 가 생겼으면 www/images 로 넣어 “www안에 images 없음” 해결
      - name: Ensure images folder is under www/images
        run: |
          set -Eeuo pipefail

          if [ -d "./images" ] && [ ! -d "www/images" ]; then
            echo "FOUND ./images (root). Copy -> www/images"
            mkdir -p www/images
            cp -a ./images/. www/images/
          fi

          if [ -d "./images" ] && [ -d "www/images" ]; then
            # 둘 다 있으면 덮어쓰기 형태로 병합 (누락 방지)
            echo "MERGE ./images -> www/images"
            cp -a ./images/. www/images/ || true
          fi

          echo "== www/images top =="
          ls -la www/images | head -n 80 || true
          test -d www/images || (echo "ERROR: www/images still missing" && exit 1)

      # ✅ entry-offline 리소스 + 번들만 복사 (index.html 덮어쓰기 금지)
      - name: Copy entry-offline resources into www (keep index.html)
        run: |
          set -Eeuo pipefail

          test -f www/index.html
          echo "OK: using existing www/index.html"

          if [ -d "entry-offline/src/renderer/resources" ]; then
            mkdir -p "www/renderer/resources"
            cp -a "entry-offline/src/renderer/resources/." "www/renderer/resources/"
            echo "COPIED: renderer/resources"
          fi

          RB="$(find entry-offline -maxdepth 10 -type d -name "renderer_build" | head -n 1 || true)"
          if [ -n "$RB" ] && [ -d "$RB" ]; then
            mkdir -p "www/renderer_build"
            cp -a "$RB/." "www/renderer_build/"
            echo "COPIED: $RB -> www/renderer_build"
          else
            echo "ERROR: renderer_build not found"
            exit 1
          fi

          echo "== verify bundles =="
          test -f "www/renderer_build/init.bundle.js"
          test -f "www/renderer_build/render.bundle.js"

      # ✅ 존재하는 entry 이미지 경로 확인(레포마다 다름)
      - name: Debug list candidate entry image dirs
        run: |
          set -Eeuo pipefail
          echo "== candidate dirs =="
          for d in \
            "www/lib/@entrylabs/entry/images" \
            "www/lib/entry/images" \
            "www/lib/entry-js/images" \
            "www/lib/entryjs/images" \
            "www/lib/entry-js/dist/images" \
            "www/images"
          do
            if [ -d "$d" ]; then
              echo "FOUND: $d"
              ls -la "$d" | head -n 20 || true
            else
              echo "MISS : $d"
            fi
          done

      # ✅✅ SVG -> PNG 변환 (존재하는 폴더만)
      - name: Convert SVG to PNG (auto-detect dirs)
        run: |
          set -Eeuo pipefail
          sudo apt-get update -y
          sudo apt-get install -y librsvg2-bin

          dirs=()
          for d in \
            "www/images" \
            "www/lib/@entrylabs/entry/images" \
            "www/lib/entry/images" \
            "www/lib/entry-js/images" \
            "www/lib/entryjs/images"
          do
            if [ -d "$d" ]; then dirs+=("$d"); fi
          done

          echo "SVG scan dirs: ${dirs[*]:-(none)}"
          if [ "${#dirs[@]}" -eq 0 ]; then
            echo "No svg dirs found; skip"
            exit 0
          fi

          for d in "${dirs[@]}"; do
            find "$d" -type f -name "*.svg" -print0 | while IFS= read -r -d '' f; do
              out="${f%.svg}.png"
              if [ ! -f "$out" ]; then
                rsvg-convert "$f" -o "$out" || true
              fi
            done
          done

          echo "SVG total:"; find "${dirs[@]}" -type f -name "*.svg" | wc -l || true
          echo "PNG total:"; find "${dirs[@]}" -type f -name "*.png" | wc -l || true

      # ✅✅✅ .svg 참조를 전부 .png로 변경 (병렬 멀티프로세스)
      - name: Rewrite ALL .svg refs to .png in www (js/css/html) - parallel
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          import os, re
          from multiprocessing import Pool, cpu_count

          ROOT="www"
          exts=(".js",".css",".html")

          # 안전하게: "경로.svg" -> "경로.png" (쿼리/따옴표/괄호/공백 등 경계 처리)
          pat = re.compile(r'((?:https?://[^"\'\)\s]+/)?(?:/|\./|\.\./)?[A-Za-z0-9_\-./]+)\.svg(\b|[?#"\'\)\s])', re.I)

          files=[]
          for dp,_,fns in os.walk(ROOT):
            for fn in fns:
              if fn.endswith(exts):
                files.append(os.path.join(dp,fn))

          def work(p):
            try:
              b=open(p,"rb").read()
            except:
              return (p,0,0)
            s=b.decode("utf-8","ignore")
            ns, n = pat.subn(r'\1.png\2', s)
            if n:
              open(p,"wb").write(ns.encode("utf-8"))
              return (p,1,n)
            return (p,0,0)

          P = min(max(cpu_count()-1,1), 8)  # 과병렬 방지
          changed_files=0
          changed_refs=0
          with Pool(P) as pool:
            for _,fchg,n in pool.imap_unordered(work, files, chunksize=50):
              changed_files += fchg
              changed_refs += n

          print(f"[rewrite-svg-parallel] files_changed={changed_files} refs_changed={changed_refs} scanned_files={len(files)} procs={P}")
          PY

      # ✅✅✅✅ PNG 재인코딩 (broken skip + 병렬 + 과병렬 방지)
      - name: Re-encode ALL PNGs for Android WebView (skip broken, parallel)
        run: |
          set -Eeuo pipefail
          sudo apt-get update -y
          sudo apt-get install -y imagemagick

          # 병렬 너무 크게 잡으면 I/O 병목으로 더 느려질 수 있음 → 4~8 권장
          P="$(nproc)"
          if [ "$P" -gt 8 ]; then P=8; fi

          # convert 자체 멀티스레드까지 합쳐지면 과부하 → 제한
          export MAGICK_THREAD_LIMIT=1

          find www -type f -name "*.png" -size +0c -print0 \
            | xargs -0 -n 1 -P "$P" bash -lc '
                f="$1"
                tmp="${f}.tmp"
                convert "$f" -strip -define png:color-type=6 -define png:bit-depth=8 PNG32:"$tmp" 2>/dev/null \
                  && mv "$tmp" "$f" \
                  || { rm -f "$tmp"; echo "SKIP (broken): $f"; }
              ' _

      - name: Ensure Android platform
        run: |
          set -Eeuo pipefail
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Copy web assets to Android
        run: |
          set -Eeuo pipefail
          npx cap sync android
          npx cap copy android
          du -sh android/app/src/main/assets/public || true
          ls -la android/app/src/main/assets/public | head -n 80 || true
          echo "== check images in android assets =="
          ls -la android/app/src/main/assets/public/images | head -n 40 || true
          echo "== check lib in android assets =="
          ls -la android/app/src/main/assets/public/lib | head -n 40 || true

      - name: Allow cleartext localhost (for http scheme)
        run: |
          set -Eeuo pipefail
          MAN="android/app/src/main/AndroidManifest.xml"
          test -f "$MAN"
          if ! grep -q 'usesCleartextTraffic="true"' "$MAN"; then
            sed -i 's/<application /<application android:usesCleartextTraffic="true" /' "$MAN"
          fi
          grep -n 'usesCleartextTraffic' "$MAN" || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Build Debug APK
        run: |
          set -Eeuo pipefail
          cd android
          ./gradlew assembleDebug

      - name: Inspect APK contents (must include renderer_build + images)
        run: |
          set -Eeuo pipefail
          APK="android/app/build/outputs/apk/debug/app-debug.apk"
          test -f "$APK"

          echo "== renderer_build inside apk =="
          unzip -l "$APK" | grep -E "assets/public/renderer_build/(init|render)\.bundle\.js" || true

          echo "== image count inside apk =="
          unzip -l "$APK" | grep -E "assets/public/images/" | wc -l || true

          echo "== png count inside apk =="
          unzip -l "$APK" | grep -E "\.png$" | wc -l || true

          echo "== sample: ai_hand_icon (svg/png) in apk =="
          unzip -l "$APK" | grep -E "assets/public/images/block_icon/ai_hand_icon\.(svg|png)" || true

      - name: Cleanup old artifacts (keep latest 1)
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const name = "app-debug";

            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner, repo, per_page: 100 }
            );

            const list = artifacts
              .filter(a => a.name === name && !a.expired)
              .sort((a,b) => new Date(a.created_at) - new Date(b.created_at));

            const toDelete = list.slice(0, Math.max(0, list.length - 1));
            for (const a of toDelete) {
              await github.rest.actions.deleteArtifact({ owner, repo, artifact_id: a.id });
            }

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1
