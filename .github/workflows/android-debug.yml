name: Build Entry Offline Editor APK (Debug)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Debug repo structure
        run: |
          echo PWD
          pwd
          echo LIST
          ls -al
          echo WORKFLOWS
          ls -al .github/workflows || true
          echo SCRIPTS
          ls -al scripts || true
          echo WWW
          ls -al www || true
          echo PACKAGE_JSON
          cat package.json || true
          echo CAP_CONFIG
          ls -al capacitor.config.* || true
          cat capacitor.config.json 2>/dev/null || true

      - name: Install deps
        run: |
          npm install

      - name: Make fetch script executable
        run: |
          chmod +x scripts/fetch_entry_assets.sh

      - name: Fetch Entry assets into www/lib
        run: |
          npm run fetch

      - name: Add & Sync Android (Capacitor)
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Generate App Icon
        run: |
          npm install -D @capacitor/assets
          mkdir -p assets
          curl -L "https://img.kkomaweb.com/api/image?id=cK9YkGqw&name=1000025550.png" -o assets/logo.png
          npx @capacitor/assets generate --android
          npx cap sync android

      - name: Build Debug APK
        working-directory: android
        run: |
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: entry-offline-editor-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
