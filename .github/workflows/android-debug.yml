name: android-debug

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Cache Yarn
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/yarn
            ~/.yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install deps
        run: npm install

      - name: Fetch entry-offline source (git clone)
        run: |
          set -Eeuo pipefail
          rm -rf entry-offline || true
          git clone --depth 1 https://github.com/entrylabs/entry-offline.git entry-offline

      - name: Patch entry-offline import casing (Index -> index)
        run: |
          set -Eeuo pipefail

          rm -f entry-offline/src/renderer/components/Index.tsx \
                entry-offline/src/renderer/components/Index.ts \
                entry-offline/src/renderer/components/Index.jsx \
                entry-offline/src/renderer/components/Index.js || true

          TARGET="entry-offline/src/renderer/renderEntry.tsx"
          if [ -f "$TARGET" ]; then
            sed -i 's#\./components/Index#./components/index#g' "$TARGET"
            sed -i 's#\./components/Index\.tsx#./components/index.tsx#g' "$TARGET" || true
            echo "PATCHED: $TARGET"
          else
            echo "ERROR: not found: $TARGET"
            exit 1
          fi

      - name: Build entry-offline renderer bundles (webpack; allow openssl legacy)
        run: |
          set -Eeuo pipefail
          corepack enable || true

          yarn --cwd entry-offline install --frozen-lockfile || yarn --cwd entry-offline install

          # ✅ Node18 + old webpack 해시 문제 우회
          export NODE_OPTIONS=--openssl-legacy-provider

          # entry-offline에 build script가 없는 경우가 있어서 webpack 직접
          yarn --cwd entry-offline webpack || true

          # renderer_build 확인
          find entry-offline -maxdepth 8 -type f -name "init.bundle.js" -print | head -n 20 || true
          find entry-offline -maxdepth 8 -type f -name "render.bundle.js" -print | head -n 20 || true
          test -f entry-offline/src/renderer_build/init.bundle.js
          test -f entry-offline/src/renderer_build/render.bundle.js

      - name: Fetch assets into www
        run: |
          set -Eeuo pipefail
          bash scripts/fetch_entry_assets.sh
          test -f www/index.html

      - name: Copy entry-offline resources into www (keep index.html)
        run: |
          set -Eeuo pipefail

          test -f www/index.html

          if [ -d "entry-offline/src/renderer/resources" ]; then
            mkdir -p "www/renderer/resources"
            cp -a "entry-offline/src/renderer/resources/." "www/renderer/resources/"
          fi

          mkdir -p "www/renderer_build"
          cp -a "entry-offline/src/renderer_build/." "www/renderer_build/"

          test -f "www/renderer_build/init.bundle.js"
          test -f "www/renderer_build/render.bundle.js"

      # ✅ 핵심: 오브젝트/모양/소리/테이블 UI에 필요한 추가 라이브러리들을 로컬로 확보
      - name: Add UI dependency libs (socket.io, codemirror addons, fuzzy, jshint, python, entry util)
        run: |
          set -Eeuo pipefail

          dl () {
            url="$1"; out="$2"
            mkdir -p "$(dirname "$out")"
            if [ ! -f "$out" ]; then
              echo "download: $out"
              curl -L "$url" -o "$out"
            else
              echo "skip exists: $out"
            fi
          }

          # React / ReactDOM (entry-lms + tool UI)
          dl "https://unpkg.com/react@17/umd/react.production.min.js"     "www/lib/react/umd/react.production.min.js"
          dl "https://unpkg.com/react-dom@17/umd/react-dom.production.min.js" "www/lib/react-dom/umd/react-dom.production.min.js"

          # entry-lms (UI shell)
          dl "https://playentry.org/lib/entry-lms/dist/assets/app.css" "www/lib/entry-lms/dist/assets/app.css"
          dl "https://playentry.org/lib/entry-lms/dist/assets/app.js"  "www/lib/entry-lms/dist/assets/app.js"

          # socket.io client (entry-tool 내부에서 필요할 때가 많음)
          dl "https://playentry.org/lib/socket.io-client/socket.io.js" "www/lib/socket.io-client/socket.io.js"

          # codemirror addons (텍스트/파이썬/힌트/린트)
          dl "https://playentry.org/lib/codemirror/addon/hint/show-hint.js"       "www/lib/codemirror/addon/hint/show-hint.js"
          dl "https://playentry.org/lib/codemirror/addon/hint/show-hint.css"      "www/lib/codemirror/addon/hint/show-hint.css"
          dl "https://playentry.org/lib/codemirror/addon/lint/lint.js"            "www/lib/codemirror/addon/lint/lint.js"
          dl "https://playentry.org/lib/codemirror/addon/lint/lint.css"           "www/lib/codemirror/addon/lint/lint.css"
          dl "https://playentry.org/lib/codemirror/addon/selection/active-line.js" "www/lib/codemirror/addon/selection/active-line.js"
          dl "https://playentry.org/lib/codemirror/mode/javascript/javascript.js" "www/lib/codemirror/mode/javascript/javascript.js"
          dl "https://playentry.org/lib/codemirror/addon/hint/javascript-hint.js" "www/lib/codemirror/addon/hint/javascript-hint.js"

          # jshint / fuzzy / python
          dl "https://playentry.org/js/jshint.js"        "www/js/jshint.js"
          dl "https://playentry.org/lib/fuzzy/lib/fuzzy.js" "www/lib/fuzzy/lib/fuzzy.js"
          dl "https://playentry.org/js/ws/python.js"     "www/js/ws/python.js"

          # entry-js util 일부 (예제에 있는 것)
          dl "https://playentry.org/lib/entry-js/extern/util/filbert.js"          "www/lib/entryjs/extern/util/filbert.js"
          dl "https://playentry.org/lib/entry-js/extern/util/CanvasInput.js"      "www/lib/entryjs/extern/util/CanvasInput.js"
          dl "https://playentry.org/lib/entry-js/extern/util/ndgmr.Collision.js"  "www/lib/entryjs/extern/util/ndgmr.Collision.js"

      # =========================
      # ✅✅ 여기부터 "추가만" 2개
      # =========================

      # ✅ 추가 1) React 18 강제 덮어쓰기 (오브젝트/모양/소리/테이블 UI가 React17에서 흰 화면 나는 케이스 방지)
      - name: Force React 18 override (fix blank UI)
        run: |
          set -Eeuo pipefail
          curl -L https://unpkg.com/react@18/umd/react.production.min.js -o www/lib/react/umd/react.production.min.js
          curl -L https://unpkg.com/react-dom@18/umd/react-dom.production.min.js -o www/lib/react-dom/umd/react-dom.production.min.js

      # ✅ 추가 2) entryjs images 하위폴더를 www/images로 미러링 (하위폴더 이미지 안보임 재발 방지)
      - name: Mirror entryjs images subtree into www/images (fix missing subfolder images)
        run: |
          set -Eeuo pipefail
          mkdir -p www/images

          # entryjs / entry-js 둘 다 대비
          if [ -d "www/lib/entryjs/images" ]; then
            cp -a www/lib/entryjs/images/. www/images/
          fi
          if [ -d "www/lib/entry-js/images" ]; then
            cp -a www/lib/entry-js/images/. www/images/
          fi

          echo "== verify hw subdir =="
          ls -la www/images/hw || true
          echo "== images total =="
          find www/images -type f | wc -l || true

      # ✅ 옵션: PNG 재인코딩은 너무 오래 걸리면 OFF 권장 (필요시만)
      # - name: Re-encode PNGs (fast parallel, skip broken)
      #   run: |
      #     set -Eeuo pipefail
      #     sudo apt-get update -y
      #     sudo apt-get install -y imagemagick
      #     find www -type f -name "*.png" -print0 | xargs -0 -n 1 -P "$(nproc)" bash -lc '
      #       f="$1"
      #       [ -s "$f" ] || exit 0
      #       convert "$f" -strip -define png:color-type=6 -define png:bit-depth=8 PNG32:"$f".tmp 2>/dev/null || exit 0
      #       mv "$f".tmp "$f"
      #     ' _

      - name: Ensure Android platform
        run: |
          set -Eeuo pipefail
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Copy web assets to Android
        run: |
          set -Eeuo pipefail
          npx cap sync android
          npx cap copy android
          du -sh android/app/src/main/assets/public || true

      - name: Allow cleartext localhost (for http scheme)
        run: |
          set -Eeuo pipefail
          MAN="android/app/src/main/AndroidManifest.xml"
          test -f "$MAN"
          if ! grep -q 'usesCleartextTraffic="true"' "$MAN"; then
            sed -i 's/<application /<application android:usesCleartextTraffic="true" /' "$MAN"
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Build Debug APK
        run: |
          set -Eeuo pipefail
          cd android
          ./gradlew assembleDebug

      - name: Inspect APK contents
        run: |
          set -Eeuo pipefail
          APK="android/app/build/outputs/apk/debug/app-debug.apk"
          test -f "$APK"

          echo "== has react/lms =="
          unzip -l "$APK" | grep -E "assets/public/lib/react/umd/react\.production\.min\.js" || true
          unzip -l "$APK" | grep -E "assets/public/lib/entry-lms/dist/assets/app\.js" || true

          echo "== images count =="
          unzip -l "$APK" | grep -E "assets/public/images/" | wc -l || true

      - name: Cleanup old artifacts (keep latest 1)
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const name = "app-debug";

            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner, repo, per_page: 100 }
            );

            const list = artifacts
              .filter(a => a.name === name && !a.expired)
              .sort((a,b) => new Date(a.created_at) - new Date(b.created_at));

            const toDelete = list.slice(0, Math.max(0, list.length - 1));
            for (const a of toDelete) {
              await github.rest.actions.deleteArtifact({ owner, repo, artifact_id: a.id });
            }

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1
