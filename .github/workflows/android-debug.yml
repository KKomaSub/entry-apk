name: Build Entry Offline (Renderer) APK (Debug)

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (this repo)
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"   # entry-offline는 종종 18이 호환이 더 좋음

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # 1) entry-offline 소스 가져오기
      - name: Checkout entry-offline
        run: |
          rm -rf _entry-offline
          git clone --depth 1 https://github.com/entrylabs/entry-offline.git _entry-offline

      # 2) entry-offline 의존성 설치 + renderer 빌드
      - name: Build entry-offline renderer
        working-directory: _entry-offline
        run: |
          npm ci || npm install
          # 레포마다 스크립트명이 다를 수 있어 후보로 순차 시도
          npm run build:renderer || npm run build-renderer || npm run build || true

          echo "---- find renderer dist ----"
          find . -maxdepth 4 -type d -name "dist" -o -name "build" | head -n 50
          find . -maxdepth 6 -type f -name "index.html" | head -n 50

      # 3) Capacitor 프로젝트 준비 (this repo)
      - name: Install deps (this repo)
        run: npm install

      # 4) entry-offline renderer 산출물을 www로 복사
      - name: Copy renderer output into www
        run: |
          rm -rf www
          mkdir -p www

          # 아래는 "가장 흔한" 산출물 위치 후보들입니다.
          # Actions 로그에 출력되는 경로에 맞춰 1개만 살아남게 됩니다.
          if [ -d "_entry-offline/renderer/dist" ]; then
            cp -r _entry-offline/renderer/dist/* www/
          elif [ -d "_entry-offline/app/renderer/dist" ]; then
            cp -r _entry-offline/app/renderer/dist/* www/
          elif [ -d "_entry-offline/dist/renderer" ]; then
            cp -r _entry-offline/dist/renderer/* www/
          else
            echo "Renderer output not found. Check logs above and adjust path."
            exit 1
          fi

          echo "---- www preview ----"
          ls -al www | head -n 200
          test -f www/index.html

      # 5) Capacitor sync + (아이콘 생성은 그대로 유지 가능)
      - name: Add & Sync Android (Capacitor)
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Generate App Icon (Capacitor Assets)
        run: |
          npm i -D @capacitor/assets
          mkdir -p assets
          curl -L "https://img.kkomaweb.com/api/image?id=cK9YkGqw&name=1000025550.png" -o assets/logo.png
          npx @capacitor/assets generate --android
          npx cap sync android

      # 6) APK 빌드
      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: entry-offline-renderer-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk        run: chmod +x scripts/fetch_entry_assets.sh

      - name: Fetch Entry assets (bundle into APK)
        run: npm run fetch

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # Capacitor Android 생성/동기화
      - name: Add & Sync Android (Capacitor)
        run: |
          npx cap add android || true
          npx cap sync android

      # ✅ 아이콘 자동 생성 (요청하신 이미지 사용)
      # 필요조건: package.json devDependencies에 "@capacitor/assets"가 있어야 함
      - name: Generate App Icon (Capacitor Assets)
        run: |
          mkdir -p assets
          curl -L "https://img.kkomaweb.com/api/image?id=cK9YkGqw&name=1000025550.png" -o assets/logo.png
          npx @capacitor/assets generate --android
          npx cap sync android

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: entry-offline-editor-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
