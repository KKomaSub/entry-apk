name: android-debug

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      # ✅ Yarn/Gradle 캐시
      - name: Cache Yarn
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/yarn
            ~/.yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install deps
        run: npm install

      - name: Fetch entry-offline source (git clone)
        run: |
          set -Eeuo pipefail
          rm -rf entry-offline || true
          git clone --depth 1 https://github.com/entrylabs/entry-offline.git entry-offline

      # ✅ Linux(case-sensitive)에서 ./components/Index import 깨지는 문제 자동 보정
      - name: Patch entry-offline import casing (Index -> index)
        run: |
          set -Eeuo pipefail
          rm -f entry-offline/src/renderer/components/Index.tsx \
                entry-offline/src/renderer/components/Index.ts \
                entry-offline/src/renderer/components/Index.jsx \
                entry-offline/src/renderer/components/Index.js || true
          TARGET="entry-offline/src/renderer/renderEntry.tsx"
          if [ -f "$TARGET" ]; then
            sed -i 's#\./components/Index#./components/index#g' "$TARGET"
            sed -i 's#\./components/Index\.tsx#./components/index.tsx#g' "$TARGET" || true
            echo "PATCHED: $TARGET"
            grep -n "components/index" "$TARGET" || true
          else
            echo "ERROR: not found: $TARGET"
            exit 1
          fi
          grep -RIn --exclude-dir=node_modules "components/Index" entry-offline/src/renderer || true
          if grep -RIn --exclude-dir=node_modules "components/Index" entry-offline/src/renderer >/dev/null 2>&1; then
            find entry-offline/src/renderer -type f \( -name '*.ts' -o -name '*.tsx' -o -name '*.js' -o -name '*.jsx' \) -print0 \
              | xargs -0 sed -i 's#\./components/Index#./components/index#g'
            echo "PATCHED: renderer sources (bulk)"
          fi
          test ! -f entry-offline/src/renderer/components/Index.tsx || (echo "Index.tsx still exists" && exit 1)

      # ✅ entry-offline renderer_build 생성
      - name: Build entry-offline renderer bundles
        env:
          NODE_OPTIONS: --openssl-legacy-provider
        run: |
          set -Eeuo pipefail
          corepack enable || true
          yarn --cwd entry-offline install --frozen-lockfile || yarn --cwd entry-offline install
          yarn --cwd entry-offline webpack
          echo "== find renderer_build output =="
          find entry-offline -maxdepth 8 -type d -name "renderer_build" -print | head -n 20 || true
          test -f entry-offline/src/renderer_build/init.bundle.js
          test -f entry-offline/src/renderer_build/render.bundle.js

      - name: Fetch assets into www
        run: |
          set -Eeuo pipefail
          bash scripts/fetch_entry_assets.sh
          test -f www/index.html
          echo "OK: www/index.html exists"
          ls -la www | head -n 120 || true

      # ✅ entry-offline 리소스 + 번들만 복사 (index.html 덮어쓰기 금지)
      - name: Copy entry-offline resources into www (keep index.html)
        run: |
          set -Eeuo pipefail
          test -f www/index.html
          if [ -d "entry-offline/src/renderer/resources" ]; then
            mkdir -p "www/renderer/resources"
            cp -a "entry-offline/src/renderer/resources/." "www/renderer/resources/"
            echo "COPIED: renderer/resources"
          fi
          mkdir -p "www/renderer_build"
          cp -a "entry-offline/src/renderer_build/." "www/renderer_build/"
          echo "COPIED: entry-offline/src/renderer_build -> www/renderer_build"
          test -f "www/renderer_build/init.bundle.js"
          test -f "www/renderer_build/render.bundle.js"

      # ✅✅ (추가) 오브젝트/모양/소리/테이블 UI에 필요한 라이브러리 로컬 확보
      - name: Add UI dependency libs (react, entry-lms, socket.io, codemirror addons, jshint, fuzzy, python, util)
        run: |
          set -Eeuo pipefail
          dl () {
            url="$1"; out="$2"
            mkdir -p "$(dirname "$out")"
            if [ ! -f "$out" ]; then
              echo "download: $out"
              curl -L "$url" -o "$out"
            else
              echo "skip exists: $out"
            fi
          }

          # React / ReactDOM (entry-lms + tool UI)
          dl "https://unpkg.com/react@17/umd/react.production.min.js"          "www/lib/react/umd/react.production.min.js"
          dl "https://unpkg.com/react-dom@17/umd/react-dom.production.min.js" "www/lib/react-dom/umd/react-dom.production.min.js"

          # entry-lms (UI shell) - 오브젝트/모양/소리/테이블 패널 쪽이 여기 의존하는 경우 많음
          dl "https://playentry.org/lib/entry-lms/dist/assets/app.css" "www/lib/entry-lms/dist/assets/app.css"
          dl "https://playentry.org/lib/entry-lms/dist/assets/app.js"  "www/lib/entry-lms/dist/assets/app.js"

          # socket.io client
          dl "https://playentry.org/lib/socket.io-client/socket.io.js" "www/lib/socket.io-client/socket.io.js"

          # codemirror addons
          dl "https://playentry.org/lib/codemirror/addon/hint/show-hint.js"        "www/lib/codemirror/addon/hint/show-hint.js"
          dl "https://playentry.org/lib/codemirror/addon/hint/show-hint.css"       "www/lib/codemirror/addon/hint/show-hint.css"
          dl "https://playentry.org/lib/codemirror/addon/lint/lint.js"             "www/lib/codemirror/addon/lint/lint.js"
          dl "https://playentry.org/lib/codemirror/addon/lint/lint.css"            "www/lib/codemirror/addon/lint/lint.css"
          dl "https://playentry.org/lib/codemirror/addon/selection/active-line.js" "www/lib/codemirror/addon/selection/active-line.js"
          dl "https://playentry.org/lib/codemirror/mode/javascript/javascript.js"  "www/lib/codemirror/mode/javascript/javascript.js"
          dl "https://playentry.org/lib/codemirror/addon/hint/javascript-hint.js"  "www/lib/codemirror/addon/hint/javascript-hint.js"

          # jshint / fuzzy / python
          dl "https://playentry.org/js/jshint.js"                 "www/js/jshint.js"
          dl "https://playentry.org/lib/fuzzy/lib/fuzzy.js"       "www/lib/fuzzy/lib/fuzzy.js"
          dl "https://playentry.org/js/ws/python.js"              "www/js/ws/python.js"

          # util (가끔 entry.min/tool에서 찾음)
          dl "https://playentry.org/lib/entry-js/extern/util/filbert.js"         "www/lib/entryjs/extern/util/filbert.js"
          dl "https://playentry.org/lib/entry-js/extern/util/CanvasInput.js"     "www/lib/entryjs/extern/util/CanvasInput.js"
          dl "https://playentry.org/lib/entry-js/extern/util/ndgmr.Collision.js" "www/lib/entryjs/extern/util/ndgmr.Collision.js"

      # ✅✅ 핵심: @entrylabs/entry 와 @entrylabs/entry. 경로 둘 다 제공 (entry./ 오타도 그대로 흡수)
      - name: Alias @entrylabs/entry and @entrylabs/entry. to entryjs assets
        run: |
          set -Eeuo pipefail
          if [ ! -d "www/lib/entryjs" ]; then
            echo "ERROR: www/lib/entryjs not found. fetch_entry_assets.sh가 entryjs를 내려받는지 확인 필요"
            find www/lib -maxdepth 3 -type d | head -n 200 || true
            exit 1
          fi

          mkdir -p "www/lib/@entrylabs/entry" "www/lib/@entrylabs/entry."
          rm -rf "www/lib/@entrylabs/entry/images" "www/lib/@entrylabs/entry./images" || true
          cp -a "www/lib/entryjs/." "www/lib/@entrylabs/entry/"
          cp -a "www/lib/entryjs/." "www/lib/@entrylabs/entry./"

          echo "== check click.mp3 =="
          ls -la "www/lib/@entrylabs/entry./images/sounds/click.mp3" || true
          ls -la "www/lib/@entrylabs/entry/images/sounds/click.mp3" || true

          echo "== check hw dir =="
          ls -la "www/lib/@entrylabs/entry./images/hw" || true
          ls -la "www/lib/@entrylabs/entry/images/hw" || true

      # =========================
      # ✅✅✅ 여기부터가 “방금 말한 추가만” (기존 내용 변경 없음)
      # =========================

      - name: Ensure entry-tool exists (required for object add modal)
        run: |
          set -Eeuo pipefail
          if [ ! -f "www/lib/entry-tool/dist/entry-tool.js" ]; then
            echo "MISSING: www/lib/entry-tool/dist/entry-tool.js -> downloading"
            mkdir -p "www/lib/entry-tool/dist"
            curl -L --fail "https://playentry.org/lib/entry-tool/dist/entry-tool.js" -o "www/lib/entry-tool/dist/entry-tool.js"
          fi
          if [ ! -f "www/lib/entry-tool/dist/entry-tool.css" ]; then
            echo "MISSING: entry-tool.css -> downloading"
            mkdir -p "www/lib/entry-tool/dist"
            curl -L --fail "https://playentry.org/lib/entry-tool/dist/entry-tool.css" -o "www/lib/entry-tool/dist/entry-tool.css"
          fi
          echo "== entry-tool check =="
          ls -la "www/lib/entry-tool/dist" || true
          grep -RIn "EntryTool" "www/lib/entry-tool/dist/entry-tool.js" | head -n 10 || true

      - name: Ensure entry-lms css/js exists (modal roots)
        run: |
          set -Eeuo pipefail
          mkdir -p "www/lib/entry-lms/dist/assets"
          if [ ! -f "www/lib/entry-lms/dist/assets/app.js" ]; then
            echo "MISSING: entry-lms app.js -> downloading"
            curl -L --fail "https://playentry.org/lib/entry-lms/dist/assets/app.js" -o "www/lib/entry-lms/dist/assets/app.js"
          fi
          if [ ! -f "www/lib/entry-lms/dist/assets/app.css" ]; then
            echo "MISSING: entry-lms app.css -> downloading"
            curl -L --fail "https://playentry.org/lib/entry-lms/dist/assets/app.css" -o "www/lib/entry-lms/dist/assets/app.css"
          fi
          echo "== entry-lms assets =="
          ls -la "www/lib/entry-lms/dist/assets" || true

      # ✅✅ (추가) /images/hw/... 같은 “루트 images” 참조를 흡수하기 위해 entryjs/images를 www/images로 미러링
      - name: Mirror entryjs images to root www/images (fix /images/hw/* broken)
        run: |
          set -Eeuo pipefail
          if [ -d "www/lib/entryjs/images" ]; then
            mkdir -p "www/images"
            cp -a "www/lib/entryjs/images/." "www/images/"
            echo "MIRRORED: www/lib/entryjs/images -> www/images"
          fi

          echo "== sanity check counts =="
          echo -n "entryjs hw count: "
          find "www/lib/entryjs/images/hw" -type f 2>/dev/null | wc -l || true
          echo -n "root images hw count: "
          find "www/images/hw" -type f 2>/dev/null | wc -l || true

      - name: Ensure Android platform
        run: |
          set -Eeuo pipefail
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Copy web assets to Android
        run: |
          set -Eeuo pipefail
          npx cap sync android
          npx cap copy android
          du -sh android/app/src/main/assets/public || true
          ls -la android/app/src/main/assets/public | head -n 120 || true

      - name: Allow cleartext localhost (for http scheme)
        run: |
          set -Eeuo pipefail
          MAN="android/app/src/main/AndroidManifest.xml"
          test -f "$MAN"
          if ! grep -q 'usesCleartextTraffic="true"' "$MAN"; then
            sed -i 's/<application /<application android:usesCleartextTraffic="true" /' "$MAN"
          fi
          grep -n 'usesCleartextTraffic' "$MAN" || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Build Debug APK
        run: |
          set -Eeuo pipefail
          cd android
          ./gradlew assembleDebug

      - name: Inspect APK contents (must include renderer_build + entry assets + images/hw)
        run: |
          set -Eeuo pipefail
          APK="android/app/build/outputs/apk/debug/app-debug.apk"
          test -f "$APK"

          echo "== renderer_build inside apk =="
          unzip -l "$APK" | grep -E "assets/public/renderer_build/(init|render)\.bundle\.js" || true

          echo "== @entrylabs/entry. alias check (click.mp3) =="
          unzip -l "$APK" | grep -F "assets/public/lib/@entrylabs/entry./images/sounds/click.mp3" || true

          echo "== entryjs images/hw count (inside apk) =="
          unzip -l "$APK" | grep -E "assets/public/lib/entryjs/images/hw/" | wc -l || true

          echo "== root images/hw count (inside apk) =="
          unzip -l "$APK" | grep -E "assets/public/images/hw/" | wc -l || true

          echo "== has react/lms (inside apk) =="
          unzip -l "$APK" | grep -E "assets/public/lib/react/umd/react\.production\.min\.js" || true
          unzip -l "$APK" | grep -E "assets/public/lib/entry-lms/dist/assets/app\.js" || true

      - name: Cleanup old artifacts (keep latest 1)
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const name = "app-debug";
            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner, repo, per_page: 100 }
            );
            const list = artifacts
              .filter(a => a.name === name && !a.expired)
              .sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
            const toDelete = list.slice(0, Math.max(0, list.length - 1));
            for (const a of toDelete) {
              await github.rest.actions.deleteArtifact({ owner, repo, artifact_id: a.id });
            }

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1
