name: Build Entry Offline Editor APK (Debug)

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Debug repo structure
        run: |
          pwd
          ls -al
          ls -al scripts || true
          ls -al www || true
          echo "----- package.json -----"
          cat package.json
          echo "----- capacitor config -----"
          ls -al capacitor.config.* || true

      - name: Install deps
        run: npm install

      # fetch 스크립트 실행권한
      - name: Make fetch script executable
        run: chmod +x scripts/fetch_entry_assets.sh

      - name: Fetch Entry assets (bundle into APK)
        run: npm run fetch

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # Capacitor Android 생성/동기화
      - name: Add & Sync Android (Capacitor)
        run: |
          npx cap add android || true
          npx cap sync android

      # ✅ 아이콘 자동 생성 (요청하신 이미지 사용)
      # 필요조건: package.json devDependencies에 "@capacitor/assets"가 있어야 함
      - name: Generate App Icon (Capacitor Assets)
        run: |
          mkdir -p assets
          curl -L "https://img.kkomaweb.com/api/image?id=cK9YkGqw&name=1000025550.png" -o assets/logo.png
          npx @capacitor/assets generate --android
          npx cap sync android

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: entry-offline-editor-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
