name: android-debug

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install deps
        run: npm install

      - name: Fetch assets into www
        run: |
          bash scripts/fetch_entry_assets.sh
          du -sh www || true
          ls -la www || true
          test -f www/index.html

      - name: Ensure Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Copy web assets to Android
        run: |
          npx cap sync android
          npx cap copy android
          du -sh android/app/src/main/assets/public || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew clean assembleDebug
      - name: Inspect APK contents (must include images)
        run: |
          APK="android/app/build/outputs/apk/debug/app-debug.apk"
          test -f "$APK"
          unzip -l "$APK" | grep -E "assets/public/images/" | head -n 20 || true
          echo "== image count inside apk =="
          unzip -l "$APK" | grep -E "assets/public/images/" | wc -l || true
          echo "== sample nested file inside apk =="
          unzip -l "$APK" | grep -F "assets/public/images/block_icon/ai_hand_icon.svg" || true
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
      - name: Build www from entry-offline renderer
        run: |
          set -e

          # 1) www 기본 생성
          rm -rf www
          mkdir -p www

          # 2) entry-offline renderer 소스 복사 (소스 위치에 맞게)
          # 예: entry-offline/src/renderer 가 존재한다고 했으니 그대로 복사
          cp -a entry-offline/src/renderer/. www/

          # 3) (중요) 앱이 기대하는 번들/리소스 경로가 www 안에 실제로 존재하는지 확인
          # renderer_build가 소스에 없으면 "빌드 산출물"이 없다는 뜻이라 추가 빌드가 필요함
          echo "== www top =="
          ls -la www | head

          echo "== find renderer_build =="
          find www -maxdepth 3 -type d -name "renderer_build" -print || true

          echo "== find main.html =="
          find www -maxdepth 5 -type f -name "main.html" -print || true
