name: android-debug

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install deps
        run: npm install

      - name: Fetch entry-offline source (git clone)
        run: |
          set -Eeuo pipefail
          rm -rf entry-offline || true
          git clone --depth 1 https://github.com/entrylabs/entry-offline.git entry-offline

          echo "== entry-offline top =="
          ls -la entry-offline | head -n 50 || true

          echo "== find main.html =="
          find entry-offline -type f -name "main.html" -print | head -n 50 || true

      # ✅ 추가: Linux(case-sensitive)에서 ./components/Index import 깨지는 문제 자동 보정
      - name: Fix case-sensitive import (components/Index)
        run: |
          set -Eeuo pipefail

          BASE="entry-offline/src/renderer/components"
          if [ ! -d "$BASE" ]; then
            echo "WARN: no dir: $BASE"
            exit 0
          fi

          echo "== components dir listing =="
          ls -la "$BASE" | head -n 120 || true

          # 후보 파일들: index.tsx / index.ts / index.jsx / index.js
          # Index.tsx 등이 없으면 alias 파일(복사본) 만들어서 import './components/Index'가 통과하게 함
          if [ ! -f "$BASE/Index.tsx" ] && [ -f "$BASE/index.tsx" ]; then
            cp -f "$BASE/index.tsx" "$BASE/Index.tsx"
            echo "FIXED: index.tsx -> Index.tsx"
          fi
          if [ ! -f "$BASE/Index.ts" ] && [ -f "$BASE/index.ts" ]; then
            cp -f "$BASE/index.ts" "$BASE/Index.ts"
            echo "FIXED: index.ts -> Index.ts"
          fi
          if [ ! -f "$BASE/Index.jsx" ] && [ -f "$BASE/index.jsx" ]; then
            cp -f "$BASE/index.jsx" "$BASE/Index.jsx"
            echo "FIXED: index.jsx -> Index.jsx"
          fi
          if [ ! -f "$BASE/Index.js" ] && [ -f "$BASE/index.js" ]; then
            cp -f "$BASE/index.js" "$BASE/Index.js"
            echo "FIXED: index.js -> Index.js"
          fi

          # 혹시 반대(대문자만 있고 소문자 없음)면 소문자도 만들어줌
          if [ ! -f "$BASE/index.tsx" ] && [ -f "$BASE/Index.tsx" ]; then
            cp -f "$BASE/Index.tsx" "$BASE/index.tsx"
            echo "FIXED: Index.tsx -> index.tsx"
          fi

      # ✅ 추가: entry-offline renderer_build 실제 생성 (흰화면 방지의 핵심)
      - name: Build entry-offline renderer bundles
        run: |
          set -Eeuo pipefail
          corepack enable || true

          echo "== entry-offline package scripts =="
          (cat entry-offline/package.json | head -n 120) || true

          echo "== yarn install (entry-offline) =="
          yarn --cwd entry-offline install --frozen-lockfile || yarn --cwd entry-offline install

          echo "== try build commands (entry-offline) =="
          set +e
          # 여러 repo/버전에서 스크립트명이 다를 수 있어 후보를 순차 시도
          for cmd in \
            "yarn --cwd entry-offline build" \
            "yarn --cwd entry-offline build:renderer" \
            "yarn --cwd entry-offline build-renderer" \
            "yarn --cwd entry-offline build:webpack" \
            "yarn --cwd entry-offline webpack" \
            "yarn --cwd entry-offline dist"
          do
            echo "TRY: $cmd"
            $cmd
            code=$?
            if [ $code -eq 0 ]; then
              echo "OK: build succeeded with: $cmd"
              break
            else
              echo "FAIL($code): $cmd"
            fi
          done
          set -e

          echo "== find renderer_build output =="
          find entry-offline -maxdepth 6 -type d -name "renderer_build" -print | head -n 20 || true
          find entry-offline -maxdepth 8 -type f -name "init.bundle.js" -print | head -n 20 || true
          find entry-offline -maxdepth 8 -type f -name "render.bundle.js" -print | head -n 20 || true

      - name: Fetch assets into www
        run: |
          set -Eeuo pipefail
          bash scripts/fetch_entry_assets.sh
          du -sh www || true
          ls -la www | head -n 80 || true
          test -f www/index.html

      # ✅ 핵심: entry-offline renderer 리소스를 www에 "추가"하고,
      # main.html을 www/index.html로 쓰되 "경로를 www 기준으로 자동 치환"
      - name: Apply entry-offline main.html into www (copy + rewrite paths)
        run: |
          set -Eeuo pipefail

          echo "== locate entry-offline main.html =="
          MAIN_HTML="entry-offline/src/main/views/main.html"
          if [ ! -f "$MAIN_HTML" ]; then
            echo "ERROR: not found: $MAIN_HTML"
            echo "DEBUG: candidates(main.html):"
            find entry-offline -type f -name "main.html" -print | head -n 50 || true
            exit 1
          fi
          echo "FOUND: $MAIN_HTML"

          echo "== copy entry-offline renderer resources =="
          if [ -d "entry-offline/src/renderer/resources" ]; then
            mkdir -p "www/renderer/resources"
            cp -a "entry-offline/src/renderer/resources/." "www/renderer/resources/"
            echo "COPIED: entry-offline/src/renderer/resources -> www/renderer/resources"
          else
            echo "WARN: entry-offline/src/renderer/resources not found"
          fi

          # ✅ renderer_build는 이제 빌드했으니, 존재하는 실제 경로를 찾아서 복사
          RB="$(find entry-offline -maxdepth 10 -type d -name "renderer_build" | head -n 1 || true)"
          if [ -n "$RB" ] && [ -d "$RB" ]; then
            mkdir -p "www/renderer_build"
            cp -a "$RB/." "www/renderer_build/"
            echo "COPIED: $RB -> www/renderer_build"
          else
            echo "ERROR: renderer_build not found even after build"
            find entry-offline -maxdepth 12 -type f -name "init.bundle.js" -o -name "render.bundle.js" | head -n 50 || true
            exit 1
          fi

          echo "== replace www/index.html with main.html (then rewrite paths) =="
          cp -f "$MAIN_HTML" "www/index.html"

          # main.html은 src/main/views 기준 상대경로라서 www/index.html로 가져오면 깨짐 → www 기준으로 치환
          perl -0777 -i -pe '
            s#\.\./\.\./renderer/resources/#./renderer/resources/#g;
            s#\.\./\.\./renderer_build/#./renderer_build/#g;

            s#\.\./\.\./\.\./node_modules/entry-js/#./lib/entryjs#g;
            s#\.\./\.\./\.\./node_modules/entry-tool/#./lib/entry-tool#g;
            s#\.\./\.\./\.\./node_modules/lodash/lodash\.min\.js#./lib/lodash/dist/lodash.min.js#g;
            s#\.\./\.\./\.\./node_modules/jquery/dist/jquery\.min\.js#./lib/jquery/jquery.min.js#g;

            s#\.\./\.\./\.\./node_modules/\@entrylabs/legacy-video/dist/index\.js#./lib/module/legacy-video/index.js#g;

            # entry-js dist: entry.js가 없으면 entry.min.js로
            s#\./lib/entryjs/dist/entry\.js#./lib/entryjs/dist/entry.min.js#g;
          ' "www/index.html"

          echo "== www/index.html head =="
          head -n 60 www/index.html || true

          echo "== must-have files check =="
          test -f "www/renderer_build/init.bundle.js"
          test -f "www/renderer_build/render.bundle.js"
          test -f "www/lib/entryjs/dist/entry.min.js"
          test -f "www/lib/entryjs/dist/entry.css"
          test -f "www/lib/entry-tool/dist/entry-tool.js"
          test -f "www/lib/entry-tool/dist/entry-tool.css"
          test -f "www/lib/jquery/jquery.min.js"
          test -f "www/lib/lodash/dist/lodash.min.js"

      - name: Ensure Android platform
        run: |
          set -Eeuo pipefail
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Copy web assets to Android
        run: |
          set -Eeuo pipefail
          npx cap sync android
          npx cap copy android
          du -sh android/app/src/main/assets/public || true
          ls -la android/app/src/main/assets/public | head -n 80 || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Build Debug APK
        run: |
          set -Eeuo pipefail
          cd android
          ./gradlew clean assembleDebug

      - name: Inspect APK contents (must include renderer_build + images)
        run: |
          set -Eeuo pipefail
          APK="android/app/build/outputs/apk/debug/app-debug.apk"
          test -f "$APK"

          echo "== renderer_build inside apk =="
          unzip -l "$APK" | grep -E "assets/public/renderer_build/(init|render)\.bundle\.js" || true

          echo "== image count inside apk =="
          unzip -l "$APK" | grep -E "assets/public/images/" | wc -l || true

          echo "== sample nested file inside apk =="
          unzip -l "$APK" | grep -F "assets/public/images/block_icon/ai_hand_icon.svg" || true

      - name: Cleanup old artifacts (keep latest 1)
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const name = "app-debug";

            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner, repo, per_page: 100 }
            );

            const list = artifacts
              .filter(a => a.name === name && !a.expired)
              .sort((a,b) => new Date(a.created_at) - new Date(b.created_at));

            const toDelete = list.slice(0, Math.max(0, list.length - 1));
            for (const a of toDelete) {
              await github.rest.actions.deleteArtifact({ owner, repo, artifact_id: a.id });
            }

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1
