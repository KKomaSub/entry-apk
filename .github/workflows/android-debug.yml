name: android-debug

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install deps
        run: npm install

      - name: Fetch assets into www
        run: |
          bash scripts/fetch_entry_assets.sh
          du -sh www || true
          ls -la www || true
          test -f www/index.html

      - name: Ensure Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Copy web assets to Android
        run: |
          npx cap copy android
          du -sh android/app/src/main/assets/public || true

          # ✅ ADD HERE: force recursive copy of nested assets (images/media/uploads)
          WEB_ASSETS="android/app/src/main/assets/public"
          mkdir -p "$WEB_ASSETS"

          rm -rf "$WEB_ASSETS/images" "$WEB_ASSETS/media" "$WEB_ASSETS/uploads" || true
          cp -a "www/images"  "$WEB_ASSETS/" || true
          cp -a "www/media"   "$WEB_ASSETS/" || true
          cp -a "www/uploads" "$WEB_ASSETS/" || true

          echo "== verify nested =="
          ls -la "$WEB_ASSETS/images/block_icon/ai_hand_icon.svg" || true
          find "$WEB_ASSETS/images" -type f | wc -l || true
          du -sh "$WEB_ASSETS/images" || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
