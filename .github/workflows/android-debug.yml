name: android-debug

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    # ✅ ADD: artifact 삭제를 위해 필요
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install deps
        run: npm install

      - name: Fetch assets into www
        run: |
          bash scripts/fetch_entry_assets.sh
          du -sh www || true
          ls -la www || true
          test -f www/index.html

      - name: Ensure Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Copy web assets to Android
        run: |
          npx cap sync android
          npx cap copy android
          du -sh android/app/src/main/assets/public || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew clean assembleDebug

      - name: Inspect APK contents (must include images)
        run: |
          APK="android/app/build/outputs/apk/debug/app-debug.apk"
          test -f "$APK"
          unzip -l "$APK" | grep -E "assets/public/images/" | head -n 20 || true
          echo "== image count inside apk =="
          unzip -l "$APK" | grep -E "assets/public/images/" | wc -l || true
          echo "== sample nested file inside apk =="
          unzip -l "$APK" | grep -F "assets/public/images/block_icon/ai_hand_icon.svg" || true

      # ✅ ADD HERE: 업로드 전에 오래된 artifact 자동 삭제 (app-debug만 대상으로)
      - name: Cleanup old artifacts (keep latest 2)
        uses: actions/github-script@v7
        with:
          script: |
            const ARTIFACT_NAME = "app-debug";
            const KEEP = 2; // 최신 2개만 남기기

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // repo의 artifacts 목록
            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner, repo, per_page: 100 }
            );

            // 이름 필터 + 오래된 순 정렬
            const targets = artifacts
              .filter(a => a.name === ARTIFACT_NAME && !a.expired)
              .sort((a,b) => new Date(a.created_at) - new Date(b.created_at));

            core.info(`Found ${targets.length} artifact(s) named "${ARTIFACT_NAME}"`);

            // 최신 KEEP개 제외하고 삭제
            const toDelete = targets.slice(0, Math.max(0, targets.length - KEEP));
            for (const a of toDelete) {
              core.info(`Deleting artifact id=${a.id} created_at=${a.created_at}`);
              await github.rest.actions.deleteArtifact({ owner, repo, artifact_id: a.id });
            }

      - name: Cleanup old artifacts (keep latest 1)
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const name = "app-debug";

            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner, repo, per_page: 100 }
            );

            const list = artifacts
              .filter(a => a.name === name && !a.expired)
              .sort((a,b) => new Date(a.created_at) - new Date(b.created_at)); // 오래된 순

            const toDelete = list.slice(0, Math.max(0, list.length - 1));
            for (const a of toDelete) {
              await github.rest.actions.deleteArtifact({ owner, repo, artifact_id: a.id });
            }

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1

      - name: Build www from entry-offline renderer
        run: |
          set -e

          # 1) www 기본 생성
          rm -rf www
          mkdir -p www

          # 2) entry-offline renderer 소스 복사 (소스 위치에 맞게)
          cp -a entry-offline/src/renderer/. www/

          echo "== www top =="
          ls -la www | head

          echo "== find renderer_build =="
          find www -maxdepth 3 -type d -name "renderer_build" -print || true

          echo "== find main.html =="
          find www -maxdepth 5 -type f -name "main.html" -print || true
