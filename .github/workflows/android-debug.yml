name: android-debug

on:
  workflow_dispatch:
  push:
    branches: ["master", "main"]

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install deps
        run: npm install --legacy-peer-deps

      - name: Fetch Entry assets into www
        run: npm run fetch

      - name: Ensure android platform exists (cap add android once)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "android/ already exists -> skip cap add"
          fi

      - name: Capacitor sync android
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
