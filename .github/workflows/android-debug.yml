name: android-debug

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      # ✅ Yarn/Gradle 캐시
      - name: Cache Yarn
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/yarn
            ~/.yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install deps
        run: npm install

      - name: Fetch entry-offline source (git clone)
        run: |
          set -Eeuo pipefail
          rm -rf entry-offline || true
          git clone --depth 1 https://github.com/entrylabs/entry-offline.git entry-offline

          echo "== entry-offline top =="
          ls -la entry-offline | head -n 50 || true

          echo "== find main.html =="
          find entry-offline -type f -name "main.html" -print | head -n 50 || true

      # ✅ Linux(case-sensitive)에서 ./components/Index import 깨지는 문제 자동 보정
      - name: Patch entry-offline import casing (Index -> index)
        run: |
          set -Eeuo pipefail

          rm -f entry-offline/src/renderer/components/Index.tsx \
                entry-offline/src/renderer/components/Index.ts \
                entry-offline/src/renderer/components/Index.jsx \
                entry-offline/src/renderer/components/Index.js || true

          TARGET="entry-offline/src/renderer/renderEntry.tsx"
          if [ -f "$TARGET" ]; then
            sed -i 's#\./components/Index#./components/index#g' "$TARGET"
            sed -i 's#\./components/Index\.tsx#./components/index.tsx#g' "$TARGET" || true
            echo "PATCHED: $TARGET"
            grep -n "components/index" "$TARGET" || true
          else
            echo "ERROR: not found: $TARGET"
            exit 1
          fi

          grep -RIn --exclude-dir=node_modules "components/Index" entry-offline/src/renderer || true
          if grep -RIn --exclude-dir=node_modules "components/Index" entry-offline/src/renderer >/dev/null 2>&1; then
            find entry-offline/src/renderer -type f \( -name '*.ts' -o -name '*.tsx' -o -name '*.js' -o -name '*.jsx' \) -print0 \
              | xargs -0 sed -i 's#\./components/Index#./components/index#g'
            echo "PATCHED: renderer sources (bulk)"
          fi

          ls -la entry-offline/src/renderer/components | head -n 200 || true
          test ! -f entry-offline/src/renderer/components/Index.tsx || (echo "Index.tsx still exists" && exit 1)

      # ✅ entry-offline renderer_build 실제 생성
      - name: Build entry-offline renderer bundles
        run: |
          set -Eeuo pipefail
          corepack enable || true

          echo "== entry-offline package scripts =="
          (cat entry-offline/package.json | head -n 120) || true

          echo "== yarn install (entry-offline) =="
          yarn --cwd entry-offline install --frozen-lockfile || yarn --cwd entry-offline install

          echo "== try build commands (entry-offline) =="
          set +e
          for cmd in \
            "yarn --cwd entry-offline build" \
            "yarn --cwd entry-offline build:renderer" \
            "yarn --cwd entry-offline build-renderer" \
            "yarn --cwd entry-offline build:webpack" \
            "yarn --cwd entry-offline webpack" \
            "yarn --cwd entry-offline dist"
          do
            echo "TRY: $cmd"
            $cmd
            code=$?
            if [ $code -eq 0 ]; then
              echo "OK: build succeeded with: $cmd"
              break
            else
              echo "FAIL($code): $cmd"
            fi
          done
          set -e

          echo "== find renderer_build output =="
          find entry-offline -maxdepth 6 -type d -name "renderer_build" -print | head -n 20 || true
          find entry-offline -maxdepth 8 -type f -name "init.bundle.js" -print | head -n 20 || true
          find entry-offline -maxdepth 8 -type f -name "render.bundle.js" -print | head -n 20 || true

      - name: Fetch assets into www
        run: |
          set -Eeuo pipefail
          bash scripts/fetch_entry_assets.sh
          du -sh www || true
          ls -la www | head -n 80 || true
          test -f www/index.html

      # ✅ entry-offline 리소스 + 번들만 복사 (index.html 덮어쓰기 금지)
      - name: Copy entry-offline resources into www (keep index.html)
        run: |
          set -Eeuo pipefail

          test -f www/index.html
          echo "OK: using existing www/index.html"

          if [ -d "entry-offline/src/renderer/resources" ]; then
            mkdir -p "www/renderer/resources"
            cp -a "entry-offline/src/renderer/resources/." "www/renderer/resources/"
            echo "COPIED: renderer/resources"
          fi

          RB="$(find entry-offline -maxdepth 10 -type d -name "renderer_build" | head -n 1 || true)"
          if [ -n "$RB" ] && [ -d "$RB" ]; then
            mkdir -p "www/renderer_build"
            cp -a "$RB/." "www/renderer_build/"
            echo "COPIED: $RB -> www/renderer_build"
          else
            echo "ERROR: renderer_build not found"
            exit 1
          fi
          echo "== verify bundles =="
          test -f "www/renderer_build/init.bundle.js"
          test -f "www/renderer_build/render.bundle.js"

      # ✅✅✅ 핵심: www/images 가 없으면 만들어서 lib 내부 images를 미러링
      - name: Ensure www/images exists (mirror from lib if needed)
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          import os, shutil

          ROOT="www"
          img=os.path.join(ROOT,"images")
          if os.path.isdir(img) and os.listdir(img):
            print("[ensure-images] www/images already exists and not empty")
          else:
            # 후보: 실제로 많이 나오는 경로들
            candidates = [
              os.path.join(ROOT,"lib","entryjs","images"),
              os.path.join(ROOT,"lib","entry-js","images"),
              os.path.join(ROOT,"lib","entry","images"),
              os.path.join(ROOT,"lib","@entrylabs","entry","images"),
            ]

            src=None
            for c in candidates:
              if os.path.isdir(c) and any(os.scandir(c)):
                src=c
                break

            if not src:
              # 마지막 수단: www/lib 아래에서 images 폴더 하나라도 찾기
              for dirpath, dirnames, _ in os.walk(os.path.join(ROOT,"lib")):
                if os.path.basename(dirpath) == "images":
                  if any(os.scandir(dirpath)):
                    src=dirpath
                    break

            os.makedirs(img, exist_ok=True)

            if src:
              print("[ensure-images] MIRROR:", src, "->", img)
              # copy contents (not overwrite existing files)
              for dp, _, fns in os.walk(src):
                rel=os.path.relpath(dp, src)
                dst=os.path.join(img, rel) if rel != "." else img
                os.makedirs(dst, exist_ok=True)
                for fn in fns:
                  s=os.path.join(dp, fn)
                  d=os.path.join(dst, fn)
                  if not os.path.exists(d):
                    shutil.copy2(s, d)
            else:
              print("[ensure-images] WARNING: no source images dir found under www/lib")

          # 1x1 픽셀(테스트용) 없으면 생성
          one=os.path.join(img,"_1x1.png")
          if not os.path.exists(one):
            # 가장 단순한 1x1 PNG 바이너리
            data = bytes.fromhex(
              "89504E470D0A1A0A0000000D49484452000000010000000108060000001F15C489"
              "0000000A49444154789C6360000002000154A24F5D0000000049454E44AE426082"
            )
            with open(one,"wb") as f:
              f.write(data)
            print("[ensure-images] wrote images/_1x1.png")

          print("[ensure-images] images exists:", os.path.isdir(img))
          print("[ensure-images] images file sample:")
          for i, name in enumerate(sorted(os.listdir(img))[:30]):
            print(" -", name)
          PY

      # (선택) 구조 확인용
      - name: Debug locate image dirs under www/lib
        run: |
          set -Eeuo pipefail
          echo "== top lib dirs =="
          ls -la www/lib | head -n 200 || true
          echo "== image dirs (depth 6) =="
          find www/lib -maxdepth 6 -type d -name images -print || true
          echo "== root images exists? =="
          ls -la www/images | head -n 80 || true

      # ✅✅ SVG -> PNG (www 전체)
      - name: Convert ALL SVG to PNG in www (robust)
        run: |
          set -Eeuo pipefail
          sudo apt-get update -y
          sudo apt-get install -y librsvg2-bin

          find www -type f -name "*.svg" -print0 | while IFS= read -r -d '' f; do
            out="${f%.svg}.png"
            if [ ! -f "$out" ]; then
              rsvg-convert "$f" -o "$out" || true
            fi
          done

          echo "SVG count:"; find www -type f -name "*.svg" | wc -l || true
          echo "PNG count:"; find www -type f -name "*.png" | wc -l || true

      # ✅✅ 모든 .svg 참조를 .png로 치환 (경로 상관없이)
      - name: Rewrite ALL .svg refs to .png in www (js/css/html)
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          import os, re
          ROOT="www"
          exts=(".js",".css",".html")
          pat = re.compile(r'([A-Za-z0-9_\-./]+)\.svg(\b|[?#"\'\)\s])', re.IGNORECASE)

          changed=0
          files=0
          for dp,_,fns in os.walk(ROOT):
            for fn in fns:
              if not fn.endswith(exts):
                continue
              p=os.path.join(dp,fn)
              s=open(p,"rb").read().decode("utf-8","ignore")
              ns, n = pat.subn(r'\1.png\2', s)
              if n:
                open(p,"wb").write(ns.encode("utf-8"))
                changed += n
                files += 1

          print(f"[rewrite-svg->png] files_changed={files} refs_changed={changed}")
          PY

      # ✅✅✅ PNG 재인코딩 (병렬 + 깨진 PNG는 스킵)
      - name: Re-encode ALL PNGs for Android WebView (parallel, skip broken)
        run: |
          set -Eeuo pipefail
          sudo apt-get update -y
          sudo apt-get install -y imagemagick

          # 병렬 처리(4개)
          find www -type f -name "*.png" -print0 \
            | xargs -0 -n 1 -P 4 bash -lc '
                f="$0"
                if [ ! -s "$f" ]; then
                  echo "SKIP (empty): $f"
                  exit 0
                fi
                convert "$f" -strip -define png:color-type=6 -define png:bit-depth=8 PNG32:"$f".tmp 2>/dev/null || {
                  echo "SKIP (broken): $f"
                  rm -f "$f".tmp || true
                  exit 0
                }
                mv "$f".tmp "$f"
              '

      - name: Ensure Android platform
        run: |
          set -Eeuo pipefail
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Copy web assets to Android
        run: |
          set -Eeuo pipefail
          npx cap sync android
          npx cap copy android
          du -sh android/app/src/main/assets/public || true
          ls -la android/app/src/main/assets/public | head -n 80 || true
          echo "== ensure images folder in android assets =="
          ls -la android/app/src/main/assets/public/images | head -n 80 || true

      - name: Allow cleartext localhost (for http scheme)
        run: |
          set -Eeuo pipefail
          MAN="android/app/src/main/AndroidManifest.xml"
          test -f "$MAN"
          if ! grep -q 'usesCleartextTraffic="true"' "$MAN"; then
            sed -i 's/<application /<application android:usesCleartextTraffic="true" /' "$MAN"
          fi
          grep -n 'usesCleartextTraffic' "$MAN" || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Build Debug APK
        run: |
          set -Eeuo pipefail
          cd android
          ./gradlew assembleDebug

      - name: Inspect APK contents (must include renderer_build + images)
        run: |
          set -Eeuo pipefail
          APK="android/app/build/outputs/apk/debug/app-debug.apk"
          test -f "$APK"

          echo "== renderer_build inside apk =="
          unzip -l "$APK" | grep -E "assets/public/renderer_build/(init|render)\.bundle\.js" || true

          echo "== image count inside apk =="
          unzip -l "$APK" | grep -E "assets/public/images/" | wc -l || true

          echo "== check _1x1.png inside apk =="
          unzip -l "$APK" | grep -F "assets/public/images/_1x1.png" || true

          echo "== sample block icon =="
          unzip -l "$APK" | grep -E "assets/public/images/block_icon/ai_hand_icon\.(png|svg)" || true

      - name: Cleanup old artifacts (keep latest 1)
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const name = "app-debug";

            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner, repo, per_page: 100 }
            );

            const list = artifacts
              .filter(a => a.name === name && !a.expired)
              .sort((a,b) => new Date(a.created_at) - new Date(b.created_at));

            const toDelete = list.slice(0, Math.max(0, list.length - 1));
            for (const a of toDelete) {
              await github.rest.actions.deleteArtifact({ owner, repo, artifact_id: a.id });
            }

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1
