name: Build Entry Offline Editor APK (Debug)

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Debug repo structure
        run: |
          pwd
          ls -al
          ls -al scripts || true
          ls -al www || true
          cat package.json

      - name: Install deps
        run: npm install

      - name: Make fetch script executable
        run: chmod +x scripts/fetch_entry_assets.sh

      - name: Fetch Entry assets (bundle into APK)
        run: npm run fetch

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Add & Sync Android (Capacitor)
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: entry-offline-editor-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
