name: android-debug

on:
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install deps
        run: npm install --legacy-peer-deps

      - name: Fetch Entry assets into www
        run: npm run fetch

      - name: Sanity check www files
        run: |
          set -e
          ls -al www || true
          echo "=== must exist ==="
          test -f www/index.html
          test -f www/overrides.css
          test -f www/lib/lodash/dist/lodash.min.js
          test -f www/lib/jquery/jquery.min.js
          test -f www/lib/entryjs/dist/entry.min.js
          test -f www/lib/entry-tool/dist/entry-tool.js
          test -f www/lib/entry-paint/dist/static/js/entry-paint.js
          test -f www/lib/module/legacy-video/index.js
          echo "OK: www looks complete"

      - name: Capacitor sync (MUST be after fetch)
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
