name: Build Entry Offline (prebuilt renderer) APK (Debug)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout (this repo)
        uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Clone entry-offline
        run: |
          rm -rf _entry-offline
          git clone --depth 1 https://github.com/entrylabs/entry-offline.git _entry-offline

      - name: Locate prebuilt renderer dir in entry-offline (no build)
        run: |
          echo "Searching prebuilt renderer index.html..."
          # build 폴더 우선 탐색 (이미 빌드된 산출물 사용)
          CAND="$(find _entry-offline -maxdepth 6 -type f -name index.html \
            | grep -E '/build/|/dist/' \
            | grep -Ei 'renderer|render' \
            | head -n 1 || true)"

          if [ -z "$CAND" ]; then
            echo "No renderer-like index.html found in build/dist. Dump some candidates:"
            find _entry-offline -maxdepth 6 -type f -name index.html | head -n 50
            exit 1
          fi

          echo "Found renderer index:"
          echo "$CAND"

          RENDER_DIR="$(dirname "$CAND")"
          echo "RENDER_DIR=$RENDER_DIR" >> $GITHUB_ENV

          echo "Preview:"
          ls -al "$RENDER_DIR" | head -n 200

      - name: Copy renderer to www
        run: |
          rm -rf www
          mkdir -p www
          cp -r "$RENDER_DIR"/* www/

          echo "www preview"
          ls -al www | head -n 200
          test -f www/index.html

      - name: Install deps (this repo)
        run: |
          npm install

      - name: Add & Sync Android (Capacitor)
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Generate App Icon (Capacitor Assets)
        run: |
          npm install -D @capacitor/assets
          mkdir -p assets
          curl -L "https://img.kkomaweb.com/api/image?id=cK9YkGqw&name=1000025550.png" -o assets/logo.png
          npx @capacitor/assets generate --android
          npx cap sync android

      - name: Build Debug APK
        working-directory: android
        run: |
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: entry-offline-prebuilt-renderer-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk          echo ""
          echo "capacitor config:"
          ls -al capacitor.config.* || true
          cat capacitor.config.json 2>/dev/null || true

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Clone entry-offline
        run: |
          rm -rf _entry-offline
          git clone --depth 1 https://github.com/entrylabs/entry-offline.git _entry-offline

      - name: Debug entry-offline structure
        working-directory: _entry-offline
        run: |
          echo "PWD:"
          pwd
          echo ""
          echo "TOP LIST:"
          ls -al | head -n 200
          echo ""
          echo "package.json (head):"
          cat package.json | head -n 200
          echo ""
          echo "scripts:"
          node -e "const p=require('./package.json'); console.log(p.scripts||{})"

      - name: Install entry-offline deps (legacy peer deps)
        working-directory: _entry-offline
        run: |
          npm install --legacy-peer-deps

      - name: Build entry-offline renderer (auto script)
        working-directory: _entry-offline
        run: |
          SCRIPT=$(node -e "const p=require('./package.json'); const s=p.scripts||{}; const c=['build:renderer','build-renderer','renderer:build','build:app','build']; console.log(c.find(k=>s[k])||'')")
          if [ -z "$SCRIPT" ]; then
            echo "No renderer build script found. Available scripts:"
            node -e "const p=require('./package.json'); console.log(p.scripts||{})"
            exit 1
          fi

          echo "Using script:"
          echo "$SCRIPT"
          npm run "$SCRIPT"

          echo ""
          echo "---- find possible outputs ----"
          find . -maxdepth 6 -type f -name "index.html" | head -n 120
          echo ""
          find . -maxdepth 6 -type d -name "dist" -o -name "build" | head -n 120

      - name: Copy renderer output into www
        run: |
          rm -rf www
          mkdir -p www

          if [ -d "_entry-offline/renderer/dist" ]; then
            echo "Copy from: _entry-offline/renderer/dist"
            cp -r _entry-offline/renderer/dist/* www/
          elif [ -d "_entry-offline/app/renderer/dist" ]; then
            echo "Copy from: _entry-offline/app/renderer/dist"
            cp -r _entry-offline/app/renderer/dist/* www/
          elif [ -d "_entry-offline/dist/renderer" ]; then
            echo "Copy from: _entry-offline/dist/renderer"
            cp -r _entry-offline/dist/renderer/* www/
          elif [ -d "_entry-offline/build/renderer" ]; then
            echo "Copy from: _entry-offline/build/renderer"
            cp -r _entry-offline/build/renderer/* www/
          else
            echo "Renderer output not found. Check 'find possible outputs' logs above."
            exit 1
          fi

          echo ""
          echo "---- www preview ----"
          ls -al www | head -n 200
          test -f www/index.html

      - name: Install deps (this repo)
        run: |
          npm install

      - name: Add & Sync Android (Capacitor)
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Generate App Icon (Capacitor Assets)
        run: |
          npm install -D @capacitor/assets
          mkdir -p assets
          curl -L "https://img.kkomaweb.com/api/image?id=cK9YkGqw&name=1000025550.png" -o assets/logo.png
          npx @capacitor/assets generate --android
          npx cap sync android

      - name: Build Debug APK
        working-directory: android
        run: |
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: entry-offline-renderer-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
