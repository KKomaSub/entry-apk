name: android-debug

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: write

    env:
      NODE_OPTIONS: --openssl-legacy-provider

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Cache Yarn
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/yarn
            ~/.yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install deps (repo)
        run: |
          set -Eeuo pipefail
          npm install

      - name: Fetch entry-offline source (git clone)
        run: |
          set -Eeuo pipefail
          rm -rf entry-offline || true
          git clone --depth 1 https://github.com/entrylabs/entry-offline.git entry-offline

          echo "== entry-offline top =="
          ls -la entry-offline | head -n 50 || true

          echo "== find main.html =="
          find entry-offline -type f -name "main.html" -print | head -n 50 || true

      - name: Patch entry-offline import casing (Index -> index)
        run: |
          set -Eeuo pipefail

          rm -f entry-offline/src/renderer/components/Index.tsx \
                entry-offline/src/renderer/components/Index.ts \
                entry-offline/src/renderer/components/Index.jsx \
                entry-offline/src/renderer/components/Index.js || true

          TARGET="entry-offline/src/renderer/renderEntry.tsx"
          if [ -f "$TARGET" ]; then
            sed -i 's#\./components/Index#./components/index#g' "$TARGET"
            sed -i 's#\./components/Index\.tsx#./components/index.tsx#g' "$TARGET" || true
            echo "PATCHED: $TARGET"
            grep -n "components/index" "$TARGET" || true
          else
            echo "ERROR: not found: $TARGET"
            exit 1
          fi

          if grep -RIn --exclude-dir=node_modules "components/Index" entry-offline/src/renderer >/dev/null 2>&1; then
            find entry-offline/src/renderer -type f \( -name '*.ts' -o -name '*.tsx' -o -name '*.js' -o -name '*.jsx' \) -print0 \
              | xargs -0 sed -i 's#\./components/Index#./components/index#g'
            echo "PATCHED: renderer sources (bulk)"
          fi

          ls -la entry-offline/src/renderer/components | head -n 200 || true
          test ! -f entry-offline/src/renderer/components/Index.tsx || (echo "Index.tsx still exists" && exit 1)

      - name: Build entry-offline renderer bundles (ensure renderer_build)
        run: |
          set -Eeuo pipefail
          corepack enable || true

          echo "== yarn install (entry-offline) =="
          yarn --cwd entry-offline install --frozen-lockfile || yarn --cwd entry-offline install

          if [ -d "entry-offline/src/renderer_build" ] && [ -f "entry-offline/src/renderer_build/init.bundle.js" ] && [ -f "entry-offline/src/renderer_build/render.bundle.js" ]; then
            echo "OK: renderer_build already exists in repo"
          else
            echo "renderer_build missing -> try webpack"
            (cd entry-offline && ./node_modules/.bin/webpack)
          fi

          echo "== verify renderer_build =="
          test -f entry-offline/src/renderer_build/init.bundle.js
          test -f entry-offline/src/renderer_build/render.bundle.js

      - name: Fetch assets into www
        run: |
          set -Eeuo pipefail
          bash scripts/fetch_entry_assets.sh
          du -sh www || true
          ls -la www | head -n 120 || true
          test -f www/index.html || true

      - name: Normalize entryjs folder name (entry-js -> entryjs)
        run: |
          set -Eeuo pipefail
          if [ -d "www/lib/entry-js" ] && [ ! -d "www/lib/entryjs" ]; then
            mv "www/lib/entry-js" "www/lib/entryjs"
            echo "RENAMED: www/lib/entry-js -> www/lib/entryjs"
          fi
          ls -la www/lib | head -n 80 || true

      # ✅✅✅ 여기만 수정됨: npm ci 제거 + legacy-peer-deps로 고정
      - name: Build entry-tool and copy into www/lib/entry-tool
        run: |
          set -Eeuo pipefail
          rm -rf entry-tool || true
          git clone --depth 1 https://github.com/entrylabs/entry-tool.git entry-tool

          pushd entry-tool >/dev/null
          # lockfile 없을 수 있고, peerDeps 충돌이 떠서 legacy-peer-deps로 설치
          npm install --legacy-peer-deps
          npm run build
          popd >/dev/null

          mkdir -p www/lib/entry-tool
          rm -rf www/lib/entry-tool/dist www/lib/entry-tool/lib || true
          cp -a entry-tool/dist www/lib/entry-tool/dist
          cp -a entry-tool/lib  www/lib/entry-tool/lib

          test -f www/lib/entry-tool/dist/entry-tool.js
          test -f www/lib/entry-tool/dist/entry-tool.css

      - name: Write www/index.html (minimal, no path hooking)
        run: |
          set -Eeuo pipefail
          cat > www/index.html <<'HTML'
          <!doctype html>
          <html lang="ko">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width,initial-scale=1" />
            <title>Entry Offline Editor</title>
            <link rel="stylesheet" href="overrides.css">
            <style>
              html,body{margin:0;height:100%;overflow:hidden;background:#111}
              #entryContainer{width:100%;height:100%;background:#f5f5f5}
              #boot{
                position:fixed;inset:0;background:#000;color:#0f0;
                font:12px/1.45 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
                padding:12px;white-space:pre-wrap;overflow:auto;z-index:9999
              }
              .bad{color:#ff5c5c}
              .dim{opacity:.85}
              .ok{color:#66ff66}
            </style>

            <script>
              function bootLineImpl(t, cls="") {
                const el = document.getElementById("boot");
                if (!el) return;
                const d = document.createElement("div");
                if (cls) d.className = cls;
                d.textContent = t;
                el.appendChild(d);
                el.scrollTop = el.scrollHeight;
              }
              window.bootLine = bootLineImpl;
              window.__bootLine = bootLineImpl;
              window.__bootline = bootLineImpl;
            </script>

            <script>
              if (!window.__DRAWIMAGE_GUARD__) {
                window.__DRAWIMAGE_GUARD__ = true;
                const proto = CanvasRenderingContext2D && CanvasRenderingContext2D.prototype;
                if (proto && proto.drawImage) {
                  const _drawImage = proto.drawImage;
                  proto.drawImage = function(img, ...rest) {
                    try {
                      if (img && img.tagName === "IMG") {
                        const nw = img.naturalWidth || 0, nh = img.naturalHeight || 0;
                        if (nw === 0 || nh === 0) return;
                      }
                      return _drawImage.call(this, img, ...rest);
                    } catch (_) { return; }
                  };
                }
              }
            </script>

            <script>
              const bootLine = (...args) => window.bootLine(...args);

              async function testImageDecode(url, timeoutMs = 4000) {
                bootLine(`IMG start ${url}`, "dim");
                return await new Promise((resolve) => {
                  const img = new Image();
                  let done = false;

                  const t = setTimeout(() => {
                    if (done) return;
                    done = true;
                    bootLine(`IMG timeout ${url}`, "bad");
                    resolve(false);
                  }, timeoutMs);

                  img.onload = () => {
                    if (done) return;
                    done = true;
                    clearTimeout(t);
                    bootLine(`IMG ok ${url} natural=${img.naturalWidth}x${img.naturalHeight}`, "ok");
                    resolve(img.naturalWidth > 0 && img.naturalHeight > 0);
                  };
                  img.onerror = () => {
                    if (done) return;
                    done = true;
                    clearTimeout(t);
                    bootLine(`IMG fail ${url}`, "bad");
                    resolve(false);
                  };

                  img.src = url + (url.includes("?") ? "&" : "?") + "t=" + Date.now();
                });
              }

              async function testAsset(url, timeoutMs = 1500) {
                bootLine(`TEST start ${url}`, "dim");
                const timeout = new Promise((resolve) =>
                  setTimeout(() => resolve({ timeout: true }), timeoutMs)
                );
                const req = fetch(url, { cache: "no-store" })
                  .then((r) => ({ r }))
                  .catch((e) => ({ e }));
                const out = await Promise.race([req, timeout]);

                if (out.timeout) {
                  bootLine(`TEST timeout ${url} (${timeoutMs}ms)`, "bad");
                  return false;
                }
                if (out.e) {
                  bootLine(`TEST fail ${url} -> ${String(out.e && out.e.name ? out.e.name : out.e)}`, "bad");
                  return false;
                }
                const r = out.r;
                const ct = r.headers.get("content-type");
                bootLine(`TEST done  ${url} -> ${r.status} ct=${ct}`, r.ok ? "ok" : "bad");
                return r.ok;
              }

              window.onerror = function (m, s, l, c, e) {
                bootLine("JS ERROR:", "bad");
                bootLine(String(e && e.stack ? e.stack : m), "bad");
              };

              async function probeBase(prefix) {
                const url = prefix + "lib/lodash/dist/lodash.min.js";
                try {
                  const r = await fetch(url, { method: "GET", cache: "no-store" });
                  return r.ok;
                } catch (_) { return false; }
              }

              function loadJS(src) {
                return new Promise((resolve) => {
                  const s = document.createElement("script");
                  s.src = src;
                  s.onload = () => resolve({ ok: true, src });
                  s.onerror = () => resolve({ ok: false, src });
                  document.head.appendChild(s);
                });
              }

              function loadCSS(href) {
                return new Promise((resolve) => {
                  const l = document.createElement("link");
                  l.rel = "stylesheet";
                  l.href = href;
                  l.onload = () => resolve({ ok: true, href });
                  l.onerror = () => resolve({ ok: false, href });
                  document.head.appendChild(l);
                });
              }

              function hideBootLater(delayMs = 1500) {
                setTimeout(() => {
                  const el = document.getElementById("boot");
                  if (el) el.remove();
                }, delayMs);
              }

              function must(cond, msg){
                if(!cond) throw new Error(msg);
                bootLine("OK   " + msg, "ok");
              }

              async function boot() {
                const candidates = ["./", "/", "/public/", "/www/"];
                let BASE = "./";
                for (const c of candidates) {
                  bootLine("PROBE BASE: " + c, "dim");
                  if (await probeBase(c)) { BASE = c; break; }
                }
                bootLine("BASE = " + BASE, "ok");

                const cssList = [
                  BASE + "lib/entry-tool/dist/entry-tool.css",
                  BASE + "lib/entryjs/dist/entry.css",
                  BASE + "lib/codemirror/codemirror.css",
                  BASE + "overrides.css",
                ];
                for (const href of cssList) {
                  const r = await loadCSS(href);
                  bootLine((r.ok ? "OK   CSS  " : "MISS CSS ") + href, r.ok ? "ok" : "bad");
                }

                {
                  const src = BASE + "js/ws/locales.js";
                  const r = await loadJS(src);
                  bootLine((r.ok ? "OK   JS   " : "MISS(opt) ") + src, r.ok ? "ok" : "dim");
                }

                const jsList = [
                  BASE + "lib/lodash/dist/lodash.min.js",
                  BASE + "lib/jquery/jquery.min.js",
                  BASE + "lib/jquery-ui/ui/minified/jquery-ui.min.js",
                  BASE + "lib/PreloadJS/lib/preloadjs-0.6.0.min.js",
                  BASE + "lib/EaselJS/lib/easeljs-0.8.0.min.js",
                  BASE + "lib/SoundJS/lib/soundjs-0.6.0.min.js",
                  BASE + "lib/SoundJS/lib/flashaudioplugin-0.6.0.min.js",
                  BASE + "lib/velocity/velocity.min.js",
                  BASE + "lib/codemirror/codemirror.js",
                  BASE + "lib/codemirror/vim.js",
                  BASE + "lib/entry-tool/dist/entry-tool.js",
                  BASE + "lib/entryjs/extern/lang/ko.js",
                  BASE + "lib/entryjs/extern/util/static.js",
                  BASE + "lib/entryjs/extern/util/handle.js",
                  BASE + "lib/entryjs/extern/util/bignumber.min.js",
                  BASE + "lib/module/legacy-video/index.js",
                  BASE + "lib/external/sound/sound-editor.js",
                  BASE + "lib/entryjs/dist/entry.min.js",
                  BASE + "lib/entry-paint/dist/static/js/entry-paint.js",
                ];

                for (const src of jsList) {
                  const optional =
                    src.includes("flashaudioplugin") ||
                    src.includes("/vim.js") ||
                    src.includes("/ws/locales.js") ||
                    src.includes("/external/sound/sound-editor.js");

                  const r = await loadJS(src);

                  if (!r.ok && src.includes("/external/sound/sound-editor.js")) {
                    bootLine("MISS(opt) " + src, "dim");
                    bootLine("PATCH EntrySoundEditor: stub applied (sound editor disabled)", "dim");
                    if (!window.EntrySoundEditor) {
                      window.EntrySoundEditor = {
                        renderSoundEditor: function () {},
                        registExportFunction: function () {},
                        registImportFunction: function () {},
                        init: function () {},
                      };
                    }
                    continue;
                  }

                  bootLine(
                    (r.ok ? "OK   JS   " : (optional ? "MISS(opt) " : "MISS     ")) + src,
                    r.ok ? "ok" : (optional ? "dim" : "bad")
                  );
                }

                if (window._) {
                  if (typeof _.contains !== "function" && typeof _.includes === "function") _.contains = _.includes;
                  if (typeof _.findWhere !== "function") {
                    _.findWhere = function (arr, attrs) {
                      return _.find(arr, function (o) {
                        for (var k in attrs) if (o[k] !== attrs[k]) return false;
                        return true;
                      });
                    };
                  }
                  bootLine("PATCH lodash: _.contains/_.findWhere ok", "dim");
                }

                if (window.EntryStatic) {
                  EntryStatic.imagePath = BASE + "images/";
                  EntryStatic.mediaPath = BASE + "media/";
                  EntryStatic.uploadPath = BASE + "uploads/";
                }

                await testAsset(BASE + "images/_1x1.png", 1500);
                await testAsset(BASE + "images/block_icon/ai_hand_icon.png", 1500);
                await testImageDecode(BASE + "images/block_icon/ai_hand_icon.png");

                must(window._, "lodash(_)");
                must(window.$, "jQuery($)");
                must(window.createjs, "createjs");
                must(window.Lang, "Lang");
                must(window.EntryTool, "EntryTool");
                must(window.EntryVideoLegacy, "EntryVideoLegacy");
                must(window.EntryStatic, "EntryStatic");
                must(window.EntrySoundEditor, "EntrySoundEditor (optional stub OK)");
                must(window.Entry && typeof window.Entry.init === "function", "Entry.init");

                Entry.init(document.getElementById("entryContainer"), {
                  type: "workspace",
                  libDir: "./lib",
                  textCodingEnable: true
                });

                Entry.loadProject();
                bootLine("BOOT OK", "ok");
                hideBootLater(1500);
              }

              document.addEventListener("DOMContentLoaded", () => {
                boot().catch(e => {
                  bootLine("Boot Error", "bad");
                  bootLine(String(e && e.stack ? e.stack : e), "bad");
                });
              });
            </script>
          </head>
          <body>
            <div id="entryContainer"></div>
            <div id="boot">Entry Offline Editor
          Made by KKomaProgrammer
          Loading…</div>
          </body>
          </html>
          HTML

          test -f www/index.html
          echo "WROTE: www/index.html"

      - name: Copy entry-offline resources into www (keep index.html)
        run: |
          set -Eeuo pipefail

          test -f www/index.html
          echo "OK: keep www/index.html"

          if [ -d "entry-offline/src/renderer/resources" ]; then
            mkdir -p "www/renderer/resources"
            cp -a "entry-offline/src/renderer/resources/." "www/renderer/resources/"
            echo "COPIED: renderer/resources"
          fi

          if [ -d "entry-offline/src/renderer_build" ]; then
            mkdir -p "www/renderer_build"
            cp -a "entry-offline/src/renderer_build/." "www/renderer_build/"
            echo "COPIED: entry-offline/src/renderer_build -> www/renderer_build"
          else
            echo "ERROR: entry-offline/src/renderer_build not found"
            exit 1
          fi

          test -f "www/renderer_build/init.bundle.js"
          test -f "www/renderer_build/render.bundle.js"

      - name: Ensure www/images exists (sync from entryjs images)
        run: |
          set -Eeuo pipefail
          mkdir -p www/images

          if [ -d "www/lib/entryjs/images" ]; then
            rsync -a --delete "www/lib/entryjs/images/" "www/images/"
            echo "SYNC: www/lib/entryjs/images -> www/images"
          else
            echo "WARN: www/lib/entryjs/images not found; keeping existing www/images"
          fi

          ls -la www/images | head -n 80 || true

      - name: Ensure Android platform
        run: |
          set -Eeuo pipefail
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Copy web assets to Android
        run: |
          set -Eeuo pipefail
          npx cap sync android
          npx cap copy android
          du -sh android/app/src/main/assets/public || true
          ls -la android/app/src/main/assets/public | head -n 120 || true

      - name: Allow cleartext localhost (for http scheme)
        run: |
          set -Eeuo pipefail
          MAN="android/app/src/main/AndroidManifest.xml"
          test -f "$MAN"
          if ! grep -q 'usesCleartextTraffic="true"' "$MAN"; then
            sed -i 's/<application /<application android:usesCleartextTraffic="true" /' "$MAN"
          fi
          grep -n 'usesCleartextTraffic' "$MAN" || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Build Debug APK
        run: |
          set -Eeuo pipefail
          cd android
          ./gradlew assembleDebug

      - name: Inspect APK contents (must include renderer_build + images)
        run: |
          set -Eeuo pipefail
          APK="android/app/build/outputs/apk/debug/app-debug.apk"
          test -f "$APK"

          echo "== renderer_build inside apk =="
          unzip -l "$APK" | grep -E "assets/public/renderer_build/(init|render)\.bundle\.js" || true

          echo "== image count inside apk =="
          unzip -l "$APK" | grep -E "assets/public/images/" | wc -l || true

          echo "== index.html head (first 40 lines) =="
          unzip -p "$APK" assets/public/index.html | head -n 40

          echo "== verify entry-tool assets =="
          unzip -l "$APK" | grep -F "assets/public/lib/entry-tool/dist/entry-tool.js" || true
          unzip -l "$APK" | grep -F "assets/public/lib/entry-tool/dist/entry-tool.css" || true

      - name: Cleanup old artifacts (keep latest 1)
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const name = "app-debug";

            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner, repo, per_page: 100 }
            );

            const list = artifacts
              .filter(a => a.name === name && !a.expired)
              .sort((a,b) => new Date(a.created_at) - new Date(b.created_at));

            const toDelete = list.slice(0, Math.max(0, list.length - 1));
            for (const a of toDelete) {
              await github.rest.actions.deleteArtifact({ owner, repo, artifact_id: a.id });
            }

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1
