name: android-debug

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      # ✅ Yarn/Gradle 캐시
      - name: Cache Yarn
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/yarn
            ~/.yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install deps
        run: npm install

      - name: Fetch entry-offline source (git clone)
        run: |
          set -Eeuo pipefail
          rm -rf entry-offline || true
          git clone --depth 1 https://github.com/entrylabs/entry-offline.git entry-offline

          echo "== entry-offline top =="
          ls -la entry-offline | head -n 50 || true

          echo "== find main.html =="
          find entry-offline -type f -name "main.html" -print | head -n 50 || true

      # ✅ Linux(case-sensitive)에서 ./components/Index import 깨지는 문제 자동 보정
      - name: Patch entry-offline import casing (Index -> index)
        run: |
          set -Eeuo pipefail

          rm -f entry-offline/src/renderer/components/Index.tsx \
                entry-offline/src/renderer/components/Index.ts \
                entry-offline/src/renderer/components/Index.jsx \
                entry-offline/src/renderer/components/Index.js || true

          TARGET="entry-offline/src/renderer/renderEntry.tsx"
          if [ -f "$TARGET" ]; then
            sed -i 's#\./components/Index#./components/index#g' "$TARGET"
            sed -i 's#\./components/Index\.tsx#./components/index.tsx#g' "$TARGET" || true
            echo "PATCHED: $TARGET"
            grep -n "components/index" "$TARGET" || true
          else
            echo "ERROR: not found: $TARGET"
            exit 1
          fi

          grep -RIn --exclude-dir=node_modules "components/Index" entry-offline/src/renderer || true
          if grep -RIn --exclude-dir=node_modules "components/Index" entry-offline/src/renderer >/dev/null 2>&1; then
            find entry-offline/src/renderer -type f \( -name '*.ts' -o -name '*.tsx' -o -name '*.js' -o -name '*.jsx' \) -print0 \
              | xargs -0 sed -i 's#\./components/Index#./components/index#g'
            echo "PATCHED: renderer sources (bulk)"
          fi

          ls -la entry-offline/src/renderer/components | head -n 200 || true
          test ! -f entry-offline/src/renderer/components/Index.tsx || (echo "Index.tsx still exists" && exit 1)

      # ✅ entry-offline renderer_build 실제 생성 (흰화면 방지의 핵심)
      - name: Build entry-offline renderer bundles
        run: |
          set -Eeuo pipefail
          corepack enable || true

          echo "== entry-offline package scripts =="
          (cat entry-offline/package.json | head -n 120) || true

          echo "== yarn install (entry-offline) =="
          yarn --cwd entry-offline install --frozen-lockfile || yarn --cwd entry-offline install

          echo "== try build commands (entry-offline) =="
          set +e
          for cmd in \
            "yarn --cwd entry-offline build" \
            "yarn --cwd entry-offline build:renderer" \
            "yarn --cwd entry-offline build-renderer" \
            "yarn --cwd entry-offline build:webpack" \
            "yarn --cwd entry-offline webpack" \
            "yarn --cwd entry-offline dist"
          do
            echo "TRY: $cmd"
            $cmd
            code=$?
            if [ $code -eq 0 ]; then
              echo "OK: build succeeded with: $cmd"
              break
            else
              echo "FAIL($code): $cmd"
            fi
          done
          set -e

          echo "== find renderer_build output =="
          find entry-offline -maxdepth 6 -type d -name "renderer_build" -print | head -n 20 || true
          find entry-offline -maxdepth 8 -type f -name "init.bundle.js" -print | head -n 20 || true
          find entry-offline -maxdepth 8 -type f -name "render.bundle.js" -print | head -n 20 || true

      - name: Fetch assets into www
        run: |
          set -Eeuo pipefail
          bash scripts/fetch_entry_assets.sh
          du -sh www || true
          ls -la www | head -n 120 || true
          test -f www/index.html

      # ✅ www/images가 비어있거나 없으면: public/assets 등 다른 위치에서 찾아서 www/images로 강제 수집
      - name: Ensure www/images exists (discover & copy)
        run: |
          set -Eeuo pipefail

          mkdir -p www

          echo "== locate candidate images directories =="
          # repo 전체에서 "images/block_icon" 또는 "images/media"가 있는 루트를 찾음
          CANDIDATES="$(find . -type d \( -path '*/images/block_icon' -o -path '*/images/media' \) -print | head -n 50 || true)"
          echo "$CANDIDATES" || true

          if [ -d "www/images" ] && [ "$(find www/images -type f 2>/dev/null | wc -l)" -gt 0 ]; then
            echo "OK: www/images already has files"
          else
            echo "WARN: www/images missing or empty -> try to copy from discovered roots"
            # images/* 가 들어있는 상위 폴더를 찾아 www/images로 복사
            # 예: ./public/images/block_icon -> ./public/images (parent of images)
            src_images_dir=""
            while IFS= read -r d; do
              parent="$(dirname "$d")"         # .../images
              parent2="$(dirname "$parent")"   # ... (root containing images)
              if [ -d "$parent" ] && [ "$(find "$parent" -type f 2>/dev/null | wc -l)" -gt 0 ]; then
                src_images_dir="$parent"
                break
              fi
            done <<< "$CANDIDATES"

            if [ -n "$src_images_dir" ]; then
              echo "COPY images from: $src_images_dir -> www/images"
              rm -rf www/images || true
              mkdir -p www/images
              cp -a "$src_images_dir/." "www/images/"
            else
              echo "ERROR: could not find any non-empty images folder to populate www/images"
              echo "HINT: your fetch script may not be copying images into www at all."
              exit 1
            fi
          fi

          echo "== www/images quick stats =="
          find www/images -maxdepth 2 -type d -print | head -n 50 || true
          echo "files:"; find www/images -type f | wc -l || true
          echo "sample:"; ls -la www/images | head -n 80 || true

      # ✅ entry-offline 리소스 + 번들만 복사 (index.html 덮어쓰기 금지)
      - name: Copy entry-offline resources into www (keep index.html)
        run: |
          set -Eeuo pipefail

          test -f www/index.html
          echo "OK: using existing www/index.html"

          if [ -d "entry-offline/src/renderer/resources" ]; then
            mkdir -p "www/renderer/resources"
            cp -a "entry-offline/src/renderer/resources/." "www/renderer/resources/"
            echo "COPIED: renderer/resources"
          fi

          RB="$(find entry-offline -maxdepth 10 -type d -name "renderer_build" | head -n 1 || true)"
          if [ -n "$RB" ] && [ -d "$RB" ]; then
            mkdir -p "www/renderer_build"
            cp -a "$RB/." "www/renderer_build/"
            echo "COPIED: $RB -> www/renderer_build"
          else
            echo "ERROR: renderer_build not found"
            exit 1
          fi

          echo "== verify bundles =="
          test -f "www/renderer_build/init.bundle.js"
          test -f "www/renderer_build/render.bundle.js"

      # ✅ 디버그: entry 이미지 경로 확인(실제 존재하는 폴더 기준)
      - name: Debug list lib image folders in www
        run: |
          set -Eeuo pipefail
          echo "== www/lib top =="
          ls -la www/lib | head -n 200 || true

          echo "== probe common image dirs =="
          for p in \
            "www/lib/@entrylabs/entry/images" \
            "www/lib/entry-js/images" \
            "www/lib/entryjs/images" \
            "www/lib/entry/images" \
            "www/lib/@entrylabs/entry" \
            "www/lib/entry-js" \
            "www/lib/entryjs" \
          ; do
            if [ -d "$p" ]; then
              echo "OK DIR: $p"
              find "$p" -maxdepth 2 -type d -print | head -n 20 || true
              find "$p" -maxdepth 3 -type f \( -name "*.svg" -o -name "*.png" \) | head -n 20 || true
            else
              echo "MISS: $p"
            fi
          done

      # ✅✅ 하위폴더 이미지 경로/대소문자/레거시 요청 자동 보정 (www/images 내부만)
      - name: Fix missing images paths (case/legacy) in www
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          import os, re, shutil

          ROOT = "www"

          img_root = os.path.join(ROOT, "images")
          img_index = {}
          if os.path.isdir(img_root):
            for dirpath, _, filenames in os.walk(img_root):
              for fn in filenames:
                rel = os.path.relpath(os.path.join(dirpath, fn), ROOT).replace("\\", "/")
                img_index[rel.lower()] = rel
          else:
            print("[fix-images] no www/images folder; skip")
            raise SystemExit(0)

          pat = re.compile(r'(?:(?:/|\.{0,2}/)images/)[A-Za-z0-9_\-./]+')
          refs = set()

          for dirpath, _, filenames in os.walk(ROOT):
            # node_modules/renderer_build는 여기서도 제외(속도)
            if "node_modules" in dirpath or "renderer_build" in dirpath:
              continue
            for fn in filenames:
              if not (fn.endswith(".js") or fn.endswith(".css") or fn.endswith(".html")):
                continue
              if fn.endswith(".map"):
                continue
              p = os.path.join(dirpath, fn)
              try:
                data = open(p, "rb").read()
              except:
                continue
              s = data.decode("utf-8", "ignore")
              for m in pat.findall(s):
                u = m.replace("\\", "/")
                u = re.sub(r'^(?:/|\./|\.\./)+', '', u)
                if u.startswith("images/"):
                  refs.add(u)

          made = 0
          missing = 0
          for ref in sorted(refs):
            dst = os.path.join(ROOT, ref)
            if os.path.exists(dst):
              continue
            src_rel = img_index.get(ref.lower())
            if not src_rel:
              missing += 1
              continue
            src = os.path.join(ROOT, src_rel)
            os.makedirs(os.path.dirname(dst), exist_ok=True)
            shutil.copy2(src, dst)
            made += 1

          print(f"[fix-images] refs={len(refs)} made={made} still-missing={missing}")

          icon_dir = os.path.join(ROOT, "images", "icon")
          os.makedirs(icon_dir, exist_ok=True)

          src_blk = os.path.join(ROOT, "images", "block_icon")
          dst_blk = os.path.join(ROOT, "images", "icon", "block_icon")
          if os.path.isdir(src_blk) and not os.path.isdir(dst_blk):
            shutil.copytree(src_blk, dst_blk)
            print("[fix-images] copied block_icon -> images/icon/block_icon")
          PY

      # ✅ SVG -> PNG (www/images + www/lib 하위의 svg만; 존재하는 폴더만)
      - name: Convert SVG to PNG (images + lib)
        run: |
          set -Eeuo pipefail
          sudo apt-get update -y
          sudo apt-get install -y librsvg2-bin

          # 1) www/images
          if [ -d "www/images" ]; then
            find "www/images" -type f -name "*.svg" -print0 | while IFS= read -r -d '' f; do
              out="${f%.svg}.png"
              if [ ! -f "$out" ]; then
                rsvg-convert "$f" -o "$out" || true
              fi
            done
          fi

          # 2) www/lib (entry assets가 여기 있을 수 있음)
          if [ -d "www/lib" ]; then
            find "www/lib" -type f -name "*.svg" -print0 | while IFS= read -r -d '' f; do
              out="${f%.svg}.png"
              if [ ! -f "$out" ]; then
                rsvg-convert "$f" -o "$out" || true
              fi
            done
          fi

          echo "SVG count:"; find www -type f -name "*.svg" | wc -l || true
          echo "PNG count:"; find www -type f -name "*.png" | wc -l || true

      # ✅✅✅ “모든 참조를 png로” (병렬, 빠름 / node_modules, renderer_build, *.map 제외)
      - name: Rewrite ALL .svg refs to .png in www (fast, parallel)
        run: |
          set -Eeuo pipefail

          # JS/CSS/HTML만, 대형 폴더 제외
          find www \
            -type f \( -name "*.js" -o -name "*.css" -o -name "*.html" \) \
            ! -path "*/node_modules/*" \
            ! -path "*/renderer_build/*" \
            ! -name "*.map" \
            -print0 | \
          xargs -0 -n 50 -P 4 sed -i -E 's/\.svg([?#"'\''\)\s]|$)/.png\1/Ig'

          echo "[rewrite-svg->png] done"

      # ✅ PNG 재인코딩 (깨진 png는 SKIP, 병렬)
      - name: Re-encode ALL PNGs for Android WebView (skip broken, parallel)
        run: |
          set -Eeuo pipefail
          sudo apt-get update -y
          sudo apt-get install -y imagemagick

          export MAGICK_THREAD_LIMIT=1

          find www -type f -name "*.png" -print0 | \
          xargs -0 -n 1 -P 4 bash -lc '
            f="$0"
            if [ ! -s "$f" ]; then
              echo "SKIP (empty): $f"
              exit 0
            fi
            convert "$f" -strip -define png:color-type=6 -define png:bit-depth=8 PNG32:"$f".tmp 2>/dev/null || {
              echo "SKIP (broken): $f"
              rm -f "$f".tmp || true
              exit 0
            }
            mv "$f".tmp "$f"
          '

      - name: Ensure Android platform
        run: |
          set -Eeuo pipefail
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Copy web assets to Android
        run: |
          set -Eeuo pipefail
          npx cap sync android
          npx cap copy android
          du -sh android/app/src/main/assets/public || true
          ls -la android/app/src/main/assets/public | head -n 120 || true

      - name: Allow cleartext localhost (for http scheme)
        run: |
          set -Eeuo pipefail
          MAN="android/app/src/main/AndroidManifest.xml"
          test -f "$MAN"
          if ! grep -q 'usesCleartextTraffic="true"' "$MAN"; then
            sed -i 's/<application /<application android:usesCleartextTraffic="true" /' "$MAN"
          fi
          grep -n 'usesCleartextTraffic' "$MAN" || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Build Debug APK
        run: |
          set -Eeuo pipefail
          cd android
          ./gradlew assembleDebug

      - name: Inspect APK contents (must include renderer_build + images)
        run: |
          set -Eeuo pipefail
          APK="android/app/build/outputs/apk/debug/app-debug.apk"
          test -f "$APK"

          echo "== renderer_build inside apk =="
          unzip -l "$APK" | grep -E "assets/public/renderer_build/(init|render)\.bundle\.js" || true

          echo "== images folder inside apk =="
          unzip -l "$APK" | grep -E "assets/public/images/" | head -n 40 || true
          echo "== image count inside apk =="
          unzip -l "$APK" | grep -E "assets/public/images/" | wc -l || true

          echo "== sample ai_hand_icon files inside apk =="
          unzip -l "$APK" | grep -E "assets/public/images/.*ai_hand_icon\.(svg|png)" || true

          echo "== scan for remaining .svg refs in index.html (should be none) =="
          unzip -p "$APK" assets/public/index.html | grep -i "\.svg" || true

      - name: Cleanup old artifacts (keep latest 1)
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const name = "app-debug";

            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner, repo, per_page: 100 }
            );

            const list = artifacts
              .filter(a => a.name === name && !a.expired)
              .sort((a,b) => new Date(a.created_at) - new Date(b.created_at));

            const toDelete = list.slice(0, Math.max(0, list.length - 1));
            for (const a of toDelete) {
              await github.rest.actions.deleteArtifact({ owner, repo, artifact_id: a.id });
            }

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1
