name: android-debug

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Cache Yarn
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/yarn
            ~/.yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ✅ npm ci 금지(락파일 없으면 터짐) → npm install
      - name: Install deps
        run: |
          set -Eeuo pipefail
          npm install

      - name: Fetch entry-offline source (git clone)
        run: |
          set -Eeuo pipefail
          rm -rf entry-offline || true
          git clone --depth 1 https://github.com/entrylabs/entry-offline.git entry-offline

      - name: Patch entry-offline import casing (Index -> index)
        run: |
          set -Eeuo pipefail

          rm -f entry-offline/src/renderer/components/Index.tsx \
                entry-offline/src/renderer/components/Index.ts \
                entry-offline/src/renderer/components/Index.jsx \
                entry-offline/src/renderer/components/Index.js || true

          TARGET="entry-offline/src/renderer/renderEntry.tsx"
          if [ -f "$TARGET" ]; then
            sed -i 's#\./components/Index#./components/index#g' "$TARGET"
            sed -i 's#\./components/Index\.tsx#./components/index.tsx#g' "$TARGET" || true
          else
            echo "ERROR: not found: $TARGET"
            exit 1
          fi

      - name: Build entry-offline renderer bundles
        env:
          NODE_OPTIONS: --openssl-legacy-provider
        run: |
          set -Eeuo pipefail
          corepack enable || true
          yarn --cwd entry-offline install --frozen-lockfile || yarn --cwd entry-offline install
          yarn --cwd entry-offline webpack

          test -f entry-offline/src/renderer_build/init.bundle.js
          test -f entry-offline/src/renderer_build/render.bundle.js

      - name: Fetch assets into www
        run: |
          set -Eeuo pipefail
          bash scripts/fetch_entry_assets.sh
          test -f www/index.html

      # ✅ index.html은 건드리지 않음
      - name: Copy entry-offline resources into www (keep index.html)
        run: |
          set -Eeuo pipefail

          test -f www/index.html
          echo "OK: keep existing www/index.html (no modification in YAML)"

          if [ -d "entry-offline/src/renderer/resources" ]; then
            mkdir -p "www/renderer/resources"
            cp -a "entry-offline/src/renderer/resources/." "www/renderer/resources/"
          fi

          RB="entry-offline/src/renderer_build"
          mkdir -p "www/renderer_build"
          cp -a "$RB/." "www/renderer_build/"

          test -f "www/renderer_build/init.bundle.js"
          test -f "www/renderer_build/render.bundle.js"

      # ✅✅ 핵심: EntryJS 이미지 트리를 www/images로 "하위폴더까지" 통째로 미러링
      - name: Mirror entryjs images tree into www/images (include subfolders)
        run: |
          set -Eeuo pipefail

          # rsync 설치 (우분투 기본에 있는 경우도 있지만 안전하게)
          sudo apt-get update -y
          sudo apt-get install -y rsync

          mkdir -p www/images

          if [ -d "www/lib/entryjs/images" ]; then
            echo "MIRROR: www/lib/entryjs/images -> www/images"
            rsync -a --ignore-existing "www/lib/entryjs/images/." "www/images/."
          fi

          # 어떤 스크립트는 entry-js 경로도 같이 쓰는 경우가 있어 같이 보강
          if [ -d "www/lib/entry-js/images" ]; then
            echo "MIRROR: www/lib/entry-js/images -> www/images"
            rsync -a --ignore-existing "www/lib/entry-js/images/." "www/images/."
          fi

          echo "== verify nested folders exist =="
          test -d "www/images/hw" || (echo "ERROR: www/images/hw missing" && exit 1)
          test -d "www/images/temp" || (echo "ERROR: www/images/temp missing" && exit 1)

          echo "== sample nested files =="
          find "www/images/hw" -maxdepth 1 -type f | head -n 20 || true
          find "www/images/temp" -maxdepth 1 -type f | head -n 20 || true

          echo "== counts =="
          echo -n "www/images total png: "; find www/images -type f -name "*.png" | wc -l || true
          echo -n "www/images nested(hw) png: "; find www/images/hw -type f -name "*.png" | wc -l || true

      - name: Ensure Android platform
        run: |
          set -Eeuo pipefail
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Copy web assets to Android
        run: |
          set -Eeuo pipefail
          npx cap sync android
          npx cap copy android
          du -sh android/app/src/main/assets/public || true

      - name: Allow cleartext localhost (for http scheme)
        run: |
          set -Eeuo pipefail
          MAN="android/app/src/main/AndroidManifest.xml"
          test -f "$MAN"
          if ! grep -q 'usesCleartextTraffic="true"' "$MAN"; then
            sed -i 's/<application /<application android:usesCleartextTraffic="true" /' "$MAN"
          fi
          grep -n 'usesCleartextTraffic' "$MAN" || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Build Debug APK
        run: |
          set -Eeuo pipefail
          cd android
          ./gradlew assembleDebug

      - name: Inspect APK contents (must include nested images)
        run: |
          set -Eeuo pipefail
          APK="android/app/build/outputs/apk/debug/app-debug.apk"
          test -f "$APK"

          echo "== renderer_build inside apk =="
          unzip -l "$APK" | grep -E "assets/public/renderer_build/(init|render)\.bundle\.js" || true

          echo "== images root count inside apk =="
          unzip -l "$APK" | grep -E "assets/public/images/" | wc -l || true

          echo "== nested hw/temp folders inside apk (IMPORTANT) =="
          unzip -l "$APK" | grep -E "assets/public/images/hw/" | head -n 30 || true
          unzip -l "$APK" | grep -E "assets/public/images/temp/" | head -n 30 || true

          echo "== spot check (transparent) =="
          unzip -l "$APK" | grep -E "assets/public/images/hw/transparent\.png" || true

      - name: Cleanup old artifacts (keep latest 1)
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const name = "app-debug";

            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner, repo, per_page: 100 }
            );

            const list = artifacts
              .filter(a => a.name === name && !a.expired)
              .sort((a,b) => new Date(a.created_at) - new Date(b.created_at));

            const toDelete = list.slice(0, Math.max(0, list.length - 1));
            for (const a of toDelete) {
              await github.rest.actions.deleteArtifact({ owner, repo, artifact_id: a.id });
            }

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1
