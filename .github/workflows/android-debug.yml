name: android-debug

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      # ✅ Yarn/Gradle 캐시
      - name: Cache Yarn
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/yarn
            ~/.yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install deps
        run: npm install

      - name: Fetch entry-offline source (git clone)
        run: |
          set -Eeuo pipefail
          rm -rf entry-offline || true
          git clone --depth 1 https://github.com/entrylabs/entry-offline.git entry-offline

          echo "== entry-offline top =="
          ls -la entry-offline | head -n 50 || true

          echo "== find main.html =="
          find entry-offline -type f -name "main.html" -print | head -n 50 || true

      # ✅ Linux(case-sensitive)에서 ./components/Index import 깨지는 문제 자동 보정
      - name: Patch entry-offline import casing (Index -> index)
        run: |
          set -Eeuo pipefail

          rm -f entry-offline/src/renderer/components/Index.tsx \
                entry-offline/src/renderer/components/Index.ts \
                entry-offline/src/renderer/components/Index.jsx \
                entry-offline/src/renderer/components/Index.js || true

          TARGET="entry-offline/src/renderer/renderEntry.tsx"
          if [ -f "$TARGET" ]; then
            sed -i 's#\./components/Index#./components/index#g' "$TARGET"
            sed -i 's#\./components/Index\.tsx#./components/index.tsx#g' "$TARGET" || true
            echo "PATCHED: $TARGET"
            grep -n "components/index" "$TARGET" || true
          else
            echo "ERROR: not found: $TARGET"
            exit 1
          fi

          grep -RIn --exclude-dir=node_modules "components/Index" entry-offline/src/renderer || true
          if grep -RIn --exclude-dir=node_modules "components/Index" entry-offline/src/renderer >/dev/null 2>&1; then
            find entry-offline/src/renderer -type f \( -name '*.ts' -o -name '*.tsx' -o -name '*.js' -o -name '*.jsx' \) -print0 \
              | xargs -0 sed -i 's#\./components/Index#./components/index#g'
            echo "PATCHED: renderer sources (bulk)"
          fi

          ls -la entry-offline/src/renderer/components | head -n 200 || true
          test ! -f entry-offline/src/renderer/components/Index.tsx || (echo "Index.tsx still exists" && exit 1)

      # ✅ entry-offline renderer_build 생성
      #   - Node18에서 webpack4/legacy hash면 ERR_OSSL_EVP_UNSUPPORTED가 뜰 수 있어
      #     openssl legacy provider로 우회
      - name: Build entry-offline renderer bundles
        env:
          NODE_OPTIONS: --openssl-legacy-provider
        run: |
          set -Eeuo pipefail
          corepack enable || true

          echo "== yarn install (entry-offline) =="
          yarn --cwd entry-offline install --frozen-lockfile || yarn --cwd entry-offline install

          echo "== try build commands (entry-offline) =="
          set +e
          for cmd in \
            "yarn --cwd entry-offline webpack" \
            "yarn --cwd entry-offline dist"
          do
            echo "TRY: $cmd"
            $cmd
            code=$?
            if [ $code -eq 0 ]; then
              echo "OK: build succeeded with: $cmd"
              break
            else
              echo "FAIL($code): $cmd"
            fi
          done
          set -e

          echo "== find renderer_build output =="
          find entry-offline -maxdepth 8 -type d -name "renderer_build" -print | head -n 20 || true
          test -f entry-offline/src/renderer_build/init.bundle.js
          test -f entry-offline/src/renderer_build/render.bundle.js

      - name: Fetch assets into www
        run: |
          set -Eeuo pipefail
          bash scripts/fetch_entry_assets.sh
          du -sh www || true
          ls -la www | head -n 80 || true
          test -f www/index.html

      # ✅✅ 핵심: www/images 가 없으면 ./images 는 당연히 안 보임
      # entryjs 이미지가 보통 www/lib/entryjs/images or www/lib/entry-js/images 아래로만 내려오는 케이스가 많음
      - name: Ensure www/images exists (sync from entryjs images)
        run: |
          set -Eeuo pipefail
          mkdir -p www/images

          if [ -d "www/lib/entryjs/images" ]; then
            rsync -a --delete "www/lib/entryjs/images/" "www/images/"
            echo "SYNC: www/lib/entryjs/images -> www/images"
          elif [ -d "www/lib/entry-js/images" ]; then
            rsync -a --delete "www/lib/entry-js/images/" "www/images/"
            echo "SYNC: www/lib/entry-js/images -> www/images"
          else
            echo "WARN: no entryjs images folder found under www/lib/"
          fi

          echo "== verify images =="
          ls -la www/images | head -n 50 || true
          test -f www/images/_1x1.png || true

      # ✅ entry-tool이 필요한 경우(네가 말한 repo)
      # index.html에서 lib/entry-tool/dist/entry-tool.(js|css) 를 로딩하므로
      # www/lib/entry-tool/dist/ 아래에 실제 파일을 만들어야 함. 1
      - name: Build entry-tool and copy into www/lib/entry-tool
        run: |
          set -Eeuo pipefail
          rm -rf entry-tool || true
          git clone --depth 1 https://github.com/entrylabs/entry-tool.git entry-tool

          echo "== entry-tool build scripts =="
          cat entry-tool/package.json | head -n 60 || true

          pushd entry-tool >/dev/null
          npm ci || npm install
          npm run build
          popd >/dev/null

          mkdir -p www/lib/entry-tool
          rm -rf www/lib/entry-tool/dist www/lib/entry-tool/lib || true
          cp -a entry-tool/dist www/lib/entry-tool/dist
          cp -a entry-tool/lib  www/lib/entry-tool/lib

          echo "== verify entry-tool =="
          ls -la www/lib/entry-tool/dist | head -n 50 || true
          test -f www/lib/entry-tool/dist/entry-tool.js
          test -f www/lib/entry-tool/dist/entry-tool.css

      # ✅ entry-offline 리소스 + 번들만 복사 (index.html 덮어쓰기 금지)
      - name: Copy entry-offline resources into www (keep index.html)
        run: |
          set -Eeuo pipefail

          test -f www/index.html
          echo "OK: using existing www/index.html"

          if [ -d "entry-offline/src/renderer/resources" ]; then
            mkdir -p "www/renderer/resources"
            cp -a "entry-offline/src/renderer/resources/." "www/renderer/resources/"
            echo "COPIED: renderer/resources"
          fi

          mkdir -p "www/renderer_build"
          cp -a "entry-offline/src/renderer_build/." "www/renderer_build/"
          echo "COPIED: entry-offline/src/renderer_build -> www/renderer_build"

          echo "== verify bundles =="
          test -f "www/renderer_build/init.bundle.js"
          test -f "www/renderer_build/render.bundle.js"

      # ✅✅ PNG 리인코딩: (1) 깨진/빈 파일 스킵 (2) tiny/깨짐은 1x1 투명 png로 대체 (3) 병렬
      - name: Re-encode ALL PNGs for Android WebView (skip broken, replace tiny, parallel)
        run: |
          set -Eeuo pipefail
          sudo apt-get update -y
          sudo apt-get install -y imagemagick

          # 1x1 transparent png 준비
          python3 - <<'PY'
          from PIL import Image
          import os
          os.makedirs("www/images", exist_ok=True)
          out="www/images/__transparent_1x1.png"
          if not os.path.exists(out):
            img=Image.new("RGBA",(1,1),(0,0,0,0))
            img.save(out, "PNG")
          print("transparent:", out)
          PY

          export TRANSPARENT="www/images/__transparent_1x1.png"

          # 파일 목록을 먼저 만들고 병렬 처리 (GitHub runner는 CPU 여유 있음)
          find www -type f -name "*.png" -print0 > /tmp/pngs.bin

          # 함수로 처리
          bash -lc '
            set -Eeuo pipefail
            handle_one() {
              f="$1"
              # 빈 파일 스킵
              if [ ! -s "$f" ]; then
                echo "SKIP (empty): $f"
                return 0
              fi

              # identify로 PNG 파싱 가능 여부/크기 확인
              if ! identify -quiet "$f" >/dev/null 2>&1; then
                echo "SKIP (broken): $f"
                return 0
              fi

              # tiny(1x1 등)인데 깨져 보이는 경우가 있어, 1x1은 그냥 투명으로 통일해도 UI에는 영향 거의 없음
              dims="$(identify -format "%wx%h" "$f" 2>/dev/null || true)"
              if [ "$dims" = "1x1" ]; then
                # 같은 파일이면 cp 에러 방지
                if [ "$f" != "$TRANSPARENT" ]; then
                  cp -f "$TRANSPARENT" "$f"
                  echo "REPLACE tiny png: $f"
                else
                  echo "SKIP (transparent self): $f"
                fi
                return 0
              fi

              # 정상 png는 PNG32로 재인코딩
              tmp="$f.tmp"
              if convert "$f" -strip -define png:color-type=6 -define png:bit-depth=8 "PNG32:$tmp" 2>/dev/null; then
                mv "$tmp" "$f"
              else
                rm -f "$tmp" || true
                echo "SKIP (convert-fail): $f"
              fi
            }
            export -f handle_one
            export TRANSPARENT

            # xargs 병렬
            tr "\0" "\n" < /tmp/pngs.bin | \
              xargs -I{} -P 6 bash -lc "handle_one \"{}\""
          '

      - name: Ensure Android platform
        run: |
          set -Eeuo pipefail
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Copy web assets to Android
        run: |
          set -Eeuo pipefail
          npx cap sync android
          npx cap copy android
          du -sh android/app/src/main/assets/public || true
          ls -la android/app/src/main/assets/public | head -n 80 || true

      - name: Allow cleartext localhost (for http scheme)
        run: |
          set -Eeuo pipefail
          MAN="android/app/src/main/AndroidManifest.xml"
          test -f "$MAN"
          if ! grep -q 'usesCleartextTraffic="true"' "$MAN"; then
            sed -i 's/<application /<application android:usesCleartextTraffic="true" /' "$MAN"
          fi
          grep -n 'usesCleartextTraffic' "$MAN" || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Build Debug APK
        run: |
          set -Eeuo pipefail
          cd android
          ./gradlew assembleDebug

      - name: Inspect APK contents (must include renderer_build + images)
        run: |
          set -Eeuo pipefail
          APK="android/app/build/outputs/apk/debug/app-debug.apk"
          test -f "$APK"

          echo "== renderer_build inside apk =="
          unzip -l "$APK" | grep -E "assets/public/renderer_build/(init|render)\.bundle\.js" || true

          echo "== images folder exists inside apk? =="
          unzip -l "$APK" | grep -E "assets/public/images/" | head -n 20 || true
          echo "== image count inside apk =="
          unzip -l "$APK" | grep -E "assets/public/images/" | wc -l || true

          echo "== entry-tool inside apk =="
          unzip -l "$APK" | grep -E "assets/public/lib/entry-tool/dist/entry-tool\.(js|css)" || true

      - name: Cleanup old artifacts (keep latest 1)
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const name = "app-debug";

            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner, repo, per_page: 100 }
            );

            const list = artifacts
              .filter(a => a.name === name && !a.expired)
              .sort((a,b) => new Date(a.created_at) - new Date(b.created_at));

            const toDelete = list.slice(0, Math.max(0, list.length - 1));
            for (const a of toDelete) {
              await github.rest.actions.deleteArtifact({ owner, repo, artifact_id: a.id });
            }

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1
