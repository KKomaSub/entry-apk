name: Build Entry Offline (Renderer) APK (Debug)

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout (this repo)
        uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # -----------------------------
      # 1) entry-offline 가져오기
      # -----------------------------
      - name: Clone entry-offline
        run: |
          rm -rf _entry-offline
          git clone --depth 1 https://github.com/entrylabs/entry-offline.git _entry-offline

      # -----------------------------
      # 2) entry-offline 설치 (충돌 해결)
      # -----------------------------
      - name: Install entry-offline deps
        working-directory: _entry-offline
        run: |
          npm install --legacy-peer-deps

      # -----------------------------
      # 3) renderer 빌드 (자동 탐색)
      # -----------------------------
      - name: Build renderer
        working-directory: _entry-offline
        run: |
          SCRIPT=$(node -e "const p=require('./package.json'); const s=p.scripts||{}; const c=['build:renderer','build-renderer','renderer:build','build:app','build']; console.log(c.find(k=>s[k])||'')")
          if [ -z "$SCRIPT" ]; then
            echo "❌ No renderer build script found"
            node -e "console.log(require('./package.json').scripts)"
            exit 1
          fi
          echo "Using script: $SCRIPT"
          npm run "$SCRIPT"

          echo "---- Searching renderer output ----"
          find . -type f -name "index.html" | head -n 50
          find . -type d -name "dist" -o -name "build" | head -n 50

      # -----------------------------
      # 4) renderer 결과를 www로 복사
      # -----------------------------
      - name: Copy renderer to www
        run: |
          rm -rf www
          mkdir -p www

          if [ -d "_entry-offline/renderer/dist" ]; then
            cp -r _entry-offline/renderer/dist/* www/
          elif [ -d "_entry-offline/app/renderer/dist" ]; then
            cp -r _entry-offline/app/renderer/dist/* www/
          elif [ -d "_entry-offline/dist/renderer" ]; then
            cp -r _entry-offline/dist/renderer/* www/
          elif [ -d "_entry-offline/build/renderer" ]; then
            cp -r _entry-offline/build/renderer/* www/
          else
            echo "❌ Renderer output not found"
            exit 1
          fi

          echo "---- www preview ----"
          ls -al www | head -n 100
          test -f www/index.html

      # -----------------------------
      # 5) Capacitor 준비
      # -----------------------------
      - name: Install Capacitor deps (this repo)
        run: npm install

      - name: Add & Sync Android
        run: |
          npx cap add android || true
          npx cap sync android

      # -----------------------------
      # 6) 아이콘 적용
      # -----------------------------
      - name: Generate App Icon
        run: |
          npm install -D @capacitor/assets
          mkdir -p assets
          curl -L "https://img.kkomaweb.com/api/image?id=cK9YkGqw&name=1000025550.png" -o assets/logo.png
          npx @capacitor/assets generate --android
          npx cap sync android

      # -----------------------------
      # 7) APK 빌드
      # -----------------------------
      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      # -----------------------------
      # 8) 업로드
      # -----------------------------
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: entry-offline-renderer-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # 1) entry-offline 소스 가져오기
      - name: Checkout entry-offline
        run: |
          rm -rf _entry-offline
          git clone --depth 1 https://github.com/entrylabs/entry-offline.git _entry-offline

      # 2) entry-offline renderer 빌드
      - name: Build entry-offline renderer
        working-directory: _entry-offline
        run: |
          npm install

          # 레포 버전에 따라 스크립트명이 달라질 수 있어 후보를 순차 시도
          npm run build:renderer || npm run build-renderer || npm run build || true

          echo "---- find possible outputs ----"
          find . -maxdepth 6 -type f -name "index.html" | head -n 80
          find . -maxdepth 6 -type d -name "dist" -o -name "build" | head -n 80

      # 3) (이 레포) Capacitor 의존성 설치
      - name: Install deps (this repo)
        run: npm install

      # 4) renderer 산출물을 www로 복사 (없으면 실패)
      - name: Copy renderer output into www
        run: |
          rm -rf www
          mkdir -p www

          if [ -d "_entry-offline/renderer/dist" ]; then
            cp -r _entry-offline/renderer/dist/* www/
          elif [ -d "_entry-offline/app/renderer/dist" ]; then
            cp -r _entry-offline/app/renderer/dist/* www/
          elif [ -d "_entry-offline/dist/renderer" ]; then
            cp -r _entry-offline/dist/renderer/* www/
          else
            echo "Renderer output not found. Check logs in 'find possible outputs' and adjust path."
            exit 1
          fi

          echo "---- www preview ----"
          ls -al www | head -n 200
          test -f www/index.html

      # 5) Capacitor Android 생성/동기화
      - name: Add & Sync Android (Capacitor)
        run: |
          npx cap add android || true
          npx cap sync android

      # 6) 아이콘 적용 (요청 이미지로 자동 생성)
      - name: Generate App Icon (Capacitor Assets)
        run: |
          npm install -D @capacitor/assets
          mkdir -p assets
          curl -L "https://img.kkomaweb.com/api/image?id=cK9YkGqw&name=1000025550.png" -o assets/logo.png
          npx @capacitor/assets generate --android
          npx cap sync android

      # 7) APK 빌드
      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      # 8) 산출물 업로드
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: entry-offline-renderer-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
