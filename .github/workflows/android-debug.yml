name: android-debug

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      # ✅ (추가) Yarn/Gradle 캐시
      - name: Cache Yarn
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/yarn
            ~/.yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install deps
        run: npm install

      - name: Fetch entry-offline source (git clone)
        run: |
          set -Eeuo pipefail
          rm -rf entry-offline || true
          git clone --depth 1 https://github.com/entrylabs/entry-offline.git entry-offline

          echo "== entry-offline top =="
          ls -la entry-offline | head -n 50 || true

          echo "== find main.html =="
          find entry-offline -type f -name "main.html" -print | head -n 50 || true

      # ✅ 추가: Linux(case-sensitive)에서 ./components/Index import 깨지는 문제 자동 보정
      - name: Patch entry-offline import casing (Index -> index)
        run: |
          set -Eeuo pipefail

          rm -f entry-offline/src/renderer/components/Index.tsx \
                entry-offline/src/renderer/components/Index.ts \
                entry-offline/src/renderer/components/Index.jsx \
                entry-offline/src/renderer/components/Index.js || true

          TARGET="entry-offline/src/renderer/renderEntry.tsx"
          if [ -f "$TARGET" ]; then
            sed -i 's#\./components/Index#./components/index#g' "$TARGET"
            sed -i 's#\./components/Index\.tsx#./components/index.tsx#g' "$TARGET" || true
            echo "PATCHED: $TARGET"
            grep -n "components/index" "$TARGET" || true
          else
            echo "ERROR: not found: $TARGET"
            exit 1
          fi

          grep -RIn --exclude-dir=node_modules "components/Index" entry-offline/src/renderer || true
          if grep -RIn --exclude-dir=node_modules "components/Index" entry-offline/src/renderer >/dev/null 2>&1; then
            find entry-offline/src/renderer -type f \( -name '*.ts' -o -name '*.tsx' -o -name '*.js' -o -name '*.jsx' \) -print0 \
              | xargs -0 sed -i 's#\./components/Index#./components/index#g'
            echo "PATCHED: renderer sources (bulk)"
          fi

          ls -la entry-offline/src/renderer/components | head -n 200 || true
          test ! -f entry-offline/src/renderer/components/Index.tsx || (echo "Index.tsx still exists" && exit 1)

      # ✅ 추가: entry-offline renderer_build 실제 생성 (흰화면 방지의 핵심)
      - name: Build entry-offline renderer bundles
        run: |
          set -Eeuo pipefail
          corepack enable || true

          echo "== entry-offline package scripts =="
          (cat entry-offline/package.json | head -n 120) || true

          echo "== yarn install (entry-offline) =="
          yarn --cwd entry-offline install --frozen-lockfile || yarn --cwd entry-offline install

          echo "== try build commands (entry-offline) =="
          set +e
          for cmd in \
            "yarn --cwd entry-offline build" \
            "yarn --cwd entry-offline build:renderer" \
            "yarn --cwd entry-offline build-renderer" \
            "yarn --cwd entry-offline build:webpack" \
            "yarn --cwd entry-offline webpack" \
            "yarn --cwd entry-offline dist"
          do
            echo "TRY: $cmd"
            $cmd
            code=$?
            if [ $code -eq 0 ]; then
              echo "OK: build succeeded with: $cmd"
              break
            else
              echo "FAIL($code): $cmd"
            fi
          done
          set -e

          echo "== find renderer_build output =="
          find entry-offline -maxdepth 6 -type d -name "renderer_build" -print | head -n 20 || true
          find entry-offline -maxdepth 8 -type f -name "init.bundle.js" -print | head -n 20 || true
          find entry-offline -maxdepth 8 -type f -name "render.bundle.js" -print | head -n 20 || true

      - name: Fetch assets into www
        run: |
          set -Eeuo pipefail
          bash scripts/fetch_entry_assets.sh
          du -sh www || true
          ls -la www | head -n 80 || true
          test -f www/index.html

      # ✅ entry-offline 리소스 + 번들만 복사 (index.html 덮어쓰기 금지)
      - name: Copy entry-offline resources into www (keep index.html)
        run: |
          set -Eeuo pipefail

          test -f www/index.html
          echo "OK: using existing www/index.html"

          if [ -d "entry-offline/src/renderer/resources" ]; then
            mkdir -p "www/renderer/resources"
            cp -a "entry-offline/src/renderer/resources/." "www/renderer/resources/"
            echo "COPIED: renderer/resources"
          fi

          RB="$(find entry-offline -maxdepth 10 -type d -name "renderer_build" | head -n 1 || true)"
          if [ -n "$RB" ] && [ -d "$RB" ]; then
            mkdir -p "www/renderer_build"
            cp -a "$RB/." "www/renderer_build/"
            echo "COPIED: $RB -> www/renderer_build"
          else
            echo "ERROR: renderer_build not found"
            exit 1
          fi
          echo "== verify bundles =="
          test -f "www/renderer_build/init.bundle.js"
          test -f "www/renderer_build/render.bundle.js"

      - name: Debug list entry media files in www
        run: |
          set -Eeuo pipefail
          echo "== entry media svg/png in www =="
          ls -la "www/lib/@entrylabs/entry/images/media" | head -n 200 || true
          echo "== grep entrybot1 in www =="
          find "www/lib/@entrylabs/entry/images/media" -maxdepth 1 -type f | grep -i entrybot1 || true

      # ✅✅ (추가) 하위폴더 이미지 경로/대소문자/레거시 요청 자동 보정 (이 step만 추가)
      - name: Fix missing images paths (case/legacy) in www
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          import os, re, shutil

          ROOT = "www"

          img_root = os.path.join(ROOT, "images")
          img_index = {}
          if os.path.isdir(img_root):
            for dirpath, _, filenames in os.walk(img_root):
              for fn in filenames:
                rel = os.path.relpath(os.path.join(dirpath, fn), ROOT).replace("\\", "/")
                img_index[rel.lower()] = rel
          else:
            print("[fix-images] no www/images folder; skip")
            raise SystemExit(0)

          pat = re.compile(r'(?:(?:/|\.{0,2}/)images/)[A-Za-z0-9_\-./]+')
          refs = set()

          for dirpath, _, filenames in os.walk(ROOT):
            for fn in filenames:
              if not (fn.endswith(".js") or fn.endswith(".css") or fn.endswith(".html")):
                continue
              p = os.path.join(dirpath, fn)
              try:
                data = open(p, "rb").read()
              except:
                continue
              s = data.decode("utf-8", "ignore")
              for m in pat.findall(s):
                u = m.replace("\\", "/")
                u = re.sub(r'^(?:/|\./|\.\./)+', '', u)
                if u.startswith("images/"):
                  refs.add(u)

          made = 0
          missing = 0
          for ref in sorted(refs):
            dst = os.path.join(ROOT, ref)
            if os.path.exists(dst):
              continue
            src_rel = img_index.get(ref.lower())
            if not src_rel:
              missing += 1
              continue
            src = os.path.join(ROOT, src_rel)
            os.makedirs(os.path.dirname(dst), exist_ok=True)
            shutil.copy2(src, dst)
            made += 1

          print(f"[fix-images] refs={len(refs)} made={made} still-missing={missing}")

          icon_dir = os.path.join(ROOT, "images", "icon")
          os.makedirs(icon_dir, exist_ok=True)

          src_blk = os.path.join(ROOT, "images", "block_icon")
          dst_blk = os.path.join(ROOT, "images", "icon", "block_icon")
          if os.path.isdir(src_blk) and not os.path.isdir(dst_blk):
            shutil.copytree(src_blk, dst_blk)
            print("[fix-images] copied block_icon -> images/icon/block_icon")

          chk = os.path.join(ROOT, "images", "icon", "block_icon", "ai_hand_icon.svg")
          print("[fix-images] check:", chk, "OK" if os.path.exists(chk) else "MISS")
          PY

      - name: Make PNG fallback for SVG icons (block_icon etc.)
        run: |
          set -Eeuo pipefail
          sudo apt-get update -y
          sudo apt-get install -y librsvg2-bin
          if [ -d "www/images/block_icon" ]; then
            find www/images/block_icon -type f -name '*.svg' -print0 | while IFS= read -r -d '' f; do
              out="${f%.svg}.png"
              if [ ! -f "$out" ]; then
                rsvg-convert "$f" -o "$out" || true
              fi
            done
          fi
          if [ -d "www/images/icon/block_icon" ]; then
            find www/images/icon/block_icon -type f -name '*.svg' -print0 | while IFS= read -r -d '' f; do
              out="${f%.svg}.png"
              if [ ! -f "$out" ]; then
                rsvg-convert "$f" -o "$out" || true
              fi
            done
          fi
          echo "PNG fallback count:"
          find www/images -type f -name '*.png' | wc -l || true

      - name: Convert SVG icons to PNG (for Android Canvas)
        run: |
          set -Eeuo pipefail
          sudo apt-get update -y
          sudo apt-get install -y librsvg2-bin
          find www/images -type f -name "*.svg" -print0 | while IFS= read -r -d '' f; do
            out="${f%.svg}.png"
            if [ ! -f "$out" ]; then
              rsvg-convert "$f" -o "$out" || true
            fi
          done
          echo "SVG count:"; find www/images -type f -name "*.svg" | wc -l || true
          echo "PNG count:"; find www/images -type f -name "*.png" | wc -l || true

      - name: Convert @entrylabs entry SVG to PNG (for Android Canvas)
        run: |
          set -Eeuo pipefail
          sudo apt-get update -y
          sudo apt-get install -y librsvg2-bin
          if [ -d "www/lib/@entrylabs/entry/images" ]; then
            find "www/lib/@entrylabs/entry/images" -type f -name "*.svg" -print0 | while IFS= read -r -d '' f; do
              out="${f%.svg}.png"
              if [ ! -f "$out" ]; then
                rsvg-convert "$f" -o "$out" || true
              fi
            done
          fi
          echo "entry lib SVG count:"; find "www/lib/@entrylabs/entry/images" -type f -name "*.svg" | wc -l || true
          echo "entry lib PNG count:"; find "www/lib/@entrylabs/entry/images" -type f -name "*.png" | wc -l || true

      # ✅✅✅✅✅ (추가) 아이콘/미디어 PNG가 너무 큰 경우만 자동 축소(크게 보임 방지)
      - name: Normalize oversized PNG dimensions (only shrink)
        run: |
          set -Eeuo pipefail
          sudo apt-get update -y
          sudo apt-get install -y imagemagick

          # 1) block_icon 계열: 128px 이상은 128로 축소 (큰 것만)
          for d in \
            "www/images/block_icon" \
            "www/images/icon/block_icon" \
            "www/lib/@entrylabs/entry/images/block_icon" \
            "www/lib/@entrylabs/entry/images/icon/block_icon"
          do
            if [ -d "$d" ]; then
              find "$d" -type f -name "*.png" -print0 | while IFS= read -r -d '' f; do
                mogrify -resize 128x128\> "$f" 2>/dev/null || true
              done
            fi
          done

          # 2) media(캐릭터/로고 등): 512px 이상은 512로 축소 (큰 것만)
          for d in \
            "www/lib/@entrylabs/entry/images/media" \
            "www/lib/entry-js/images"
          do
            if [ -d "$d" ]; then
              find "$d" -type f -name "*.png" -print0 | while IFS= read -r -d '' f; do
                mogrify -resize 512x512\> "$f" 2>/dev/null || true
              done
            fi
          done

      # ✅✅✅✅✅ (핵심) PNG가 실제 존재하는 경우에만 .svg 참조를 .png로 병렬 치환
      - name: Rewrite SVG refs to PNG where PNG exists (parallel)
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          import os, re
          from concurrent.futures import ProcessPoolExecutor, as_completed
          from urllib.parse import urlparse

          ROOT = "www"
          exts = (".js", ".css", ".html")

          pat = re.compile(
              r'((?:https?://[^"\'\)\s]+)?'
              r'(?:/|\./|\.\./)?'
              r'(?:lib/@entrylabs/entry/images|images)/'
              r'[A-Za-z0-9_\-./]+?)'
              r'\.svg'
              r'(\b|[?#"\'\)\s])'
          )

          def norm_to_fs(path_with_opt_url: str) -> str:
              if path_with_opt_url.startswith("http://") or path_with_opt_url.startswith("https://"):
                  p = urlparse(path_with_opt_url).path
              else:
                  p = path_with_opt_url
              p = p.replace("\\", "/")
              while p.startswith("../"):
                  p = p[3:]
              if p.startswith("./"):
                  p = p[2:]
              if p.startswith("/"):
                  p = p[1:]
              return p

          def process_file(fp: str):
              try:
                  raw = open(fp, "rb").read()
              except:
                  return (fp, 0, 0)

              s = raw.decode("utf-8", "ignore")
              changed = 0
              scanned = 0

              def repl(m):
                  nonlocal changed, scanned
                  scanned += 1
                  base = m.group(1)
                  tail = m.group(2)

                  fs_rel = norm_to_fs(base)
                  png_path = os.path.join(ROOT, fs_rel + ".png")
                  if os.path.exists(png_path):
                      changed += 1
                      return base + ".png" + tail
                  return m.group(0)

              ns, _ = pat.subn(repl, s)
              if changed:
                  open(fp, "wb").write(ns.encode("utf-8"))
              return (fp, scanned, changed)

          files = []
          for dp, _, fns in os.walk(ROOT):
              for fn in fns:
                  if fn.endswith(exts):
                      files.append(os.path.join(dp, fn))

          total_scanned = 0
          total_changed = 0
          touched_files = 0

          workers = min(12, (os.cpu_count() or 4))
          with ProcessPoolExecutor(max_workers=workers) as ex:
              futs = [ex.submit(process_file, f) for f in files]
              for fut in as_completed(futs):
                  fp, scanned, changed = fut.result()
                  total_scanned += scanned
                  total_changed += changed
                  if changed:
                      touched_files += 1

          print(f"[rewrite-svg->png] files={len(files)} touched={touched_files} scanned={total_scanned} changed={total_changed} workers={workers}")
          PY

      # ✅✅✅✅✅ PNG 재인코딩 (Android WebView broken image 방지) - 깨진 PNG는 스킵
      - name: Re-encode ALL PNGs for Android WebView
        run: |
          set -Eeuo pipefail
          sudo apt-get update -y
          sudo apt-get install -y imagemagick

          find www -type f -name "*.png" -print0 | while IFS= read -r -d '' f; do
            if [ ! -s "$f" ]; then
              echo "SKIP (empty): $f"
              continue
            fi

            convert "$f" -strip -define png:color-type=6 -define png:bit-depth=8 PNG32:"$f".tmp 2>/dev/null || {
              echo "SKIP (broken): $f"
              rm -f "$f".tmp || true
              continue
            }

            mv "$f".tmp "$f"
          done
      # ✅✅✅✅✅ (추가) PNG 디코딩 실패 파일 자동 복구: SVG 있으면 재생성, 없으면 1x1 투명으로 대체
      - name: Repair broken PNGs (regen from SVG or replace)
        run: |
          set -Eeuo pipefail
          sudo apt-get update -y
          sudo apt-get install -y imagemagick librsvg2-bin

          repaired=0
          replaced=0
          checked=0

          find www -type f -name "*.png" -print0 | while IFS= read -r -d '' f; do
            checked=$((checked+1))

            # identify로 디코딩 가능 여부 체크
            if identify "$f" >/dev/null 2>&1; then
              continue
            fi

            base="${f%.png}"
            svg="$base.svg"

            if [ -f "$svg" ]; then
              # SVG가 있으면 PNG 재생성
              rsvg-convert "$svg" -o "$f" >/dev/null 2>&1 || true
              # 그래도 깨졌으면 1x1로 대체
              if ! identify "$f" >/dev/null 2>&1; then
                convert -size 1x1 xc:none "$f" >/dev/null 2>&1 || true
                replaced=$((replaced+1))
                echo "REPLACED(1x1): $f"
              else
                repaired=$((repaired+1))
                echo "REPAIRED(from svg): $f"
              fi
            else
              # SVG도 없으면 1x1 투명으로 대체
              convert -size 1x1 xc:none "$f" >/dev/null 2>&1 || true
              replaced=$((replaced+1))
              echo "REPLACED(1x1): $f"
            fi
          done

          echo "DONE repair-broken-png: checked=$checked repaired=$repaired replaced=$replaced"

      - name: Ensure Android platform
        run: |
          set -Eeuo pipefail
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Copy web assets to Android
        run: |
          set -Eeuo pipefail
          npx cap sync android
          npx cap copy android
          du -sh android/app/src/main/assets/public || true
          ls -la android/app/src/main/assets/public | head -n 80 || true

      - name: Allow cleartext localhost (for http scheme)
        run: |
          set -Eeuo pipefail
          MAN="android/app/src/main/AndroidManifest.xml"
          test -f "$MAN"
          if ! grep -q 'usesCleartextTraffic="true"' "$MAN"; then
            sed -i 's/<application /<application android:usesCleartextTraffic="true" /' "$MAN"
          fi
          grep -n 'usesCleartextTraffic' "$MAN" || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Build Debug APK
        run: |
          set -Eeuo pipefail
          cd android
          ./gradlew assembleDebug

      - name: Inspect APK contents (must include renderer_build + images)
        run: |
          set -Eeuo pipefail
          APK="android/app/build/outputs/apk/debug/app-debug.apk"
          test -f "$APK"

          echo "== renderer_build inside apk =="
          unzip -l "$APK" | grep -E "assets/public/renderer_build/(init|render)\.bundle\.js" || true

          echo "== image count inside apk =="
          unzip -l "$APK" | grep -E "assets/public/images/" | wc -l || true

          echo "== sample nested file inside apk =="
          unzip -l "$APK" | grep -F "assets/public/images/block_icon/ai_hand_icon.svg" || true
          echo "== test func_icon.svg =="
          unzip -l "$APK" | grep -F "assets/public/images/block_icon/func_icon.svg" || true

          echo "== entrybot1 png in apk =="
          unzip -l "$APK" | grep -F "assets/public/lib/@entrylabs/entry/images/media/entrybot1.png" || true
          echo "== entrybot1 svg/png in apk =="
          unzip -l "$APK" | grep -E "assets/public/lib/@entrylabs/entry/images/media/entrybot1\.(svg|png)" || true

      - name: Cleanup old artifacts (keep latest 1)
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const name = "app-debug";

            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner, repo, per_page: 100 }
            );

            const list = artifacts
              .filter(a => a.name === name && !a.expired)
              .sort((a,b) => new Date(a.created_at) - new Date(b.created_at));

            const toDelete = list.slice(0, Math.max(0, list.length - 1));
            for (const a of toDelete) {
              await github.rest.actions.deleteArtifact({ owner, repo, artifact_id: a.id });
            }

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1
