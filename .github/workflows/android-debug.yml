name: android-debug

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install deps
        run: |
          npm install --legacy-peer-deps

      # ✅ 아이콘 원본을 레포에 안 올렸다면 여기서 URL로 받아도 됨
      - name: Ensure icon source (assets/icon.png)
        run: |
          mkdir -p assets
          if [ ! -f assets/icon.png ]; then
            echo "Downloading icon.png ..."
            curl -L --fail -o assets/icon.png "https://img.kkomaweb.com/api/image?id=cK9YkGqw&name=1000025550.png"
          fi
          ls -al assets/icon.png

      - name: Generate Android icons/splash
        run: |
          npm run assets

      - name: Fetch Entry assets (offline vendoring)
        run: |
          npm run fetch

      - name: Make JS bundle
        run: |
          npm run bundle

      - name: Setup Java (17)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor CLI
        run: |
          npm i -g @capacitor/cli

      - name: Add Android platform (if missing) and sync
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: EntryOffline-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
