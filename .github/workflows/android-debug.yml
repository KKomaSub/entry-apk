name: Build Debug APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------
      # Node 환경
      # ------------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps

      # ------------------------------
      # 웹 자산 fetch
      # ------------------------------
      - name: Fetch entry assets
        run: |
          chmod +x scripts/fetch_entry_assets.sh
          npm run fetch

      # ------------------------------
      # Android 빌드 준비
      # ------------------------------
      - name: Install Capacitor
        run: |
          npx cap sync android

      # ------------------------------
      # Java 17 (AGP 8+ 대응)
      # ------------------------------
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ------------------------------
      # Gradle build
      # ------------------------------
      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      # ------------------------------
      # APK 위치 디버깅 출력
      # ------------------------------
      - name: Locate build outputs
        run: |
          echo "=== Searching APK ==="
          find android -type f -name "*.apk" -maxdepth 8 || true
          echo "=== Searching AAB ==="
          find android -type f -name "*.aab" -maxdepth 8 || true
          echo "=== Output directories ==="
          ls -al android/app/build/outputs || true
          ls -al android/app/build/outputs/apk || true
          ls -al android/app/build/outputs/apk/debug || true

      # ------------------------------
      # 아티팩트 업로드 (자동 탐색)
      # ------------------------------
      - name: Upload APK/AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            android/**/build/outputs/**/*.apk
            android/**/build/outputs/**/*.aab
