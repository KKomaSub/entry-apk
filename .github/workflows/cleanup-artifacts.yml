name: cleanup-artifacts

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete old artifacts (keep latest 1 per name)
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner, repo, per_page: 100 }
            );

            // 이름별로 그룹화
            const byName = new Map();
            for (const a of artifacts) {
              if (a.expired) continue;
              if (!byName.has(a.name)) byName.set(a.name, []);
              byName.get(a.name).push(a);
            }

            // 각 이름별로 최신 1개만 남기고 삭제
            for (const [name, list] of byName.entries()) {
              list.sort((a,b) => new Date(b.created_at) - new Date(a.created_at)); // 최신 먼저
              const keep = list.slice(0, 1);
              const del = list.slice(1);

              core.info(`[${name}] keep=${keep.length}, delete=${del.length}`);
              for (const a of del) {
                core.info(`Deleting artifact id=${a.id} created_at=${a.created_at}`);
                await github.rest.actions.deleteArtifact({ owner, repo, artifact_id: a.id });
              }
            }

      - name: Delete Actions caches (optional, big space)
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const caches = await github.paginate(
              github.rest.actions.getActionsCacheList,
              { owner, repo, per_page: 100 }
            );

            core.info(`Caches found: ${caches.length}`);
            for (const c of caches) {
              core.info(`Deleting cache id=${c.id} key=${c.key} size=${c.size_in_bytes}`);
              await github.rest.actions.deleteActionsCacheById({ owner, repo, cache_id: c.id });
            }
