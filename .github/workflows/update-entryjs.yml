name: Update vendored EntryJS assets

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install deps (if package.json exists)
        run: |
          if [ -f package.json ]; then
            npm install --legacy-peer-deps || true
          fi

      - name: Fetch entry assets
        run: |
          chmod +x scripts/fetch_entry_assets.sh
          MAX_JOBS=6 bash scripts/fetch_entry_assets.sh || true

      - name: Git status
        run: |
          git status --porcelain

      - name: Commit changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: update vendored entryjs assets"
            git push
          else
            echo "No changes to commit."
          fi
