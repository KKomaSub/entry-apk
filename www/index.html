<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Entry Offline Editor</title>

  <!-- ✅ 절대경로 기준을 고정 (capacitor https://localhost/ 에서도 / 로 동작) -->
  <base href="/" />

  <!-- CSS -->
  <link rel="stylesheet" href="/lib/entry-tool/dist/entry-tool.css" />
  <link rel="stylesheet" href="/lib/entryjs/dist/entry.css" />
  <link rel="stylesheet" href="/overrides.css" />

  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#111}
    #entryContainer{width:100%;height:100%;background:#f5f5f5}
    #boot{
      position:fixed;inset:0;background:#000;color:#0f0;
      font:12px/1.45 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      padding:12px;white-space:pre-wrap;overflow:auto;z-index:999999;
    }
    .bad{color:#ff5c5c}
    .dim{opacity:.8}
    .ok{color:#66ff66}
  </style>

  <script>
    function bootLine(t, cls="") {
      const el = document.getElementById("boot");
      if (!el) return;
      const d = document.createElement("div");
      if (cls) d.className = cls;
      d.textContent = t;
      el.appendChild(d);
      el.scrollTop = el.scrollHeight;
    }
    window.onerror = function (m, s, l, c, e) {
      bootLine("JS ERROR:", "bad");
      bootLine(String(e && e.stack ? e.stack : m), "bad");
    };
  </script>

  <!-- =========================================================
       1) “필수 전역” 먼저: lodash/_ + jQuery + createjs + codemirror
       ========================================================= -->

  <!-- ws/locales.js (있으면 사용, 없으면 Entry는 대부분 동작하지만 일부 기능/문구 깨질 수 있음) -->
  <script>
    (function(){
      const p="/js/ws/locales.js";
      fetch(p).then(r=>{
        bootLine("LOAD ws/locales.js: " + p);
        if(!r.ok) throw new Error("HTTP "+r.status);
        return r.text();
      }).then(code=>{
        (0,eval)(code);
        bootLine("OK   ws/locales.js","ok");
      }).catch(e=>{
        bootLine("MISS ws/locales.js: "+(e.message||e),"bad");
      });
    })();
  </script>

  <!-- lodash: EntryJS가 기대하는 _ -->
  <script src="/lib/lodash/dist/lodash.min.js"></script>
  <script>
    // EntryJS 구버전 호환: underscore 함수명 일부를 lodash로 브릿지
    // (Entry가 _.contains, _.findWhere 등을 쓰는 케이스가 많음)
    if (window._) {
      if (typeof _.contains !== "function") _.contains = _.includes;
      if (typeof _.findWhere !== "function") {
        _.findWhere = function(arr, props){
          return _.find(arr, function(o){
            for (const k in props) { if (o?.[k] !== props[k]) return false; }
            return true;
          });
        };
      }
    }
  </script>

  <!-- jQuery + jQuery UI (EntryJS 공식 요구 버전대) -->
  <script src="/lib/jquery/jquery.min.js"></script>
  <script src="/lib/jquery-ui/ui/minified/jquery-ui.min.js"></script>

  <!-- CreateJS (createjs 전역 제공) -->
  <script src="/lib/PreloadJS/lib/preloadjs-0.6.0.min.js"></script>
  <script src="/lib/EaselJS/lib/easeljs-0.8.0.min.js"></script>
  <script src="/lib/SoundJS/lib/soundjs-0.6.0.min.js"></script>
  <!-- flashaudioplugin은 최신 환경에서 “선택”이라 없어도 됨 (로그에 optional 처리 중) -->
  <script>
    (function(){
      const p="/lib/SoundJS/lib/flashaudioplugin-0.6.0.min.js";
      const s=document.createElement("script");
      s.src=p;
      s.onload=()=>bootLine("OK   flashaudioplugin(optional)","dim");
      s.onerror=()=>bootLine("MISS flashaudioplugin(optional)","dim");
      document.head.appendChild(s);
    })();
  </script>

  <!-- CodeMirror (textCodingEnable 켜면 필요) -->
  <link rel="stylesheet" href="/lib/codemirror/codemirror.css" />
  <script src="/lib/codemirror/codemirror.js"></script>
  <script src="/lib/codemirror/vim.js"></script>

  <!-- =========================================================
       2) Entry “선행 전역” (Lang / EntryStatic / EaselHandle / BigNumber / EntryTool / EntryVideoLegacy / EntrySoundEditor)
       ========================================================= -->

  <!-- Lang / static / handle / BigNumber -->
  <script src="/lib/entryjs/extern/lang/ko.js"></script>
  <script src="/lib/entryjs/extern/util/static.js"></script>
  <script src="/lib/entryjs/extern/util/handle.js"></script>
  <script src="/lib/entryjs/extern/util/bignumber.min.js"></script>

  <!-- ✅ entry-tool / entry-paint 는 entry.min.js 보다 “먼저” -->
  <script src="/lib/entry-tool/dist/entry-tool.js"></script>
  <script src="/lib/entry-paint/dist/static/js/entry-paint.js"></script>

  <!-- ✅ legacy-video (이미 fetch에서 /lib/module/legacy-video/index.js 로 가져오고 있음) -->
  <script>
    (function(){
      const p="/lib/module/legacy-video/index.js";
      const s=document.createElement("script");
      s.src=p;
      s.onload=()=>bootLine("OK   EntryVideoLegacy","ok");
      s.onerror=()=>bootLine("MISS EntryVideoLegacy: "+p,"bad");
      document.head.appendChild(s);
    })();
  </script>

  <!-- ✅ sound-editor (EntrySoundEditor 제공) : entry.min.js보다 반드시 먼저 -->
  <script>
    (function(){
      // fetch 스크립트에서 아래 경로 중 하나로 반드시 저장되게 맞추면 됩니다.
      // 우선 1순위 /external/sound/sound-editor.js 로 가정
      const candidates = [
        "/external/sound/sound-editor.js",
        "/lib/external/sound/sound-editor.js",
        "/sound/sound-editor.js"
      ];
      let i = 0;

      function tryLoad() {
        if (i >= candidates.length) {
          bootLine("MISS EntrySoundEditor: all candidates failed", "bad");
          return;
        }
        const p = candidates[i++];
        const s = document.createElement("script");
        s.src = p;
        s.onload = () => bootLine("OK   EntrySoundEditor ("+p+")", "ok");
        s.onerror = () => { bootLine("MISS EntrySoundEditor: "+p, "bad"); tryLoad(); };
        document.head.appendChild(s);
      }
      tryLoad();
    })();
  </script>

  <!-- =========================================================
       3) Entry core (마지막)
       ========================================================= -->
  <script src="/lib/entryjs/dist/entry.min.js"></script>

</head>

<body>
  <div id="entryContainer"></div>
  <div id="boot">Entry Offline Editor\nLoading…</div>

  <script>
    function must(name, ok) {
      bootLine(name + " = " + ok, ok ? "ok" : "bad");
      if (!ok) throw new Error(name + " missing");
    }

    document.addEventListener("DOMContentLoaded", () => {
      try {
        // 전역 점검
        must("_ (lodash)", typeof window._ === "function" || typeof window._ === "object");
        bootLine("_.memoize = " + (window._ ? typeof _.memoize : "N/A"), (window._ && typeof _.memoize==="function") ? "ok" : "bad");
        bootLine("_.chain = " + (window._ ? typeof _.chain : "N/A"), (window._ && typeof _.chain==="function") ? "ok" : "bad");
        bootLine("_.contains = " + (window._ ? typeof _.contains : "N/A"), (window._ && typeof _.contains==="function") ? "ok" : "bad");

        must("$ (jQuery)", typeof window.$ === "function");
        bootLine("$.fn.jquery = " + (window.$?.fn?.jquery || "N/A"), window.$?.fn?.jquery ? "ok" : "bad");

        must("createjs", typeof window.createjs === "object");
        must("Lang", typeof window.Lang === "object");
        must("EaselHandle", typeof window.EaselHandle === "function");
        must("BigNumber", typeof window.BigNumber === "function");
        must("CodeMirror", typeof window.CodeMirror === "function");

        // 선행 모듈들
        bootLine("EntryTool = " + (typeof window.EntryTool), window.EntryTool ? "ok" : "bad");
        bootLine("EntryVideoLegacy = " + (typeof window.EntryVideoLegacy), window.EntryVideoLegacy ? "ok" : "bad");
        bootLine("EntrySoundEditor = " + (typeof window.EntrySoundEditor), window.EntrySoundEditor ? "ok" : "bad");

        // Entry core
        must("Entry", typeof window.Entry === "object");
        bootLine("Entry.init = " + (typeof window.Entry.init), (typeof window.Entry.init === "function") ? "ok" : "bad");
        if (typeof window.Entry.init !== "function") {
          throw new Error("Entry.init missing (entry.min.js crashed earlier) — check EntrySoundEditor/EntryTool/EntryVideoLegacy order+paths");
        }

        bootLine("Starting Entry.init …", "dim");

        const initOption = {
          type: "workspace",
          libDir: "/lib",
          textCodingEnable: true,
          // 필요하면 false로 내려서 CodeMirror 의존성도 끌 수 있음
          // textCodingEnable: false,
        };

        // Entry 문서에 있는 이벤트 초기화 패턴(일부 환경에서 필요) 1
        Entry.creationChangedEvent = new Entry.Event(window);

        Entry.init(document.getElementById("entryContainer"), initOption);
        Entry.loadProject();

        const boot = document.getElementById("boot");
        if (boot) boot.remove();
      } catch (e) {
        bootLine("Boot Error", "bad");
        bootLine(String(e && e.stack ? e.stack : e), "bad");
      }
    });
  </script>
</body>
</html>
