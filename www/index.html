<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Entry Offline Editor</title>

  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#111}
    #entryContainer{width:100%;height:100%;background:#f5f5f5}
    #boot{
      position:fixed;inset:0;background:#000;color:#0f0;
      font:12px/1.45 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      padding:12px;white-space:pre-wrap;overflow:auto;z-index:9999
    }
    .bad{color:#ff5c5c}
    .dim{opacity:.85}
    .ok{color:#66ff66}
  </style>
<script>
(function(){
  // BASE 자동탐지 결과를 쓰고 싶지만, 탐지 전에 필요한 경우가 많아서
  // "현재 index.html 기준 상대경로"를 1차 기준으로 잡습니다.
  // => ./images/..., ./media/... 는 Capacitor에서 가장 안정적으로 동작합니다.
  const REL_BASE = './';

  const rewrite = (u) => {
    try {
      if (!u) return u;
      // 이미 상대경로면 그대로
      if (u.startsWith('./') || u.startsWith('../')) return u;
      // data/blob는 그대로
      if (u.startsWith('data:') || u.startsWith('blob:')) return u;

      // 절대경로 자산만 상대경로로 강제 변환
      if (u.startsWith('/images/')) return REL_BASE + u.slice(1);
      if (u.startsWith('/media/'))  return REL_BASE + u.slice(1);
      if (u.startsWith('/uploads/'))return REL_BASE + u.slice(1);

      return u;
    } catch(e){ return u; }
  };

  // fetch 리라이트
  const _fetch = window.fetch;
  window.fetch = function(input, init){
    try{
      if (typeof input === 'string') input = rewrite(input);
      else if (input && input.url) input = new Request(rewrite(input.url), input);
    }catch(e){}
    return _fetch.call(this, input, init);
  };

  // XHR 리라이트
  const _open = XMLHttpRequest.prototype.open;
  XMLHttpRequest.prototype.open = function(method, url){
    return _open.call(this, method, rewrite(url), ...[].slice.call(arguments, 2));
  };

  // DOM src/href(이미지/오디오/비디오/링크) 리라이트: MutationObserver로 강제
  const fixEl = (el) => {
    if (!el || !el.getAttribute) return;
    if (el.hasAttribute('src')) {
      const s = el.getAttribute('src');
      const r = rewrite(s);
      if (r !== s) el.setAttribute('src', r);
    }
    if (el.hasAttribute('href')) {
      const h = el.getAttribute('href');
      const r = rewrite(h);
      if (r !== h) el.setAttribute('href', r);
    }
  };

  new MutationObserver((muts)=>{
    for (const m of muts){
      if (m.type === 'attributes') fixEl(m.target);
      if (m.addedNodes){
        m.addedNodes.forEach(n=>{
          if (n.nodeType===1){
            fixEl(n);
            n.querySelectorAll && n.querySelectorAll('[src],[href]').forEach(fixEl);
          }
        });
      }
    }
  }).observe(document.documentElement, {subtree:true, childList:true, attributes:true, attributeFilter:['src','href']});

})();
</script>
  <script>
async function testAsset(url){
  try{
    const r = await fetch(url, { cache:"no-store" });
    bootLine(`TEST ${url} -> ${r.status} ct=${r.headers.get("content-type")}`, r.ok ? "ok":"bad");
  }catch(e){
    bootLine(`TEST ${url} -> ERR ${e}`, "bad");
  }
}
    function bootLine(t, cls="") {
      const el = document.getElementById("boot");
      if (!el) return;
      const d = document.createElement("div");
      if (cls) d.className = cls;
      d.textContent = t;
      el.appendChild(d);
      el.scrollTop = el.scrollHeight;
    }
    window.onerror = function (m, s, l, c, e) {
      bootLine("JS ERROR:", "bad");
      bootLine(String(e && e.stack ? e.stack : m), "bad");
    };

    async function probeBase(prefix) {
      const url = prefix + "lib/lodash/dist/lodash.min.js";
      try {
        const r = await fetch(url, { method: "GET", cache: "no-store" });
        return r.ok;
      } catch (_) {
        return false;
      }
    }

    function loadJS(src) {
      return new Promise((resolve) => {
        const s = document.createElement("script");
        s.src = src;
        s.onload = () => resolve({ ok: true, src });
        s.onerror = () => resolve({ ok: false, src });
        document.head.appendChild(s);
      });
    }

    function loadCSS(href) {
      return new Promise((resolve) => {
        const l = document.createElement("link");
        l.rel = "stylesheet";
        l.href = href;
        l.onload = () => resolve({ ok: true, href });
        l.onerror = () => resolve({ ok: false, href });
        document.head.appendChild(l);
      });
    }

    function must(cond, msg){
      if(!cond) throw new Error(msg);
      bootLine("OK   " + msg, "ok");
    }

    async function boot() {
      const candidates = ["./", "/", "/public/", "/www/"];
      let BASE = "./";
      for (const c of candidates) {
        bootLine("PROBE BASE: " + c, "dim");
        if (await probeBase(c)) { BASE = c; break; }
      }
      bootLine("BASE = " + BASE, "ok");

      // CSS
      const cssList = [
        BASE + "lib/entry-tool/dist/entry-tool.css",
        BASE + "lib/entryjs/dist/entry.css",
        BASE + "lib/codemirror/codemirror.css",
        BASE + "overrides.css",
      ];
      for (const href of cssList) {
        const r = await loadCSS(href);
        bootLine((r.ok ? "OK   CSS  " : "MISS CSS ") + href, r.ok ? "ok" : "bad");
      }

      // locales (optional)
      {
        const src = BASE + "js/ws/locales.js";
        const r = await loadJS(src);
        bootLine((r.ok ? "OK   JS   " : "MISS(opt) ") + src, r.ok ? "ok" : "dim");
      }
 function normalizeAssetUrl(u, BASE) {
    if (!u || typeof u !== "string") return u;

    // 이미 data/blob/http(s)/capacitor/file 인 건 건드리지 않음
    if (/^(data:|blob:|https?:|capacitor:|file:)/i.test(u)) return u;

    // "/images/xxx" "/media/xxx" "/uploads/xxx" 를 BASE+"images/xxx" 로 통일 (하위폴더 포함)
    u = u.replace(/^\/(images|media|uploads)\//, (_, p) => BASE + p + "/");

    // "./images/xxx" -> BASE+"images/xxx"
    u = u.replace(/^\.\.\/(images|media|uploads)\//, (_, p) => BASE + p + "/");
    u = u.replace(/^\.(\/)?(images|media|uploads)\//, (_, __, p) => BASE + p + "/");

    return u;
  }

  function installHardAssetRewrite(BASE) {
    // 1) <img src>, <audio src>, <video src>, <source src> 등
    const _setAttr = Element.prototype.setAttribute;
    Element.prototype.setAttribute = function (name, value) {
      if ((name === "src" || name === "href") && typeof value === "string") {
        value = normalizeAssetUrl(value, BASE);
      }
      return _setAttr.call(this, name, value);
    };

    // 2) JS에서 직접 img.src = "...", audio.src = "..." 하는 케이스
    const imgDesc = Object.getOwnPropertyDescriptor(HTMLImageElement.prototype, "src");
    if (imgDesc && imgDesc.set) {
      Object.defineProperty(HTMLImageElement.prototype, "src", {
        get: imgDesc.get,
        set(v) { return imgDesc.set.call(this, normalizeAssetUrl(v, BASE)); }
      });
    }

    const mediaProto = HTMLMediaElement && HTMLMediaElement.prototype;
    if (mediaProto) {
      const mDesc = Object.getOwnPropertyDescriptor(mediaProto, "src");
      if (mDesc && mDesc.set) {
        Object.defineProperty(mediaProto, "src", {
          get: mDesc.get,
          set(v) { return mDesc.set.call(this, normalizeAssetUrl(v, BASE)); }
        });
      }
    }

    // 3) fetch/XHR도 같이 (이미 해두셨다면 중복이어도 안전)
    const _fetch = window.fetch;
    window.fetch = function (input, init) {
      if (typeof input === "string") input = normalizeAssetUrl(input, BASE);
      return _fetch.call(this, input, init);
    };

    const XHRopen = XMLHttpRequest.prototype.open;
    XMLHttpRequest.prototype.open = function (m, url, ...rest) {
      url = normalizeAssetUrl(url, BASE);
      return XHRopen.call(this, m, url, ...rest);
    };
  }

  async function boot() {
    const candidates = ["./", "/", "/public/", "/www/"];
    let BASE = "./";
    for (const c of candidates) {
      bootLine("PROBE BASE: " + c, "dim");
      if (await probeBase(c)) { BASE = c; break; }
    }
    bootLine("BASE = " + BASE, "ok");

    // ✅✅✅ 여기! (추가)
    installHardAssetRewrite(BASE);
    bootLine("HARD ASSET REWRITE installed (root+subfolders)", "ok");

    // (선택) 즉시 실제 로드 테스트: 하위폴더 1개를 강제 로딩해 status 확인
    try {
      const t1 = await fetch("/images/_1x1.png", { cache: "no-store" });
      bootLine("TEST /images/_1x1.png -> " + t1.status, t1.ok ? "ok" : "bad");
      const t2 = await fetch("/images/block_icon/ai_hand_icon.svg", { cache: "no-store" });
      bootLine("TEST /images/block_icon/ai_hand_icon.svg -> " + t2.status, t2.ok ? "ok" : "bad");
    } catch (e) {
      bootLine("TEST fetch error: " + e, "bad");
    }
      // core libs
      const jsList = [
        BASE + "lib/lodash/dist/lodash.min.js",
        BASE + "lib/jquery/jquery.min.js",
        BASE + "lib/jquery-ui/ui/minified/jquery-ui.min.js",

        BASE + "lib/PreloadJS/lib/preloadjs-0.6.0.min.js",
        BASE + "lib/EaselJS/lib/easeljs-0.8.0.min.js",
        BASE + "lib/SoundJS/lib/soundjs-0.6.0.min.js",

        BASE + "lib/SoundJS/lib/flashaudioplugin-0.6.0.min.js", // optional

        BASE + "lib/velocity/velocity.min.js",

        BASE + "lib/codemirror/codemirror.js",
        BASE + "lib/codemirror/vim.js", // optional

        BASE + "lib/entry-tool/dist/entry-tool.js",

        BASE + "lib/entryjs/extern/lang/ko.js",
        BASE + "lib/entryjs/extern/util/static.js",
        BASE + "lib/entryjs/extern/util/handle.js",
        BASE + "lib/entryjs/extern/util/bignumber.min.js",
        BASE + "lib/module/legacy-video/index.js",

        // sound editor (optional) — 실패해도 계속
        BASE + "lib/external/sound/sound-editor.js",

        // entry core
        BASE + "lib/entryjs/dist/entry.min.js",

        // paint
        BASE + "lib/entry-paint/dist/static/js/entry-paint.js",
      ];

      for (const src of jsList) {
        const optional =
          src.includes("flashaudioplugin") ||
          src.includes("/vim.js") ||
          src.includes("/ws/locales.js") ||
          src.includes("/external/sound/sound-editor.js");

        const r = await loadJS(src);

        // ✅ 핵심 수정: sound-editor.js가 실패하면 EntrySoundEditor 스텁 주입 (entry.min.js 크래시 방지)
        if (!r.ok && src.includes("/external/sound/sound-editor.js")) {
          bootLine("MISS(opt) " + src, "dim");
          bootLine("PATCH EntrySoundEditor: stub applied (sound editor disabled)", "dim");
          if (!window.EntrySoundEditor) {
            window.EntrySoundEditor = {
              // entry.min.js가 기대하는 함수들(있어야 크래시 안 남)
              renderSoundEditor: function () { /* no-op */ },
              registExportFunction: function () { /* no-op */ },
              registImportFunction: function () { /* no-op */ },
              init: function () { /* no-op */ },
            };
          }
          continue;
        }

        bootLine(
          (r.ok ? "OK   JS   " : (optional ? "MISS(opt) " : "MISS     ")) + src,
          r.ok ? "ok" : (optional ? "dim" : "bad")
        );
      }

      // lodash 패치 (구버전 호환)
      if (window._) {
        if (typeof _.contains !== "function" && typeof _.includes === "function") _.contains = _.includes;
        if (typeof _.findWhere !== "function") {
          _.findWhere = function (arr, attrs) {
            return _.find(arr, function (o) {
              for (var k in attrs) if (o[k] !== attrs[k]) return false;
              return true;
            });
          };
        }
        bootLine("PATCH lodash: _.contains/_.findWhere ok", "dim");
      }

      // EntryStatic path local (이미 적용되어 있다면 그대로 유지)
      // EntryStatic 패치 구간에서 (다른 것 수정 금지)
if (window.EntryStatic) {
  EntryStatic.imagePath = "/images/";
  EntryStatic.mediaPath = "/media/";
  EntryStatic.uploadPath = "/uploads/";
}
      bootLine("HREF = " + location.href)
      // globals check
      await testAsset("/images/_1x1.png");
      await testAsset("/images/block_icon/ai_hand_icon.svg");
      bootLine("_.memoize = " + (window._ ? typeof _.memoize : "N/A"), window._ ? "ok" : "bad");
      bootLine("$.fn.jquery = " + (window.$ && $.fn ? $.fn.jquery : "N/A"), (window.$ && $.fn) ? "ok" : "bad");
      bootLine("createjs = " + (typeof window.createjs), window.createjs ? "ok" : "bad");
      bootLine("Lang = " + (typeof window.Lang), window.Lang ? "ok" : "bad");
      bootLine("EntryTool = " + (typeof window.EntryTool), window.EntryTool ? "ok" : "bad");
      bootLine("EntryVideoLegacy = " + (typeof window.EntryVideoLegacy), window.EntryVideoLegacy ? "ok" : "bad");
      bootLine("EntryStatic = " + (typeof window.EntryStatic), window.EntryStatic ? "ok" : "bad");
      bootLine("EntrySoundEditor = " + (typeof window.EntrySoundEditor), window.EntrySoundEditor ? "ok" : "dim");
      bootLine("Entry.init = " + (window.Entry ? typeof window.Entry.init : "N/A"),
        (window.Entry && typeof window.Entry.init === "function") ? "ok" : "bad");

      must(window._, "lodash(_)");
      must(window.$, "jQuery($)");
      must(window.createjs, "createjs");
      must(window.Lang, "Lang");
      must(window.EntryTool, "EntryTool");
      must(window.EntryVideoLegacy, "EntryVideoLegacy");
      must(window.EntryStatic, "EntryStatic");
      // ✅ sound editor는 이제 optional (스텁이면 통과)
      must(window.EntrySoundEditor, "EntrySoundEditor (optional stub OK)");
      must(window.Entry && typeof window.Entry.init === "function", "Entry.init");

      bootLine("Starting Entry.init …", "dim");
// LOG: 어떤 이미지 경로로 실제 요청하는지 잡기
(function(){
  const _set = Object.getOwnPropertyDescriptor(Image.prototype, 'src').set;
  Object.defineProperty(Image.prototype, 'src', {
    set(v){
      if (typeof v === "string" && v.includes("/images/")) {
        bootLine("IMG REQ: " + v, "dim");
      }
      return _set.call(this, v);
    }
  });
})();
Entry.init(document.getElementById("entryContainer"), {
  type: "workspace",
  libDir: "/lib",
  textCodingEnable: true
});

      Entry.loadProject();
      document.getElementById("boot").remove();
    }

    document.addEventListener("DOMContentLoaded", () => {
      (() => {
  const desc = Object.getOwnPropertyDescriptor(Image.prototype, "src");
  if (!desc || !desc.set) return;
  Object.defineProperty(Image.prototype, "src", {
    set(v) {
      if (typeof v === "string" && v.includes("/images/")) bootLine("IMG REQ: " + v, "dim");
      return desc.set.call(this, v);
    }
  });
})();
      boot().catch(e => {
        bootLine("Boot Error", "bad");
        bootLine(String(e && e.stack ? e.stack : e), "bad");
      });
      // === DEBUG: 이미지 요청 경로 찍기(경로 문제 확정용) ===

    });
  </script>
