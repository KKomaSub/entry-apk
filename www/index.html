<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Entry Offline Editor</title>

  <link rel="stylesheet" href="overrides.css">
  <script src="local_backend.js"></script>
  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#111}
    #entryContainer{width:100%;height:100%;background:#f5f5f5}
    #boot{
      position:fixed;inset:0;background:#000;color:#0f0;
      font:12px/1.45 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      padding:12px;white-space:pre-wrap;overflow:auto;z-index:9999
    }
    .bad{color:#ff5c5c}
    .dim{opacity:.85}
    .ok{color:#66ff66}
  </style>

  <script>
    function bootLineImpl(t, cls="") {
      const el = document.getElementById("boot");
      if (!el) return;
      const d = document.createElement("div");
      if (cls) d.className = cls;
      d.textContent = t;
      el.appendChild(d);
      el.scrollTop = el.scrollHeight;
    }
    // 전역 함수
    window.bootLine = bootLineImpl;
    window.__bootLine = bootLineImpl;
    window.__bootline = bootLineImpl;

    const bootLine = (...args) => window.bootLine(...args);

    // broken 이미지 drawImage 예외 삼키기(이건 경로패치가 아니라 “렌더 루프 보호”라 유지)
    if (!window.__DRAWIMAGE_GUARD__) {
      window.__DRAWIMAGE_GUARD__ = true;
      const proto = CanvasRenderingContext2D && CanvasRenderingContext2D.prototype;
      if (proto && proto.drawImage) {
        const _drawImage = proto.drawImage;
        proto.drawImage = function(img, ...rest) {
          try {
            if (img && img.tagName === "IMG") {
              const nw = img.naturalWidth || 0, nh = img.naturalHeight || 0;
              if (nw === 0 || nh === 0) return;
            }
            return _drawImage.call(this, img, ...rest);
          } catch (_) { return; }
        };
      }
    }

    window.onerror = function (m, s, l, c, e) {
      bootLine("JS ERROR:", "bad");
      bootLine(String(e && e.stack ? e.stack : m), "bad");
    };

    async function probeBase(prefix) {
      const url = prefix + "lib/lodash/dist/lodash.min.js";
      try {
        const r = await fetch(url, { method: "GET", cache: "no-store" });
        return r.ok;
      } catch (_) {
        return false;
      }
    }

    function loadJS(src) {
      return new Promise((resolve) => {
        const s = document.createElement("script");
        s.src = src;
        s.onload = () => resolve({ ok: true, src });
        s.onerror = () => resolve({ ok: false, src });
        document.head.appendChild(s);
      });
    }

    function loadCSS(href) {
      return new Promise((resolve) => {
        const l = document.createElement("link");
        l.rel = "stylesheet";
        l.href = href;
        l.onload = () => resolve({ ok: true, href });
        l.onerror = () => resolve({ ok: false, href });
        document.head.appendChild(l);
      });
    }

    function hideBootLater(delayMs = 1500) {
      setTimeout(() => {
        const el = document.getElementById("boot");
        if (el) el.remove();
      }, delayMs);
    }

    function must(cond, msg){
      if(!cond) throw new Error(msg);
      bootLine("OK   " + msg, "ok");
    }

    async function boot() {
      // BASE 자동 탐지(유지)
      const candidates = ["./", "/", "/public/", "/www/"];
      let BASE = "./";
      for (const c of candidates) {
        bootLine("PROBE BASE: " + c, "dim");
        if (await probeBase(c)) { BASE = c; break; }
      }
      bootLine("BASE = " + BASE, "ok");
      if (window.LocalBackend) LocalBackend.install(BASE);
      // CSS
const cssList = [
  BASE + "lib/entry-tool/dist/entry-tool.css",
  BASE + "lib/entry-lms/dist/assets/app.css",   // ✅ 추가
  BASE + "lib/entryjs/dist/entry.css",
  BASE + "lib/codemirror/codemirror.css",
  BASE + "overrides.css",
];
      for (const href of cssList) {
        const r = await loadCSS(href);
        bootLine((r.ok ? "OK   CSS  " : "MISS CSS ") + href, r.ok ? "ok" : "bad");
      }

      // locales (optional)
      {
        const src = BASE + "js/ws/locales.js";
        const r = await loadJS(src);
        bootLine((r.ok ? "OK   JS   " : "MISS(opt) ") + src, r.ok ? "ok" : "dim");
      }

      // core libs
const jsList = [

  // 🔹 기본 유틸
  BASE + "lib/lodash/dist/lodash.min.js",
  BASE + "lib/jquery/jquery.min.js",
  BASE + "lib/jquery-ui/ui/minified/jquery-ui.min.js",
  BASE + "lib/velocity/velocity.min.js",

  // 🔹 createjs 계열
  BASE + "lib/PreloadJS/lib/preloadjs-0.6.0.min.js",
  BASE + "lib/EaselJS/lib/easeljs-0.8.0.min.js",
  BASE + "lib/SoundJS/lib/soundjs-0.6.0.min.js",
  BASE + "lib/SoundJS/lib/flashaudioplugin-0.6.0.min.js", // optional

  // 🔹 CodeMirror core
  BASE + "lib/codemirror/codemirror.js",
  BASE + "lib/codemirror/vim.js",

  // 🔹 CodeMirror addon (텍스트/파이썬/힌트/린트 UI에 필요)
  BASE + "lib/codemirror/addon/hint/show-hint.js",
  BASE + "lib/codemirror/addon/lint/lint.js",
  BASE + "lib/codemirror/addon/selection/active-line.js",
  BASE + "lib/codemirror/mode/javascript/javascript.js",
  BASE + "lib/codemirror/addon/hint/javascript-hint.js",

  // 🔹 기타 의존 라이브러리
  BASE + "js/jshint.js",
  BASE + "lib/fuzzy/lib/fuzzy.js",
  BASE + "js/ws/python.js",

  // 🔹 React (entry-lms UI에 필수)
  BASE + "lib/react/umd/react.production.min.js",
  BASE + "lib/react-dom/umd/react-dom.production.min.js",

  // 🔹 socket.io (entry-tool 내부에서 참조됨)
  BASE + "lib/socket.io-client/socket.io.js",

  // 🔹 LMS UI shell (모달/오브젝트/테이블 패널)
  BASE + "lib/entry-lms/dist/assets/app.js",

  // 🔹 Entry Tool (버튼/상단 UI)
  BASE + "lib/entry-tool/dist/entry-tool.js",

  // 🔹 Entry util (example.ejs에서 사용하던 것들)
  BASE + "lib/entryjs/extern/lang/ko.js",
  BASE + "lib/entryjs/extern/util/static.js",
  BASE + "lib/entryjs/extern/util/handle.js",
  BASE + "lib/entryjs/extern/util/bignumber.min.js",
  BASE + "lib/entryjs/extern/util/filbert.js",
  BASE + "lib/entryjs/extern/util/CanvasInput.js",
  BASE + "lib/entryjs/extern/util/ndgmr.Collision.js",

  BASE + "lib/module/legacy-video/index.js",

  // 🔹 사운드 에디터 (optional)
  BASE + "lib/external/sound/sound-editor.js",

  // 🔹 Entry 엔진 본체
  BASE + "lib/entryjs/dist/entry.min.js",

  // 🔹 Paint
  BASE + "lib/entry-paint/dist/static/js/entry-paint.js",
];

      for (const src of jsList) {
        const optional =
          src.includes("flashaudioplugin") ||
          src.includes("/vim.js") ||
          src.includes("/ws/locales.js") ||
          src.includes("/external/sound/sound-editor.js");

        const r = await loadJS(src);

        // sound-editor.js 실패 시 스텁
        if (!r.ok && src.includes("/external/sound/sound-editor.js")) {
          bootLine("MISS(opt) " + src, "dim");
          bootLine("PATCH EntrySoundEditor: stub applied (sound editor disabled)", "dim");
          if (!window.EntrySoundEditor) {
            window.EntrySoundEditor = {
              renderSoundEditor: function () {},
              registExportFunction: function () {},
              registImportFunction: function () {},
              init: function () {},
            };
          }
          continue;
        }

        bootLine(
          (r.ok ? "OK   JS   " : (optional ? "MISS(opt) " : "MISS     ")) + src,
          r.ok ? "ok" : (optional ? "dim" : "bad")
        );
      }

      // lodash 패치(구버전 호환)
      if (window._) {
        if (typeof _.contains !== "function" && typeof _.includes === "function") _.contains = _.includes;
        if (typeof _.findWhere !== "function") {
          _.findWhere = function (arr, attrs) {
            return _.find(arr, function (o) {
              for (var k in attrs) if (o[k] !== attrs[k]) return false;
              return true;
            });
          };
        }
        bootLine("PATCH lodash: _.contains/_.findWhere ok", "dim");
      }

      // EntryStatic path (유지)
      if (window.EntryStatic) {
        EntryStatic.imagePath = BASE + "images/";
        EntryStatic.mediaPath = BASE + "media/";
        EntryStatic.uploadPath = BASE + "uploads/";
      }
      

      bootLine("HREF = " + location.href, "dim");
window.PUBLIC_PATH_FOR_ENTRYJS = "lib/entryjs/dist/";
Entry.creationChangedEvent = new Entry.Event(window);
      bootLine("Starting Entry.init …", "dim");

      Entry.init(document.getElementById("entryContainer"), {
        type: "workspace",
        libDir: "./lib",
        textCodingEnable: true
      });

      Entry.loadProject();
      function forceShowModalLike() {
  const nodes = Array.from(document.querySelectorAll(
    '[class*="modal"],[class*="popup"],[class*="dialog"],[class*="layer"],' +
    '[id*="modal"],[id*="popup"],[id*="dialog"]'
  ));

  bootLine("FORCE VISIBILITY: nodes=" + nodes.length, nodes.length ? "ok" : "bad");

  nodes.forEach((el) => {
    try {
      // 1) 자기 자신 강제 표시
      el.style.display = "block";
      el.style.visibility = "visible";
      el.style.opacity = "1";
      el.style.pointerEvents = "auto";
      el.style.zIndex = "2147483647";

      // 2) 조상 중 display:none 있으면 전부 block으로 풀기
      let p = el.parentElement;
      let depth = 0;
      while (p && depth++ < 12) {
        const cs = getComputedStyle(p);
        if (cs.display === "none") {
          p.style.display = "block";
          p.style.visibility = "visible";
          p.style.opacity = "1";
        }
        p.style.zIndex = "2147483647";
        p = p.parentElement;
      }
    } catch (_) {}
  });
}

// ✅ 버튼 클릭 + Command[702] 둘 다 시도하고, 직후 강제 표시
function openObjectAdd() {
  bootLine("TRY open object add", "dim");

  try {
    const btn = Entry?.playground?._pictureAddButton;
    bootLine("BTN exists=" + !!btn + " disabled=" + (btn?.disabled ?? "N/A"), btn ? "ok" : "bad");
    if (btn) {
      btn.click();
      btn.dispatchEvent(new MouseEvent("click", { bubbles: true, cancelable: true }));
      bootLine("CLICKED _pictureAddButton", "dim");
    }
  } catch (e) {
    bootLine("BTN click error: " + String(e?.stack || e), "bad");
  }

  try {
    Entry?.Command?.[702]?.do?.();
    bootLine("CALLED Command[702].do()", "dim");
  } catch (e) {
    bootLine("CMD702 error: " + String(e?.stack || e), "bad");
  }

  // 모달 생성/상태 반영 텀 기다렸다가 강제 표시
  setTimeout(forceShowModalLike, 120);
  setTimeout(forceShowModalLike, 400);
}
function closeObjectAdd() {
  bootLine("TRY close object add", "dim");

  try {
    if (Entry?.modal?.hide) {
      Entry.modal.hide();
      bootLine("CLOSED via Entry.modal.hide()", "ok");
      return;
    }
  } catch (e) {
    bootLine("modal.hide error: " + String(e?.stack || e), "bad");
  }

  try {
    if (Entry?.Command?.[703]?.do) {
      Entry.Command[703].do();
      bootLine("CLOSED via Command[703].do()", "ok");
      return;
    }
  } catch (e) {
    bootLine("Command[703] error: " + String(e?.stack || e), "bad");
  }

  // 🔧 최후 수단: modal-like DOM 직접 제거
  const nodes = document.querySelectorAll(
    '[class*="modal"],[class*="popup"],[class*="dialog"],[class*="layer"]'
  );
  nodes.forEach((el) => {
    el.style.display = "none";
  });
  bootLine("CLOSED via DOM fallback", "dim");
}
// ✅ 1회 자동 테스트
setTimeout(() => {
  openObjectAdd();

  // 1초 후 닫기
  setTimeout(closeObjectAdd, 5000);

}, 900);
      // ✅ 오브젝트 추가 버튼/커맨드 디버그 (화면 안 뜨는 원인 1초컷)
setTimeout(() => {
  try {
    const hasCmd = !!(window.Entry && Entry.Command && Entry.Command[702] && typeof Entry.Command[702].do === "function");
    bootLine("CHECK Command[702].do = " + hasCmd, hasCmd ? "ok" : "bad");

    const btn = Entry?.playground?._pictureAddButton;
    bootLine("CHECK _pictureAddButton = " + (btn ? "OK" : "NO"), btn ? "ok" : "bad");

    // ✅ 버튼 클릭을 강제로 가로채서 예외 로그를 반드시 찍기
    if (btn && btn.on) {
      btn.off?.("click.__force702");
      btn.on("click.__force702", (e) => {
        e?.preventDefault?.();
        e?.stopPropagation?.();
        bootLine("CLICK pictureAddButton -> try Command[702].do()", "dim");
        try {
          Entry.Command[702].do();
          bootLine("Command[702].do() called", "ok");
        } catch (err) {
          bootLine("Command[702] threw: " + (err?.stack || err), "bad");
        }
      });
    }
  } catch (e) {
    bootLine("DEBUG install failed: " + (e?.stack || e), "bad");
  }
}, 800);
      // ✅ Promise 에러는 window.onerror에 안 찍힐 수 있음 (필수)
window.addEventListener("unhandledrejection", (ev) => {
  bootLine("UNHANDLED REJECTION:", "bad");
  bootLine(String(ev && (ev.reason?.stack || ev.reason) || ev), "bad");
});

// ✅ 모달이 DOM에 붙는지 감시 (안 뜨는 원인: 생성은 되는데 CSS로 숨겨짐)
const __mo = new MutationObserver((muts) => {
  for (const m of muts) {
    for (const n of m.addedNodes) {
      if (!(n instanceof HTMLElement)) continue;
      const s = (n.className || "") + " " + (n.id || "");
      if (/modal|popup|dialog|layer|lms|portal/i.test(s) || n.querySelector?.('[class*="modal"],[class*="popup"],[class*="dialog"]')) {
        bootLine("DOM ADD: " + (n.tagName + "#" + (n.id||"") + "." + (n.className||"")).slice(0, 120), "dim");
      }
    }
  }
});
__mo.observe(document.documentElement, { childList: true, subtree: true });

// ✅ 모달/포털이 “있는데 안 보이는” 경우를 위해 강제 가시화 CSS 주입
const __style = document.createElement("style");
__style.textContent = `
  #entry-lms-root, #modal-root, #portal-root, #toast-root { position: fixed; inset: 0; z-index: 2147483647; pointer-events: none; }
  #entry-lms-root *, #modal-root *, #portal-root *, #toast-root * { pointer-events: auto; }
  [class*="modal"],[class*="popup"],[class*="dialog"],[class*="layer"] { z-index: 2147483647 !important; }
`;
document.head.appendChild(__style);

// ✅ Command[702].do() 래핑해서 "실제로 호출되는지/리턴이 뭔지/호출 직후 DOM 상태"를 찍기
const __orig702 = Entry?.Command?.[702]?.do;
if (typeof __orig702 === "function") {
  Entry.Command[702].do = function () {
    bootLine("CALL Command[702].do()", "dim");
    let ret;
    try {
      ret = __orig702.apply(this, arguments);
      bootLine("RET Command[702] = " + String(ret), "dim");
    } catch (e) {
      bootLine("THROW Command[702]: " + String(e?.stack || e), "bad");
      throw e;
    }

    // ✅ 0.1초 뒤: 실제로 모달이 생겼는지 DOM 검사
    setTimeout(() => {
      const roots = ["entry-lms-root","modal-root","portal-root","toast-root"];
      for (const id of roots) {
        const el = document.getElementById(id);
        bootLine(`ROOT ${id} exists=${!!el} children=${el?.children?.length ?? "N/A"}`, el ? "ok" : "bad");
      }

      const hits = document.querySelectorAll('[class*="modal"],[class*="popup"],[class*="dialog"],[class*="layer"]');
      bootLine("FOUND modal-like nodes = " + hits.length, hits.length ? "ok" : "bad");
      if (hits[0]) {
        const cs = getComputedStyle(hits[0]);
        bootLine("FIRST modal display=" + cs.display + " vis=" + cs.visibility + " op=" + cs.opacity, "dim");
      }
    }, 120);

    return ret;
  };
  bootLine("PATCHED: wrap Command[702].do", "ok");
} else {
  bootLine("WARN: Command[702].do not a function at patch time", "bad");
}

// ✅ 강제 오픈 테스트 (1회)
setTimeout(() => {
  try {
    bootLine("FORCE OPEN: Command[702].do()", "dim");
    Entry.Command[702].do();
  } catch (e) {
    bootLine("FORCE OPEN failed: " + String(e?.stack || e), "bad");
  }
}, 800);
 function patchAddButtons() {
    try {
      if (!window.Entry || !Entry.playground || !Entry.Command) return false;

      const btn = Entry.playground._pictureAddButton;
      if (!btn) return false;

      const run = () => {
        try { Entry.Command[702].do(); } catch (e) { console.error(e); }
      };

      // jQuery 객체일 수도, DOM일 수도 있어서 둘 다 처리
      if (btn.on) {
        btn.off("click.__force702");
        btn.on("click.__force702", (e) => { e.preventDefault?.(); e.stopPropagation?.(); run(); });
      } else if (btn.addEventListener) {
        btn.addEventListener("click", (e) => { e.preventDefault?.(); e.stopPropagation?.(); run(); }, true);
      }

      return true;
    } catch (e) {
      console.error(e);
      return false;
    }
  }

  // Entry 초기화 직후 약간 기다렸다가 패치
    const ok = patchAddButtons();
    if (window.bootLine) bootLine("PATCH pictureAddButton -> Command[702]: " + (ok ? "OK" : "MISS"), ok ? "ok" : "bad");
      bootLine("BOOT OK: init+loadProject called, hiding logs…", "dim");
      hideBootLater(2000);
    }

    document.addEventListener("DOMContentLoaded", () => {
      boot().catch(e => {
        bootLine("Boot Error", "bad");
        bootLine(String(e && e.stack ? e.stack : e), "bad");
      });
    });
  </script>
</head>

<body>
  <div id="entryContainer"></div>
  <div id="entry-lms-root"></div>
<div id="modal-root"></div>
<div id="portal-root"></div>
<div id="toast-root"></div>
  <div id="boot">Entry Offline Editor
Made by KKomaProgrammer
Loading…</div>
</body>
</html>
