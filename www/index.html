<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Entry Offline Editor</title>

  <link rel="stylesheet" href="./lib/entry-tool/dist/entry-tool.css" />
  <link rel="stylesheet" href="./lib/entry-js/dist/entry.css" />

  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#111}
    #entryContainer{width:100%;height:100%;background:#f5f5f5}
    #boot{
      position:fixed;inset:0;background:#000;color:#0f0;
      font:12px/1.45 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      padding:12px;white-space:pre-wrap;overflow:auto;z-index:9999
    }
    .bad{color:#ff5c5c}
    .dim{opacity:.8}
    .ok{color:#66ff66}
  </style>

  <script>
    function bootLine(t, cls="") {
      const el = document.getElementById("boot");
      const d = document.createElement("div");
      if (cls) d.className = cls;
      d.textContent = t;
      el.appendChild(d);
      el.scrollTop = el.scrollHeight;
    }
    window.onerror = function (m, s, l, c, e) {
      bootLine("JS ERROR:", "bad");
      bootLine(String(e && e.stack ? e.stack : m), "bad");
    };
  </script>
</head>
<body>
  <div id="entryContainer"></div>
  <div id="boot">Entry Offline Editor\nLoading…</div>

  <!-- ✅ 0) Lang 전역 -->
  <script src="./js/ws/locales.js"></script>

  <!-- ✅ 1) EntryStatic/Legacy 등 전역 준비: ko -> static -> (legacy placeholders) -->
  <script src="./lib/entry-js/extern/lang/ko.js"></script>
  <script src="./lib/entry-js/extern/util/static.js"></script>

  <!-- ✅ 1-1) 일부 배포본에서 기대하는 레거시 전역(없으면 ReferenceError) 방지 -->
  <script>
    // EntryStatic은 static.js가 보통 만들지만, 만약 CDN 파일 변동/누락이면 최소 객체라도 만들어서 크래시 방지
    window.EntryStatic = window.EntryStatic || {};
    // EntryVideoLegacy는 일부 entry.min.js 번들이 참조(모듈 분리/변동 대비)
    window.EntryVideoLegacy = window.EntryVideoLegacy || {};
  </script>

  <!-- ✅ 2) Entry 코어 -->
  <script src="./lib/entry-js/dist/entry.min.js"></script>

  <!-- ✅ 3) 나머지 라이브러리 번들 (Entry 전역 의존 없는 것들만 포함하도록 make_bundle.js 수정) -->
  <script src="./bundle/vendor.bundle.js"></script>

  <!-- ✅ 4) Entry 전역에 의존하는 것들은 Entry 이후에 별도 로드 -->
  <script src="./lib/entry-tool/dist/entry-tool.js"></script>
  <script src="./lib/entry-paint/dist/static/js/entry-paint.js"></script>

  <script>
    function showErr(title, e) {
      bootLine(title, "bad");
      bootLine(String(e && e.stack ? e.stack : e), "bad");
    }

    document.addEventListener("DOMContentLoaded", () => {
      try {
        bootLine("Lang = " + (typeof window.Lang), window.Lang ? "ok" : "bad");
        bootLine("EntryStatic = " + (typeof window.EntryStatic), window.EntryStatic ? "ok" : "bad");
        bootLine("EntryVideoLegacy = " + (typeof window.EntryVideoLegacy), window.EntryVideoLegacy ? "ok" : "bad");
        bootLine("Entry = " + (typeof window.Entry), window.Entry ? "ok" : "bad");
        bootLine("Entry.init = " + (window.Entry ? typeof window.Entry.init : "N/A"),
          (window.Entry && typeof window.Entry.init === "function") ? "ok" : "bad");

        if (!window.Lang) throw new Error("Lang missing: locales.js not loaded");
        if (!window.Entry || typeof window.Entry.init !== "function") {
          throw new Error("Entry.init missing: Entry bundle mismatch or missing required globals");
        }

        bootLine("Starting Entry.init …", "dim");

        Entry.init(document.getElementById("entryContainer"), {
          type: "workspace",
          libDir: "./lib",
          textCodingEnable: true
        });

        Entry.loadProject();
        document.getElementById("boot").remove();
      } catch (e) {
        showErr("Boot Error", e);
      }
    });
  </script>
</body>
</html>
