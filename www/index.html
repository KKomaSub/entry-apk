<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Entry Offline Editor</title>

  <link rel="stylesheet" href="./lib/entry-tool/dist/entry-tool.css" />
  <link rel="stylesheet" href="./lib/entryjs/dist/entry.css" />
  <link rel="stylesheet" href="./lib/codemirror/codemirror.css" />
  <link rel="stylesheet" href="./overrides.css" />

  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#0b0b0b}
    #entryContainer{width:100%;height:100%;background:#f5f5f5}
    #popupContainer{position:fixed;inset:0;z-index:9998;pointer-events:none}
    #popupContainer *{pointer-events:auto}

    #boot{
      position:fixed;inset:0;background:#000;color:#0f0;
      font:12px/1.45 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      padding:12px;white-space:pre-wrap;overflow:auto;z-index:9999
    }
    .bad{color:#ff5c5c}
    .dim{opacity:.85}
    .ok{color:#66ff66}
    .warn{color:#ffd166}
  </style>

  <script>
    function bootLine(t, cls="") {
      const el = document.getElementById("boot");
      if (!el) return;
      const d = document.createElement("div");
      if (cls) d.className = cls;
      d.textContent = t;
      el.appendChild(d);
      el.scrollTop = el.scrollHeight;
    }

    window.onerror = function (m, s, l, c, e) {
      bootLine("JS ERROR:", "bad");
      bootLine(String(e && e.stack ? e.stack : m), "bad");
    };

    function must(cond, msg) { if (!cond) throw new Error(msg); }
  </script>
</head>

<body>
  <div id="entryContainer"></div>
  <div id="popupContainer"></div>
  <div id="boot">Entry Offline Editor\nLoadingвҖҰ</div>

  <!-- localesлҠ” м—Ҷм–ҙлҸ„ лҸҢм•„к°ҖкІҢ(404 л¬ҙмӢң) -->
  <script>
    fetch("./js/ws/locales.js", {cache:"no-store"}).then(r=>{
      bootLine(`LOAD ws/locales.js: ./js/ws/locales.js`, "dim");
      if(!r.ok) bootLine(`MISS ws/locales.js: HTTP ${r.status}`, "warn");
      else bootLine(`OK   ws/locales.js`, "ok");
    }).catch(()=>bootLine(`MISS ws/locales.js: network`, "warn"));
  </script>

  <!-- вң… 1) underscoreк°Җ _ -->
  <script src="./lib/underscore/underscore-min.js"></script>

  <!-- вң… 2) lodashлҠ” лі„лҸ„ ліҙкҙҖ (Entryк°Җ л‘ҳ лӢӨ м“°лҠ” кІҪмҡ°к°Җ мһҲмқҢ) -->
  <script src="./lib/lodash/dist/lodash.min.js"></script>
  <script>
    // lodashк°Җ _ лҘј лҚ®м—Ҳмңјл©ҙ лҗҳлҸҢлҰ¬кі  lodashлҠ” window.lodashлЎң ліҙкҙҖ
    if (window._ && typeof window._.noConflict === "function") {
      window.lodash = window._.noConflict(); // _лҠ” underscoreлЎң ліөкө¬
    }
    // нҳ№мӢң lodashл§Ң мӮҙм•„мһҲкі  underscoreк°Җ м—Ҷмқ„ л•Ң лҢҖл№„
    if (!window._ && window.lodash) window._ = window.lodash;
  </script>

  <!-- 3) CodeMirror -->
  <script src="./lib/codemirror/codemirror.js"></script>
  <script src="./lib/codemirror/vim.js"></script>

  <!-- 4) jQuery -->
  <script src="./lib/jquery/jquery.min.js"></script>
  <script src="./lib/jquery-ui/ui/minified/jquery-ui.min.js"></script>

  <!-- 5) CreateJS (Entryк°Җ кё°лҢҖн•ҳлҠ” createjs м „м—ӯ) -->
  <script src="./lib/PreloadJS/lib/preloadjs-0.6.0.min.js"></script>
  <script src="./lib/EaselJS/lib/easeljs-0.8.0.min.js"></script>
  <script src="./lib/SoundJS/lib/soundjs-0.6.0.min.js"></script>
  <!-- flashaudiopluginмқҖ м—Ҷм–ҙлҸ„ лҗҳкІҢ(мһҲмңјл©ҙ лЎңл“ң) -->
  <script>
    (function(){
      var s=document.createElement("script");
      s.src="./lib/SoundJS/lib/flashaudioplugin-0.6.0.min.js";
      s.onload=function(){ bootLine("OK   flashaudioplugin", "dim"); };
      s.onerror=function(){ bootLine("MISS flashaudioplugin (optional)", "warn"); };
      document.head.appendChild(s);
    })();
  </script>

  <!-- 6) Entry prereq -->
  <script src="./lib/entryjs/extern/lang/ko.js"></script>
  <script src="./lib/entryjs/extern/util/static.js"></script>
  <script src="./lib/entryjs/extern/util/handle.js"></script>
  <script src="./lib/entryjs/extern/util/bignumber.min.js"></script>

  <!-- 7) Entry core -->
  <script src="./lib/entryjs/dist/entry.min.js"></script>

  <!-- 8) tool/paint -->
  <script src="./lib/entry-tool/dist/entry-tool.js"></script>
  <script src="./lib/entry-paint/dist/static/js/entry-paint.js"></script>

  <script>
    function detectPopupCtor() {
      // entry-tool distк°Җ м–ҙл–Ө м „м—ӯлӘ…мқ„ м“°лҠ”м§Җ нҷҳкІҪл§ҲлӢӨ лӢӨлҘј мҲҳ мһҲм–ҙм„ң мөңлҢҖн•ң м•Ҳм „н•ҳкІҢ нғҗмғү
      const cands = [
        window.EntryTool && window.EntryTool.Popup,
        window.Tool && window.Tool.Popup,
        window.Entrytool && window.Entrytool.Popup,
        window.popup && window.popup.Popup,
        window.Popup,
      ].filter(Boolean);
      return cands[0] || null;
    }

    function wireOpenManagers(popup) {
      const on = Entry.addEventListener.bind(Entry);
      const offAll = Entry.removeAllEventListener.bind(Entry);

      const bind = (evt, fn) => { offAll(evt); on(evt, fn); };

      bind("openSpriteManager", () => popup.show({ type: "sprite" }));
      bind("openPictureManager", () => popup.show({ type: "picture" }));
      bind("openSoundManager", () => popup.show({ type: "sound" }));
      bind("openPictureImport", () => popup.show({ type: "paint" }));

      bind("openExpansionBlockManager", () => {
        const blocks = popup.expansionBlocks || [];
        popup.show({ type: "expansion" }, { data: { data: blocks } });
      });

      bind("openAIUtilizeBlockManager", () => {
        const blocks = popup.aiUtilizeBlocks || [];
        popup.show({ type: "aiUtilize" }, { data: { data: blocks } });
      });

      bind("openHardwareLiteBlockManager", () => {
        const blocks = popup.hardwareLiteBlocks || [];
        popup.show({ type: "hardwareLite" }, { data: { data: blocks } });
      });
    }

    document.addEventListener("DOMContentLoaded", () => {
      try {
        bootLine("_ (underscore) = " + (typeof window._), window._ ? "ok" : "bad");
        bootLine("$.fn.jquery = " + (window.$ && $.fn ? $.fn.jquery : "N/A"), (window.$ && $.fn) ? "ok" : "bad");
        bootLine("createjs = " + (typeof window.createjs), (typeof window.createjs==="object") ? "ok" : "bad");
        bootLine("Lang = " + (typeof window.Lang), window.Lang ? "ok" : "bad");
        bootLine("Entry.init = " + (window.Entry ? typeof window.Entry.init : "N/A"),
          (window.Entry && typeof window.Entry.init === "function") ? "ok" : "bad");

        must(window._, "underscore(_) missing");
        must(window.$, "jQuery missing");
        must(typeof window.createjs === "object", "createjs missing");
        must(window.Lang, "Lang missing");
        must(window.Entry && typeof window.Entry.init === "function", "Entry.init missing");

        bootLine("Starting Entry.init вҖҰ", "dim");

        Entry.init(document.getElementById("entryContainer"), {
          type: "workspace",
          libDir: "./lib",          // third-party + entryjs мң„м№ҳ(кё°ліё /lib) оЁҒ5оЁӮ
          entryDir: "./lib/entryjs", // media/image assets кё°мӨҖ кІҪлЎң оЁҒ6оЁӮ
          objectAddable: true,
          objectEditable: true,
          soundEditable: true,
          pictureEditable: true,
          sceneEditable: true,
          textCodingEnable: true
        });

        // вң… мҳӨлёҢм қнҠё/лӘЁм–‘/мҶҢлҰ¬/лё”лЎқ м¶”к°Җ м°Ҫмқҙ м•Ҳ лңЁлҠ” н•өмӢ¬ мӣҗмқё н•ҙкІ°
        const PopupCtor = detectPopupCtor();
        if (!PopupCtor) {
          bootLine("WARN: Popup constructor not found in entry-tool. Object manager may not open.", "warn");
        } else {
          const popup = new PopupCtor({
            container: document.getElementById("popupContainer"),
            isShow: false,
            theme: "entry",
            data: { data: { imageBaseUrl: "" } },
          });
          wireOpenManagers(popup);
          bootLine("Popup wiring: OK (openSpriteManager/openPictureManager/...)", "ok");
        }

        // кё°ліё н”„лЎңм қнҠё лЎңл“ң(л№Ҳ н”„лЎңм қнҠё)
        if (typeof Entry.loadProject === "function") Entry.loadProject();

        document.getElementById("boot").remove();
      } catch (e) {
        bootLine("Boot Error", "bad");
        bootLine(String(e && e.stack ? e.stack : e), "bad");
      }
    });
  </script>
</body>
</html>
