<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Entry Offline Editor</title>

  <link rel="stylesheet" href="./lib/entry-tool/dist/entry-tool.css" />
  <link rel="stylesheet" href="./lib/entry-js/dist/entry.css" />

  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#111}
    #entryContainer{width:100%;height:100%;background:#f5f5f5}
    #boot{
      position:fixed;inset:0;background:#000;color:#0f0;
      font:12px/1.45 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      padding:12px;white-space:pre-wrap;overflow:auto;z-index:9999
    }
    .bad{color:#ff5c5c}
    .dim{opacity:.8}
    .ok{color:#66ff66}
  </style>

  <script>
    function bootLine(t, cls="") {
      const el = document.getElementById("boot");
      const d = document.createElement("div");
      if (cls) d.className = cls;
      d.textContent = t;
      el.appendChild(d);
      el.scrollTop = el.scrollHeight;
    }

    window.onerror = function (m, s, l, c, e) {
      bootLine("JS ERROR:", "bad");
      bootLine(String(e && e.stack ? e.stack : m), "bad");
    };
  </script>
</head>
<body>
  <div id="entryContainer"></div>
  <div id="boot">Entry Offline Editor\nLoading…</div>

  <!-- ✅ 1) 나머지 라이브러리 번들 -->
  <script src="./bundle/vendor.bundle.js"></script>

  <!-- ✅ 2) Entry 코어는 별도 로드(가장 중요) -->
  <script src="./lib/entry-js/dist/entry.min.js"></script>

  <script>
    function showErr(title, e) {
      bootLine(title, "bad");
      bootLine(String(e && e.stack ? e.stack : e), "bad");
    }

    document.addEventListener("DOMContentLoaded", () => {
      try {
        bootLine("window.Entry = " + (typeof window.Entry), (window.Entry ? "ok" : "bad"));
        bootLine("Entry.init = " + (window.Entry ? typeof window.Entry.init : "N/A"),
                 (window.Entry && typeof window.Entry.init==="function" ? "ok" : "bad"));

        if (!window.Entry || typeof window.Entry.init !== "function") {
          throw new Error("Entry global missing: entry.min.js not executed or path invalid");
        }

        bootLine("Starting Entry.init …", "dim");

        Entry.init(document.getElementById("entryContainer"), {
          type: "workspace",
          libDir: "./lib",
          textCodingEnable: true
        });

        Entry.loadProject();
        document.getElementById("boot").remove();

      } catch (e) {
        showErr("Boot Error", e);
      }
    });
  </script>
</body>
</html>
  <script>
    function showErr(title, e) {
      const el = document.getElementById("boot");
      el.innerText = title + "\n\n" + String(e && e.stack ? e.stack : e);
      el.style.color = "#ff5c5c";
    }

    function bootDiag() {
      const miss = [];
      const ok = (n, c) => { if (!c) miss.push(n); };

      ok("Entry", !!window.Entry);
      ok("Entry.init", window.Entry && typeof window.Entry.init === "function");
      ok("_ (lodash)", !!window._);
      ok("React", !!window.React);
      ok("ReactDOM", !!window.ReactDOM);
      ok("createjs", !!window.createjs);
      ok("$ (jQuery)", !!window.jQuery || !!window.$);
      ok("CodeMirror", !!window.CodeMirror);

      return miss;
    }

    document.addEventListener("DOMContentLoaded", () => {
      try {
        const miss = bootDiag();
        if (miss.length) {
          throw new Error("Missing globals:\n- " + miss.join("\n- "));
        }

        const boot = document.getElementById("boot");
        boot.innerText += "\nStarting Entry.init …";

        Entry.init(document.getElementById("entryContainer"), {
          type: "workspace",
          libDir: "./lib",
          textCodingEnable: true
        });

        Entry.loadProject();
        boot.remove();
      } catch (e) {
        showErr("Boot Error", e);
      }
    });
  </script>
</body>
</html>
