<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Entry Offline Editor</title>

  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#111}
    #entryContainer{width:100%;height:100%;background:#f5f5f5}
    #boot{
      position:fixed;inset:0;background:#000;color:#0f0;
      font:12px/1.45 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      padding:12px;white-space:pre-wrap;overflow:auto;z-index:9999
    }
    .bad{color:#ff5c5c}
    .dim{opacity:.85}
    .ok{color:#66ff66}
  </style>

  <script>
    function bootLine(t, cls="") {
      const el = document.getElementById("boot");
      if (!el) return;
      const d = document.createElement("div");
      if (cls) d.className = cls;
      d.textContent = t;
      el.appendChild(d);
      el.scrollTop = el.scrollHeight;
    }

    window.addEventListener("error", (ev) => {
      bootLine("JS ERROR:", "bad");
      bootLine(String(ev?.error?.stack || ev?.message || ev), "bad");
    });
    window.addEventListener("unhandledrejection", (ev) => {
      bootLine("PROMISE ERROR:", "bad");
      bootLine(String(ev?.reason?.stack || ev?.reason || ev), "bad");
    });

    // ✅ BASE 자동 감지: "/lib/..."가 404면 "./lib/..."로 자동 전환
    async function pickBase() {
      const abs = "/lib/lodash/dist/lodash.min.js";
      const rel = "./lib/lodash/dist/lodash.min.js";
      try {
        const r = await fetch(abs, { method: "GET" });
        if (r.ok) return { base: "/", ok: abs };
      } catch {}
      return { base: "./", ok: rel };
    }

    function loadCSS(href) {
      return new Promise((resolve, reject) => {
        const el = document.createElement("link");
        el.rel = "stylesheet";
        el.href = href;
        el.onload = () => { bootLine("OK   CSS  " + href, "dim"); resolve(); };
        el.onerror = () => { bootLine("MISS CSS  " + href, "bad"); reject(new Error("CSS load fail: " + href)); };
        document.head.appendChild(el);
      });
    }

    function loadScript(src, optional=false) {
      return new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = src;
        s.async = false;
        s.onload = () => { bootLine("OK   JS   " + src, "dim"); resolve(); };
        s.onerror = () => {
          bootLine((optional ? "MISS(opt) " : "MISS      ") + src, optional ? "dim" : "bad");
          optional ? resolve() : reject(new Error("Script load fail: " + src));
        };
        document.head.appendChild(s);
      });
    }

    function must(name, ok) {
      bootLine((ok ? "OK   " : "MISS ") + name, ok ? "ok" : "bad");
      if (!ok) throw new Error(name + " missing");
    }
  </script>
</head>

<body>
  <div id="entryContainer"></div>
  <div id="boot">Entry Offline Editor\nLoading…</div>

  <script>
    (async () => {
      const { base, ok } = await pickBase();
      bootLine("BASE = " + base + " (probe: " + ok + ")", "ok");

      const P = (p) => (base === "/" ? (p.startsWith("/") ? p : "/" + p) : (p.startsWith("./") ? p : "./" + p.replace(/^\//, "")));

      // ✅ CSS 먼저
      await loadCSS(P("lib/entry-tool/dist/entry-tool.css")).catch(()=>{});
      await loadCSS(P("lib/entryjs/dist/entry.css")).catch(()=>{});
      await loadCSS(P("lib/codemirror/codemirror.css")).catch(()=>{});
      await loadCSS(P("overrides.css")).catch(()=>{});

      // locales optional
      await loadScript(P("js/ws/locales.js"), true);

      // lodash(_)
      await loadScript(P("lib/lodash/dist/lodash.min.js"));
      if (window._) {
        if (typeof _.contains !== "function") _.contains = (arr, v) => _.includes(arr, v);
        if (typeof _.findWhere !== "function") _.findWhere = (arr, attrs) => _.find(arr, attrs);
      }

      // jQuery
      await loadScript(P("lib/jquery/jquery.min.js"));
      await loadScript(P("lib/jquery-ui/ui/minified/jquery-ui.min.js"));

      // CreateJS
      await loadScript(P("lib/PreloadJS/lib/preloadjs-0.6.0.min.js"));
      await loadScript(P("lib/EaselJS/lib/easeljs-0.8.0.min.js"));
      await loadScript(P("lib/SoundJS/lib/soundjs-0.6.0.min.js"));
      await loadScript(P("lib/SoundJS/lib/flashaudioplugin-0.6.0.min.js"), true);

      // velocity / codemirror
      await loadScript(P("lib/velocity/velocity.min.js"));
      await loadScript(P("lib/codemirror/codemirror.js"));
      await loadScript(P("lib/codemirror/vim.js"), true);

      // ✅ SoundEditor는 스텁 고정(React 기반 파일 로드 금지)
      window.EntrySoundEditor = {
        init(){},
        open(){ alert("Sound editor disabled (offline build)"); },
        close(){}
      };
      bootLine("EntrySoundEditor = stub (disabled)", "dim");

      // entry-tool
      await loadScript(P("lib/entry-tool/dist/entry-tool.js"));

      // entry extern (EntryStatic/EaselHandle/BigNumber/Lang)
      await loadScript(P("lib/entryjs/extern/lang/ko.js"));
      await loadScript(P("lib/entryjs/extern/util/static.js"));
      await loadScript(P("lib/entryjs/extern/util/handle.js"));
      await loadScript(P("lib/entryjs/extern/util/bignumber.min.js"));

      // legacy video
      await loadScript(P("lib/module/legacy-video/index.js"));

      // Entry core
      await loadScript(P("lib/entryjs/dist/entry.min.js"));

      // paint after Entry/EntryStatic
      await loadScript(P("lib/entry-paint/dist/static/js/entry-paint.js"));

      // ✅ 절대경로 강제(이미지/리소스용): base가 "./"라도 실제 요청은 P()로 맞춰짐
      // EntryStatic 내부 키가 버전마다 달라서 "가급적 안전한 형태"만 보정
      try {
        if (window.EntryStatic && typeof window.EntryStatic === "object") {
          const fix = (v) => {
            if (typeof v !== "string") return v;
            // 상대 url(...) 또는 "images/..." 같은 것을 base + lib/entryjs 쪽으로 보정
            if (v.startsWith("images/")) return P("lib/entryjs/" + v);
            if (v.startsWith("media/"))  return P("lib/entryjs/" + v);
            if (v.startsWith("./images/")) return P("lib/entryjs/" + v.replace(/^\.\//,""));
            if (v.startsWith("./media/"))  return P("lib/entryjs/" + v.replace(/^\.\//,""));
            return v;
          };
          for (const k of Object.keys(window.EntryStatic)) {
            const vv = window.EntryStatic[k];
            if (typeof vv === "string") window.EntryStatic[k] = fix(vv);
          }
        }
      } catch {}

      // ---- sanity log ----
      bootLine("_ (lodash) = " + (typeof window._), window._ ? "ok" : "bad");
      bootLine("$.fn.jquery = " + (window.$?.fn?.jquery || "N/A"), window.$ ? "ok" : "bad");
      bootLine("createjs = " + (typeof window.createjs), window.createjs ? "ok" : "bad");
      bootLine("Lang = " + (typeof window.Lang), window.Lang ? "ok" : "bad");
      bootLine("EntryTool = " + (typeof window.EntryTool), window.EntryTool ? "ok" : "bad");
      bootLine("EntryVideoLegacy = " + (typeof window.EntryVideoLegacy), window.EntryVideoLegacy ? "ok" : "bad");
      bootLine("EntryStatic = " + (typeof window.EntryStatic), window.EntryStatic ? "ok" : "bad");
      bootLine("Entry = " + (typeof window.Entry), window.Entry ? "ok" : "bad");
      bootLine("Entry.init = " + (window.Entry ? typeof window.Entry.init : "N/A"),
        (window.Entry && typeof window.Entry.init === "function") ? "ok" : "bad");

      must("lodash(_)", !!window._);
      must("jQuery($)", !!window.$);
      must("createjs", !!window.createjs);
      must("Lang", !!window.Lang);
      must("EntryTool", !!window.EntryTool);
      must("EntryVideoLegacy", !!window.EntryVideoLegacy);
      must("EntryStatic", !!window.EntryStatic);
      must("Entry.init", window.Entry && typeof window.Entry.init === "function");

      bootLine("Starting Entry.init …", "dim");

      Entry.init(document.getElementById("entryContainer"), {
        type: "workspace",
        libDir: (base === "/" ? "/lib" : "./lib"),
        textCodingEnable: true,
        hardwareEnable: false
      });

      Entry.loadProject();

      const boot = document.getElementById("boot");
      if (boot) boot.remove();
    })().catch((e) => {
      bootLine("Boot Error", "bad");
      bootLine(String(e?.stack || e), "bad");
    });
  </script>
</body>
</html>
