<body>

  <!-- ========================= -->

  <!-- ========================= -->
  <!-- Boot Script -->
  <!-- ========================= -->

  <script>
    function showErr(title, e) {
      const el = document.getElementById("boot");
      el.textContent = title + "\n\n" + (e?.stack || e);
      el.style.color = "#ff5555";
    }

    function bootDiag() {
      const miss = [];
      const ok = (name, cond) => { if (!cond) miss.push(name); };

      ok("Entry", !!window.Entry);
      if (window.Entry)
        ok("Entry.init", typeof window.Entry.init === "function");

      ok("_ (lodash)", !!window._);
      ok("React", !!window.React);
      ok("ReactDOM", !!window.ReactDOM);
      ok("createjs", !!window.createjs);
      ok("jQuery", !!window.jQuery || !!window.$);
      ok("CodeMirror", !!window.CodeMirror);

      return miss;
    }

    document.addEventListener("DOMContentLoaded", function () {
      try {
        const miss = bootDiag();
        if (miss.length) {
          throw new Error("Missing globals:\n" + miss.join("\n"));
        }

        Entry.init(document.getElementById("entryContainer"), {
          type: "workspace",
          libDir: "./lib"
        });

        Entry.loadProject();
        document.getElementById("boot").remove();

      } catch (e) {
        showErr("Boot Error", e);
      }
    });
  </script>

</body>

<body>
  <div id="boot">
    <div>
      <div style="font-size:18px;font-weight:700;">Entry Offline Editor</div>
      <small>Loading…</small>
    </div>
  </div>

  <div id="entryContainer"></div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      try {
        if (!window.Entry) throw new Error("Entry is not defined");
        if (typeof Entry.init !== "function") throw new Error("Entry.init is not a function");

        var initOption = { type: "workspace", textCodingEnable: true };
        Entry.creationChangedEvent = new Entry.Event(window);
        Entry.init(document.getElementById("entryContainer"), initOption);
        Entry.loadProject();

        document.getElementById("boot").remove();
      } catch (e) {
        showErr("Boot Error", e);
      }
    });
  </script>

        document.getElementById("boot").remove();
      } catch (e) {
        showErr("Boot Error", e);
      }
    });
