<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Entry Offline Editor</title>

  <link rel="stylesheet" href="./lib/entry-tool/dist/entry-tool.css" />
  <link rel="stylesheet" href="./lib/entryjs/dist/entry.css" />
  <link rel="stylesheet" href="./lib/codemirror/codemirror.css" />
  <link rel="stylesheet" href="./overrides.css" />

  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#111}
    #entryContainer{width:100%;height:100%;background:#f5f5f5}
    #boot{
      position:fixed;inset:0;background:#000;color:#0f0;
      font:12px/1.45 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      padding:12px;white-space:pre-wrap;overflow:auto;z-index:9999
    }
    .bad{color:#ff5c5c}
    .dim{opacity:.8}
    .ok{color:#66ff66}
    .warn{color:#ffd166}
  </style>

  <script>
    function bootLine(t, cls="") {
      const el = document.getElementById("boot");
      if (!el) return;
      const d = document.createElement("div");
      if (cls) d.className = cls;
      d.textContent = t;
      el.appendChild(d);
      el.scrollTop = el.scrollHeight;
    }

    window.onerror = function (m, s, l, c, e) {
      bootLine("JS ERROR:", "bad");
      bootLine(String(e && e.stack ? e.stack : m), "bad");
    };

    async function safeLoadScript(url, {required=false, label=url} = {}) {
      try {
        bootLine(`LOAD ${label}: ${url}`, "dim");
        const res = await fetch(url, { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const txt = await res.text();
        const head = txt.trim().slice(0, 32);
        if (head.startsWith("<!doctype") || head.startsWith("<html") || head.startsWith("<")) {
          throw new Error(`Got HTML instead of JS (starts with: ${JSON.stringify(head)})`);
        }
        const blob = new Blob([txt], { type: "text/javascript" });
        const blobUrl = URL.createObjectURL(blob);
        await new Promise((resolve, reject) => {
          const s = document.createElement("script");
          s.src = blobUrl;
          s.async = false;
          s.onload = () => { URL.revokeObjectURL(blobUrl); resolve(); };
          s.onerror = () => { URL.revokeObjectURL(blobUrl); reject(new Error("script tag load error")); };
          document.head.appendChild(s);
        });
        bootLine(`OK   ${label}`, "ok");
        return true;
      } catch (e) {
        bootLine(`MISS ${label}: ${String(e && e.message ? e.message : e)}`, required ? "bad" : "warn");
        if (required) throw e;
        return false;
      }
    }

    function must(cond, msg) { if (!cond) throw new Error(msg); }
  </script>
</head>

<body>
  <div id="entryContainer"></div>
  <div id="boot">Entry Offline Editor\nLoading…</div>

  <!-- 1) lodash -->
  <script src="./lib/lodash.min.js"></script>

  <!-- ✅ 1.5) underscore 호환 폴리필 (Entry 로드 전에!) -->
  <script>
    (function () {
      if (!window._) return;

      // _.contains -> _.includes
      if (typeof _.contains !== "function" && typeof _.includes === "function") {
        _.contains = _.includes;
      }

      // _.findWhere(list, props)
      if (typeof _.findWhere !== "function") {
        _.findWhere = function (list, props) {
          if (!list) return undefined;
          const keys = props ? Object.keys(props) : [];
          return _.find(list, function (item) {
            if (!item) return false;
            for (let i = 0; i < keys.length; i++) {
              const k = keys[i];
              if (item[k] !== props[k]) return false;
            }
            return true;
          });
        };
      }

      // _.where(list, props) -> filter
      if (typeof _.where !== "function") {
        _.where = function (list, props) {
          if (!list) return [];
          const keys = props ? Object.keys(props) : [];
          return _.filter(list, function (item) {
            if (!item) return false;
            for (let i = 0; i < keys.length; i++) {
              const k = keys[i];
              if (item[k] !== props[k]) return false;
            }
            return true;
          });
        };
      }

      // (구버전 underscore에서 종종 쓰는 alias)
      if (typeof _.all !== "function" && typeof _.every === "function") _.all = _.every;
      if (typeof _.any !== "function" && typeof _.some === "function") _.any = _.some;

      // 진단용
      window.__ENTRY_POLYFILLED__ = true;
    })();
  </script>

  <!-- 2) CodeMirror -->
  <script src="./lib/codemirror/codemirror.js"></script>
  <script src="./lib/codemirror/vim.js"></script>

  <!-- 3) jQuery -->
  <script src="./lib/jquery/jquery.min.js"></script>
  <script src="./lib/jquery-ui/ui/minified/jquery-ui.min.js"></script>

  <!-- 4) CreateJS -->
  <script src="./lib/EaselJS/lib/easeljs-0.8.2.min.js"></script>
  <script src="./lib/PreloadJS/lib/preloadjs-0.6.2.min.js"></script>
  <script src="./lib/SoundJS/lib/soundjs-0.6.2.min.js"></script>

  <!-- 5) Entry prereq -->
  <script src="./lib/entryjs/extern/lang/ko.js"></script>
  <script src="./lib/entryjs/extern/util/static.js"></script>
  <script src="./lib/entryjs/extern/util/handle.js"></script>
  <script src="./lib/entryjs/extern/util/bignumber.min.js"></script>

  <!-- 6) Entry core -->
  <script src="./lib/entryjs/dist/entry.min.js"></script>

  <!-- 7) tool/paint -->
  <script src="./lib/entry-tool/dist/entry-tool.js"></script>
  <script src="./lib/entry-paint/dist/static/js/entry-paint.js"></script>

  <script>
    (async () => {
      try {
        await safeLoadScript("./js/ws/locales.js", { required:false, label:"ws/locales.js" });

        bootLine("_ (lodash) = " + (typeof window._), window._ ? "ok" : "bad");
        bootLine("_.contains = " + (window._ ? typeof _.contains : "N/A"), (window._ && typeof _.contains==="function") ? "ok" : "warn");
        bootLine("_.findWhere = " + (window._ ? typeof _.findWhere : "N/A"), (window._ && typeof _.findWhere==="function") ? "ok" : "warn");
        bootLine("_.chain = " + (window._ ? typeof _.chain : "N/A"), (window._ && typeof _.chain==="function") ? "ok" : "bad");
        bootLine("CodeMirror = " + (typeof window.CodeMirror),
          (typeof window.CodeMirror === "function" || typeof window.CodeMirror === "object") ? "ok" : "warn");

        bootLine("$ (jQuery) = " + (typeof window.$), window.$ ? "ok" : "bad");
        bootLine("createjs = " + (typeof window.createjs), (typeof window.createjs==="object") ? "ok" : "bad");
        bootLine("Lang = " + (typeof window.Lang), window.Lang ? "ok" : "bad");
        bootLine("EaselHandle = " + (typeof window.EaselHandle), window.EaselHandle ? "ok" : "bad");
        bootLine("BigNumber = " + (typeof window.BigNumber), window.BigNumber ? "ok" : "bad");
        bootLine("Entry = " + (typeof window.Entry), window.Entry ? "ok" : "bad");
        bootLine("Entry.init = " + (window.Entry ? typeof window.Entry.init : "N/A"),
          (window.Entry && typeof window.Entry.init === "function") ? "ok" : "bad");

        must(window._, "lodash(_) missing");
        must(typeof _.contains === "function", "underscore-compat missing: _.contains");
        must(window.$, "jQuery missing");
        must(typeof window.createjs === "object", "createjs missing");
        must(window.Lang, "Lang missing");
        must(window.EaselHandle, "EaselHandle missing");
        must(window.BigNumber, "BigNumber missing");
        must(window.Entry && typeof window.Entry.init === "function", "Entry.init missing");

        bootLine("Starting Entry.init …", "dim");

        Entry.init(document.getElementById("entryContainer"), {
          type: "workspace",
          libDir: "./lib",

          // ✅ 일단 안정 부팅 우선
          textCodingEnable: false
        });

        document.getElementById("boot").remove();
      } catch (e) {
        bootLine("Boot Error", "bad");
        bootLine(String(e && e.stack ? e.stack : e), "bad");
      }
    })();
  </script>
</body>
</html>
