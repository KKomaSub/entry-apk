<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Entry Offline Editor</title>
<script src="./local_backend.js"></script>
  <link rel="stylesheet" href="overrides.css">

  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#111}
    #entryContainer{width:100%;height:100%;background:#f5f5f5}
    #boot{
      position:fixed;inset:0;background:#000;color:#0f0;
      font:12px/1.45 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      padding:12px;white-space:pre-wrap;overflow:auto;z-index:9999
    }
    .bad{color:#ff5c5c}
    .dim{opacity:.85}
    .ok{color:#66ff66}
  </style>

  <!-- boot logger (전역 고정) -->
  <script>
    function bootLineImpl(t, cls="") {
      const el = document.getElementById("boot");
      if (!el) return;
      const d = document.createElement("div");
      if (cls) d.className = cls;
      d.textContent = t;
      el.appendChild(d);
      el.scrollTop = el.scrollHeight;
    }
    window.bootLine = bootLineImpl;
    window.__bootLine = bootLineImpl;
    window.__bootline = bootLineImpl;
  </script>
<script>
  // ✅ entry-offline renderer가 기대하는 전역 훅 (없으면 바로 크래시)
  if (typeof window.onPageLoaded !== "function") {
    window.onPageLoaded = function () {
      // renderer가 부팅 완료 시점에 호출하려는 훅
      if (window.bootLine) bootLine("HOOK onPageLoaded()", "dim");
    };
  }
  if (typeof window.onPageUnloaded !== "function") {
    window.onPageUnloaded = function () {
      if (window.bootLine) bootLine("HOOK onPageUnloaded()", "dim");
    };
  }
</script>
  <!-- drawImage guard (broken png/svg 로 인해 렌더 루프 죽는 것 방지) -->
  <script>
    if (!window.__DRAWIMAGE_GUARD__) {
      window.__DRAWIMAGE_GUARD__ = true;
      const proto = window.CanvasRenderingContext2D && CanvasRenderingContext2D.prototype;
      if (proto && proto.drawImage) {
        const _drawImage = proto.drawImage;
        proto.drawImage = function(img, ...rest) {
          try {
            if (img && img.tagName === "IMG") {
              const nw = img.naturalWidth || 0, nh = img.naturalHeight || 0;
              if (nw === 0 || nh === 0) return; // broken이면 스킵
            }
            return _drawImage.call(this, img, ...rest);
          } catch (_) {
            return; // 무조건 삼킴
          }
        };
      }
    }
  </script>

  <script>
    // 기존 호출 호환용 alias
    const bootLine = (...args) => window.bootLine(...args);

    function hideBootLater(delayMs = 1200) {
      setTimeout(() => {
        const el = document.getElementById("boot");
        if (el) el.remove();
      }, delayMs);
    }
function fireReadyAgainOnce() {
  if (window.__FIRED_READY_AGAIN__) return;
  window.__FIRED_READY_AGAIN__ = true;

  try {
    const ev = new Event("DOMContentLoaded", { bubbles: true, cancelable: true });
    document.dispatchEvent(ev);

    const ev2 = new Event("load");
    window.dispatchEvent(ev2);

    bootLine("PATCH: re-fire DOMContentLoaded/load after renderer_build (once)", "ok");
  } catch (e) {
    bootLine("PATCH fireReadyAgain failed: " + e, "bad");
  }
}
    // ✅ BASE 자동 탐지 (./, /, /public/, /www/ 중 1개)
    async function probeBase(prefix) {
      const url = prefix + "lib/lodash/dist/lodash.min.js";
      try {
        const r = await fetch(url, { method: "GET", cache: "no-store" });
        return r.ok;
      } catch (_) {
        return false;
      }
    }

    // ✅ /images/... 절대경로를 ./images/... 로 강제 + entry./ 오타 흡수
    function installPathFixers() {
      if (window.__PATH_FIXERS_INSTALLED__) return;
      window.__PATH_FIXERS_INSTALLED__ = true;

      const fix = (u) => {
        if (typeof u !== "string") return u;

        // ✅ entry./ 오타 경로 교정 (중요: click.mp3 같은 것)
        u = u.replace("/lib/@entrylabs/entry./", "/lib/@entrylabs/entry/");
        u = u.replace("lib/@entrylabs/entry./", "lib/@entrylabs/entry/");

        // ✅ /images/... -> ./images/...
        if (u.startsWith("/images/")) return "./images/" + u.slice("/images/".length);

        return u;
      };

      // Image.src
      const d = Object.getOwnPropertyDescriptor(Image.prototype, "src");
      if (d && d.set) {
        Object.defineProperty(Image.prototype, "src", {
          get: d.get,
          set(v) { return d.set.call(this, fix(v)); }
        });
      }

      // XHR.open
      const _open = XMLHttpRequest.prototype.open;
      XMLHttpRequest.prototype.open = function(method, url, ...rest) {
        return _open.call(this, method, fix(url), ...rest);
      };

      // fetch
      if (window.fetch) {
        const _fetch = window.fetch.bind(window);
        window.fetch = (input, init) => {
          if (typeof input === "string") return _fetch(fix(input), init);
          if (input && typeof input.url === "string") return _fetch(new Request(fix(input.url), input), init);
          return _fetch(input, init);
        };
      }

      bootLine("PATCH: /images -> ./images + fix entry./ path", "dim");
    }

    function loadJS(src) {
      return new Promise((resolve) => {
        const s = document.createElement("script");
        s.src = src;
        s.defer = false;
        s.async = false; // ✅ 순서 보장
        s.onload = () => resolve({ ok: true, src });
        s.onerror = () => resolve({ ok: false, src });
        document.head.appendChild(s);
      });
    }
function checkObjectPopup() {
  const popup = document.getElementById("EntryPopupContainer");
  bootLine("CHECK #EntryPopupContainer exists=" + !!popup, popup ? "ok" : "bad");

  if (popup) {
    const cs = getComputedStyle(popup);
    bootLine(
      "CHECK #EntryPopupContainer display=" + cs.display +
      " visibility=" + cs.visibility +
      " opacity=" + cs.opacity +
      " children=" + popup.children.length,
      "dim"
    );
  }
}
    function loadCSS(href) {
      return new Promise((resolve) => {
        const l = document.createElement("link");
        l.rel = "stylesheet";
        l.href = href;
        l.onload = () => resolve({ ok: true, href });
        l.onerror = () => resolve({ ok: false, href });
        document.head.appendChild(l);
      });
    }
function patchReactDomRenderProbe() {
  try {
    if (!window.ReactDOM || window.ReactDOM.__PATCHED_RENDER__) return;
    window.ReactDOM.__PATCHED_RENDER__ = true;

    const orig = window.ReactDOM.render;
    if (typeof orig !== "function") return;

    window.ReactDOM.render = function (el, container, cb) {
      try {
        bootLine("PROBE ReactDOM.render -> " + (container && (container.id || container.className || container.tagName)), "ok");
      } catch (_) {}
      return orig.call(this, el, container, cb);
    };

    bootLine("PATCH: ReactDOM.render probe installed", "dim");
  } catch (e) {
    bootLine("PATCH ReactDOM probe failed: " + e, "bad");
  }
}
    async function boot() {
      installPathFixers();

      const candidates = ["./", "/", "/public/", "/www/"];
      let BASE = "./";
      for (const c of candidates) {
        bootLine("PROBE BASE: " + c, "dim");
        if (await probeBase(c)) { BASE = c; break; }
      }
      bootLine("BASE = " + BASE, "ok");

      // ✅ CSS (LMS 먼저 포함)
      const cssList = [
        BASE + "lib/entry-lms/dist/assets/app.css",
        BASE + "lib/entry-tool/dist/entry-tool.css",
        BASE + "lib/entryjs/dist/entry.css",
        BASE + "lib/codemirror/codemirror.css",
        BASE + "lib/codemirror/addon/hint/show-hint.css",
        BASE + "lib/codemirror/addon/lint/lint.css",
        BASE + "overrides.css",
      ];

      for (const href of cssList) {
        const r = await loadCSS(href);
        bootLine((r.ok ? "OK   CSS  " : "MISS CSS ") + href, r.ok ? "ok" : "bad");
      }

      // ✅ JS 로드 순서 (중요!)
      // - EntryTool은 renderer_build보다 반드시 먼저
      // - renderer_build는 맨 마지막 (안에 Entry.init이 이미 있음)
const jsList = [
  // 기본
  BASE + "lib/lodash/dist/lodash.min.js",
  BASE + "lib/jquery/jquery.min.js",
  BASE + "lib/jquery-ui/ui/minified/jquery-ui.min.js",
  BASE + "lib/velocity/velocity.min.js",

  // createjs
  BASE + "lib/PreloadJS/lib/preloadjs-0.6.0.min.js",
  BASE + "lib/EaselJS/lib/easeljs-0.8.0.min.js",
  BASE + "lib/SoundJS/lib/soundjs-0.6.0.min.js",
  BASE + "lib/SoundJS/lib/flashaudioplugin-0.6.0.min.js", // optional

  // CodeMirror
  BASE + "lib/codemirror/codemirror.js",
  BASE + "lib/codemirror/vim.js",
  BASE + "lib/codemirror/addon/hint/show-hint.js",
  BASE + "lib/codemirror/addon/lint/lint.js",
  BASE + "lib/codemirror/addon/selection/active-line.js",
  BASE + "lib/codemirror/mode/javascript/javascript.js",
  //BASE + "lib/codemirror/addon/hint/javascript-hint.js",

  // 기타
  BASE + "js/jshint.js",
  BASE + "lib/fuzzy/lib/fuzzy.js",
  BASE + "js/ws/python.js",

  // React 먼저
  BASE + "lib/react/umd/react.production.min.js",
  BASE + "lib/react-dom/umd/react-dom.production.min.js",
  BASE + "lib/entryjs/extern/lang/ko.js",
  // entry-lms UI shell 먼저(모달/포털/토스트 루트 사용)
  BASE + "lib/entry-lms/dist/assets/app.js",



  // Entry 엔진 본체는 (네가 쓰는 방식이면) 여기

  BASE + "lib/entryjs/extern/util/static.js",
  BASE + "lib/entryjs/extern/util/handle.js",
  BASE + "lib/entryjs/extern/util/bignumber.min.js",
  BASE + "lib/entryjs/extern/util/filbert.js",
  BASE + "lib/entryjs/extern/util/CanvasInput.js",
  BASE + "lib/entryjs/extern/util/ndgmr.Collision.js",
  BASE + "lib/module/legacy-video/index.js",


  // entry-tool (renderer_build 안에서 EntryTool 참조하는 케이스 대비)
  BASE + "lib/entry-tool/dist/entry-tool.js",
  BASE + "lib/external/sound/sound-editor.js", // optional
  BASE + "lib/entryjs/dist/entry.min.js",
  BASE + "lib/entry-paint/dist/static/js/entry-paint.js",
  // ✅✅ renderer_build는 반드시 init → render 순서
  BASE + "renderer_build/init.bundle.js",
  BASE + "renderer_build/render.bundle.js",
];

      for (const src of jsList) {
        const optional =
          src.includes("flashaudioplugin") ||
          src.includes("/vim.js") ||
          src.includes("/external/sound/sound-editor.js");

        const r = await loadJS(src);

        // sound-editor.js 실패 시 스텁
        if (!r.ok && src.includes("/external/sound/sound-editor.js")) {
          bootLine("MISS(opt) " + src, "dim");
          bootLine("PATCH EntrySoundEditor: stub applied", "dim");
          if (!window.EntrySoundEditor) {
            window.EntrySoundEditor = {
              renderSoundEditor: function(){},
              registExportFunction: function(){},
              registImportFunction: function(){},
              init: function(){},
            };
          }
          continue;
        }

        bootLine(
          (r.ok ? "OK   JS   " : (optional ? "MISS(opt) " : "MISS     ")) + src,
          r.ok ? "ok" : (optional ? "dim" : "bad")
        );

        // 필수 실패 시 즉시 중단(원인 로그 확보)
        if (!r.ok && !optional) {
          throw new Error("Required JS missing: " + src);
        }
      }
      // jsList 로딩 끝난 직후에 1번만
if (window.__PAGE_LOADED_FIRED__ && typeof window.onPageLoaded === "function") {
  bootLine("RECALL onPageLoaded after bundles", "dim");
  window.onPageLoaded();
}
      patchReactDomRenderProbe();

      // ✅ renderer_build가 죽는지 빠르게 확인 (EntryTool undefined 방지용)
      bootLine("CHECK EntryTool=" + (typeof window.EntryTool), (typeof window.EntryTool !== "undefined") ? "ok" : "bad");
      bootLine("CHECK Entry=" + (typeof window.Entry), (typeof window.Entry !== "undefined") ? "ok" : "bad");

      // ✅ 중요: 여기서 Entry.init / Entry.loadProject 절대 호출 금지
      // renderer_build 내부에서 이미 Entry.init을 수행하고 UI(모달/패널)까지 구성함

      bootLine("BOOT OK: renderer_build loaded (Entry.init is inside render.bundle.js)", "ok");
      bootLine("EARLY CHECK ipcRenderer=" + (typeof window.ipcRenderer), window.ipcRenderer ? "ok" : "bad");
bootLine("EARLY CHECK require=" + (typeof window.require), window.require ? "ok" : "bad");

checkObjectPopup()
// 0.5초 후 mount 여부 체크 (아이들 늘어나면 성공)
setTimeout(() => {
  const root = document.getElementById("root");
  const lms  = document.getElementById("entry-lms-root");
  const modal= document.getElementById("modal-root");
  bootLine("AFTER refire root.children=" + (root ? root.children.length : -1), "dim");
  bootLine("AFTER refire lms.children="  + (lms  ? lms.children.length  : -1), "dim");
  bootLine("AFTER refire modal.children="+ (modal? modal.children.length: -1), "dim");
}, 500);
      // renderer_build까지 로드한 직후에 추가
setTimeout(() => {


     Entry.init(document.getElementById("entryContainer"), {
        type: "workspace",
        libDir: "./lib",
        textCodingEnable: true
      });

      Entry.loadProject();
    hideBootLater(800);

}, 2000);
      //fireReadyAgainOnce()

    }

    window.onerror = function(m, s, l, c, e) {
      bootLine("JS ERROR:", "bad");
      bootLine(String(e && e.stack ? e.stack : m), "bad");
    };

document.addEventListener("DOMContentLoaded", () => {
  boot().catch(e => {
    bootLine("Boot Error", "bad");
    bootLine(String(e && e.stack ? e.stack : e), "bad");
  });
}, { once: true });
  </script>
</head>

<body>
    <div id="boot">Entry Offline Editor
Made by KKomaProgrammer
Loading…</div>

  <!-- ✅ renderer_build(Entry Offline UI)가 붙는 루트들 -->
  <div id="root"></div>


  <!-- 기존 Entry 작업영역 -->
  <div id="entryContainer"></div>

  <!-- 부트 로그 -->

</body>
</html>
