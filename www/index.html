<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Entry Offline Editor</title>

  <!-- Entry UI CSS -->
  <link rel="stylesheet" href="/lib/entry-tool/dist/entry-tool.css" />
  <link rel="stylesheet" href="/lib/entryjs/dist/entry.css" />
  <link rel="stylesheet" href="/lib/codemirror/codemirror.css" />
  <link rel="stylesheet" href="/overrides.css" />

  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#111}
    #entryContainer{width:100%;height:100%;background:#f5f5f5}
    #boot{
      position:fixed;inset:0;background:#000;color:#0f0;
      font:12px/1.45 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      padding:12px;white-space:pre-wrap;overflow:auto;z-index:9999
    }
    .bad{color:#ff5c5c}
    .dim{opacity:.85}
    .ok{color:#66ff66}
  </style>

  <script>
    function bootLine(t, cls="") {
      const el = document.getElementById("boot");
      if (!el) return;
      const d = document.createElement("div");
      if (cls) d.className = cls;
      d.textContent = t;
      el.appendChild(d);
      el.scrollTop = el.scrollHeight;
    }
    window.addEventListener("error", (ev) => {
      bootLine("JS ERROR:", "bad");
      bootLine(String(ev?.error?.stack || ev?.message || ev), "bad");
    });
    window.addEventListener("unhandledrejection", (ev) => {
      bootLine("PROMISE ERROR:", "bad");
      bootLine(String(ev?.reason?.stack || ev?.reason || ev), "bad");
    });
    function must(name, ok) {
      bootLine((ok ? "OK   " : "MISS ") + name, ok ? "ok" : "bad");
      if (!ok) throw new Error(name + " missing");
    }
    async function loadScript(label, src) {
      return new Promise((resolve) => {
        const s = document.createElement("script");
        s.src = src;
        s.async = false;
        s.onload = () => { bootLine("LOAD " + label + ": " + src, "dim"); resolve(true); };
        s.onerror = () => { bootLine("MISS " + label + ": " + src, "bad"); resolve(false); };
        document.head.appendChild(s);
      });
    }
  </script>
</head>

<body>
  <div id="entryContainer"></div>
  <div id="boot">Entry Offline Editor\nLoading…</div>

  <!-- locales (있으면 좋고, 없어도 치명적이진 않음) -->
  <script src="/js/ws/locales.js"></script>

  <!-- 1) lodash를 _ 로 고정 (Entry가 강하게 기대) -->
  <script src="/lib/lodash/dist/lodash.min.js"></script>
  <script>
    // Entry가 underscore 스타일 API 일부를 호출하는 케이스가 있어 shim 제공
    // lodash 4.x 기준: includes/find
    if (window._) {
      if (typeof _.contains !== "function") _.contains = (arr, v) => _.includes(arr, v);
      if (typeof _.findWhere !== "function") _.findWhere = (arr, attrs) => _.find(arr, attrs);
    }
  </script>

  <!-- 2) jQuery -->
  <script src="/lib/jquery/jquery.min.js"></script>
  <script src="/lib/jquery-ui/ui/minified/jquery-ui.min.js"></script>

  <!-- 3) CreateJS (Stage/오브젝트 렌더링 필수) -->
  <script src="/lib/PreloadJS/lib/preloadjs-0.6.0.min.js"></script>
  <script src="/lib/EaselJS/lib/easeljs-0.8.0.min.js"></script>
  <script src="/lib/SoundJS/lib/soundjs-0.6.0.min.js"></script>
  <!-- flashaudioplugin은 최신 브라우저/웹뷰에선 없어도 대체로 OK -->
  <script>
    // (선택) 있으면 로드, 없으면 스킵
    loadScript("flashaudioplugin(optional)", "/lib/SoundJS/lib/flashaudioplugin-0.6.0.min.js");
  </script>

  <!-- 4) velocity (Entry가 애니메이션에 사용) -->
  <script src="/lib/velocity/velocity.min.js"></script>

  <!-- 5) CodeMirror (텍스트코딩/편집기) -->
  <script src="/lib/codemirror/codemirror.js"></script>
  <script src="/lib/codemirror/vim.js"></script>

  <!-- 6) EntryTool/EntryPaint/VideoLegacy/SoundEditor : entry.min.js 보다 "먼저" -->
  <script src="/lib/entry-tool/dist/entry-tool.js"></script>
  <script src="/lib/entry-paint/dist/static/js/entry-paint.js"></script>
  <script src="/lib/module/legacy-video/index.js"></script>

  <!-- EntrySoundEditor: 파일이 없을 수 있으니 "있으면 로드" + 없으면 스텁 -->
  <script>
    (async () => {
      const ok = await loadScript("EntrySoundEditor", "/lib/external/sound/sound-editor.js");
      if (!ok) {
        // 최소 스텁: entry.min.js 로딩 크래시 방지
        window.EntrySoundEditor = window.EntrySoundEditor || {
          open: () => alert("Sound editor asset missing (stub)"),
          close: () => {},
          init: () => {},
        };
        bootLine("STUB EntrySoundEditor installed", "bad");
      }
    })();
  </script>

  <!-- 7) Entry extern (lang/static/handle/bignumber) -->
  <script src="/lib/entryjs/extern/lang/ko.js"></script>
  <script src="/lib/entryjs/extern/util/static.js"></script>
  <script src="/lib/entryjs/extern/util/handle.js"></script>
  <script src="/lib/entryjs/extern/util/bignumber.min.js"></script>

  <!-- 8) Entry core -->
  <script src="/lib/entryjs/dist/entry.min.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      try {
        // 전역 체크
        bootLine("_ (lodash) = " + (typeof window._), window._ ? "ok" : "bad");
        bootLine("_.memoize = " + (window._ ? typeof _.memoize : "N/A"), (window._ && typeof _.memoize==="function") ? "ok" : "bad");
        bootLine("_.chain = " + (window._ ? typeof _.chain : "N/A"), (window._ && typeof _.chain==="function") ? "ok" : "bad");
        bootLine("_.contains = " + (window._ ? typeof _.contains : "N/A"), (window._ && typeof _.contains==="function") ? "ok" : "bad");
        bootLine("$.fn.jquery = " + (window.$?.fn?.jquery || "N/A"), window.$ ? "ok" : "bad");
        bootLine("createjs = " + (typeof window.createjs), window.createjs ? "ok" : "bad");
        bootLine("Lang = " + (typeof window.Lang), window.Lang ? "ok" : "bad");
        bootLine("EaselHandle = " + (typeof window.EaselHandle), window.EaselHandle ? "ok" : "bad");
        bootLine("BigNumber = " + (typeof window.BigNumber), window.BigNumber ? "ok" : "bad");
        bootLine("CodeMirror = " + (typeof window.CodeMirror), window.CodeMirror ? "ok" : "bad");
        bootLine("EntryTool = " + (typeof window.EntryTool), window.EntryTool ? "ok" : "bad");
        bootLine("EntryVideoLegacy = " + (typeof window.EntryVideoLegacy), window.EntryVideoLegacy ? "ok" : "bad");
        bootLine("EntrySoundEditor = " + (typeof window.EntrySoundEditor), window.EntrySoundEditor ? "ok" : "bad");
        bootLine("Entry = " + (typeof window.Entry), window.Entry ? "ok" : "bad");
        bootLine("Entry.init = " + (window.Entry ? typeof window.Entry.init : "N/A"),
          (window.Entry && typeof window.Entry.init === "function") ? "ok" : "bad");

        must("lodash(_)", !!window._);
        must("jQuery($)", !!window.$);
        must("createjs", !!window.createjs);
        must("Lang", !!window.Lang);
        must("EntryTool", !!window.EntryTool);
        must("EntryVideoLegacy", !!window.EntryVideoLegacy);
        // SoundEditor는 스텁이라도 있으면 OK
        must("EntrySoundEditor", !!window.EntrySoundEditor);
        must("Entry.init", window.Entry && typeof window.Entry.init === "function");

        bootLine("Starting Entry.init …", "dim");

        Entry.init(document.getElementById("entryContainer"), {
          type: "workspace",
          libDir: "/lib",
          fonts: [
            // 폰트는 없어도 되지만, 있으면 글상자 깨짐 줄어듦 (추가 폰트 파일은 나중에 vendoring 가능)
          ],
          // 기능 토글 (필요 시 true/false 바꿔도 됨)
          projectsaveable: true,
          objectaddable: true,
          soundeditable: true,
          pictureeditable: true,
          textCodingEnable: true,
          hardwareEnable: false
        });

        // 기본 프로젝트 로드
        Entry.loadProject();

        const boot = document.getElementById("boot");
        if (boot) boot.remove();
      } catch (e) {
        bootLine("Boot Error", "bad");
        bootLine(String(e?.stack || e), "bad");
      }
    });
  </script>
</body>
</html>
