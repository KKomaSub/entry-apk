<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Entry Offline Editor (APK)</title>

  <style>
    html, body { margin:0; height:100%; background:#111; }
    #entryContainer { height:100vh; }
    #boot { position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
            font-family:system-ui, -apple-system, Segoe UI, Roboto, sans-serif; color:#fff; }
    #boot small { opacity: .8; }
  </style>

  <!-- ✅ 에러를 "흰 화면" 대신 화면에 표시 -->
  <script>
    function showErr(title, err) {
      document.body.style.margin = "0";
      document.body.innerHTML =
        '<pre style="white-space:pre-wrap;padding:12px;font-size:12px;font-family:monospace;color:#fff;background:#000;min-height:100vh;">'
        + title + "\n\n"
        + (err?.message || err) + "\n"
        + (err?.stack || "")
        + '</pre>';
    }
    window.addEventListener("error", (e) => showErr("JS Error", e.error || e.message));
    window.addEventListener("unhandledrejection", (e) => showErr("Promise Rejection", e.reason));
  </script>

  <!-- CSS -->
  <link rel="stylesheet" href="./lib/entry-tool/dist/entry-tool.css" />
  <link rel="stylesheet" href="./lib/entry-js/dist/entry.css" />

  <!-- Entry extern (최소) -->
  <script src="./lib/entry-js/extern/lang/ko.js"></script>
  <script src="./lib/entry-js/extern/util/static.js"></script>

  <!-- Entry tool / paint -->
  <script src="./lib/entry-tool/dist/entry-tool.js"></script>
  <script src="./lib/entry-paint/dist/static/js/entry-paint.js"></script>

  <!-- EntryJS core -->
  <script src="./lib/entry-js/dist/entry.min.js"></script>
</head>

<body>
  <div id="boot">
    <div>
      <div style="font-size:18px;font-weight:700;">Entry Offline Editor</div>
      <small>Loading assets…</small>
    </div>
  </div>
  <div id="entryContainer"></div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      try {
        if (!window.Entry) throw new Error("Entry is not defined (entry.min.js 로딩 실패)");
        var initOption = { type: "workspace", textCodingEnable: true };
        Entry.creationChangedEvent = new Entry.Event(window);
        Entry.init(document.getElementById("entryContainer"), initOption);
        Entry.loadProject(); // 빈 프로젝트
        document.getElementById("boot").remove();
      } catch (e) {
        showErr("Boot Error", e);
      }
    });
  </script>
</body>
</html></body>
</html>
