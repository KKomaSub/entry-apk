<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Entry Offline Editor</title>

  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#111}
    #entryContainer{width:100%;height:100%;background:#f5f5f5}
    #boot{
      position:fixed;inset:0;background:#000;color:#0f0;
      font:12px/1.45 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      padding:12px;white-space:pre-wrap;overflow:auto;z-index:9999
    }
    .bad{color:#ff5c5c}
    .dim{opacity:.85}
    .ok{color:#66ff66}
  </style>

  <script>
    function bootLine(t, cls="") {
      const el = document.getElementById("boot");
      if (!el) return;
      const d = document.createElement("div");
      if (cls) d.className = cls;
      d.textContent = t;
      el.appendChild(d);
      el.scrollTop = el.scrollHeight;
    }
    window.onerror = function (m, s, l, c, e) {
      bootLine("JS ERROR:", "bad");
      bootLine(String(e && e.stack ? e.stack : m), "bad");
    };

    async function probeBase(prefix) {
      const url = prefix + "lib/lodash/dist/lodash.min.js";
      try {
        const r = await fetch(url, { method: "GET", cache: "no-store" });
        return r.ok;
      } catch (_) { return false; }
    }

    function loadJS(src) {
      return new Promise((resolve) => {
        const s = document.createElement("script");
        s.src = src;
        s.onload = () => resolve({ ok: true, src });
        s.onerror = () => resolve({ ok: false, src });
        document.head.appendChild(s);
      });
    }

    function loadCSS(href) {
      return new Promise((resolve) => {
        const l = document.createElement("link");
        l.rel = "stylesheet";
        l.href = href;
        l.onload = () => resolve({ ok: true, href });
        l.onerror = () => resolve({ ok: false, href });
        document.head.appendChild(l);
      });
    }

    function must(cond, msg){
      if(!cond) throw new Error(msg);
      bootLine("OK   " + msg, "ok");
    }

    // ✅ entry.min.js가 기대하는 최소 SoundEditor API를 "항상" 제공
    function ensureEntrySoundEditorStub() {
      if (!window.EntrySoundEditor) window.EntrySoundEditor = {};
      // entry.min.js에서 호출하는 케이스 대응
      if (typeof window.EntrySoundEditor.renderSoundEditor !== "function") {
        window.EntrySoundEditor.renderSoundEditor = function(){ /* noop */ };
      }
      if (typeof window.EntrySoundEditor.registExportFunction !== "function") {
        window.EntrySoundEditor.registExportFunction = function(){ /* noop */ };
      }
      if (typeof window.EntrySoundEditor.registImportFunction !== "function") {
        window.EntrySoundEditor.registImportFunction = function(){ /* noop */ };
      }
      return window.EntrySoundEditor;
    }

    async function boot() {
      const candidates = ["./", "/", "/public/", "/www/"];
      let BASE = "./";
      for (const c of candidates) {
        bootLine("PROBE BASE: " + c, "dim");
        if (await probeBase(c)) { BASE = c; break; }
      }
      bootLine("BASE = " + BASE, "ok");
      bootLine("PATCH URL rewrite: /... -> BASE/...", "dim");

      // CSS
      const cssList = [
        BASE + "lib/entry-tool/dist/entry-tool.css",
        BASE + "lib/entryjs/dist/entry.css",
        BASE + "lib/codemirror/codemirror.css",
        BASE + "overrides.css",
      ];
      for (const href of cssList) {
        const r = await loadCSS(href);
        bootLine((r.ok ? "OK   CSS  " : "MISS CSS ") + href, r.ok ? "ok" : "bad");
      }

      // locales
      {
        const src = BASE + "js/ws/locales.js";
        const r = await loadJS(src);
        bootLine((r.ok ? "OK   JS   " : "MISS(opt) ") + src, r.ok ? "ok" : "dim");
      }

      // JS load order
      const jsList = [
        BASE + "lib/lodash/dist/lodash.min.js",
        BASE + "lib/jquery/jquery.min.js",
        BASE + "lib/jquery-ui/ui/minified/jquery-ui.min.js",

        BASE + "lib/PreloadJS/lib/preloadjs-0.6.0.min.js",
        BASE + "lib/EaselJS/lib/easeljs-0.8.0.min.js",
        BASE + "lib/SoundJS/lib/soundjs-0.6.0.min.js",

        BASE + "lib/SoundJS/lib/flashaudioplugin-0.6.0.min.js", // optional

        BASE + "lib/velocity/velocity.min.js",

        BASE + "lib/codemirror/codemirror.js",
        BASE + "lib/codemirror/vim.js", // optional

        // ✅ React/ReactDOM (필수)
        BASE + "lib/react/react.production.min.js",
        BASE + "lib/react/react-dom.production.min.js",

        BASE + "lib/entry-tool/dist/entry-tool.js",

        BASE + "lib/entryjs/extern/lang/ko.js",
        BASE + "lib/entryjs/extern/util/static.js",
        BASE + "lib/entryjs/extern/util/handle.js",
        BASE + "lib/entryjs/extern/util/bignumber.min.js",
        BASE + "lib/module/legacy-video/index.js",

        // sound-editor는 있으면 로드, 없으면 stub로 대체
        BASE + "lib/external/sound/sound-editor.js",

        // ✅ entry.min.js 로드 직전에 stub 보장
        "__ENSURE_SOUND_STUB__",

        BASE + "lib/entryjs/dist/entry.min.js",
        BASE + "lib/entry-paint/dist/static/js/entry-paint.js",
      ];

      for (const src of jsList) {
        if (src === "__ENSURE_SOUND_STUB__") {
          ensureEntrySoundEditorStub();
          bootLine("PATCH EntrySoundEditor: stub ensured (render/regist*)", "ok");
          continue;
        }
        const optional = src.includes("flashaudioplugin") || src.includes("vim.js");
        const r = await loadJS(src);
        bootLine((r.ok ? "OK   JS   " : (optional ? "MISS(opt) " : "MISS     ")) + src,
          r.ok ? "ok" : (optional ? "dim" : "bad"));

        // lodash patch (Entry 구버전 호환)
        if (src.includes("/lodash.min.js") && window._) {
          if (typeof _.contains !== "function") _.contains = _.includes;
          if (typeof _.findWhere !== "function") _.findWhere = (arr, attrs) =>
            _.find(arr, (o) => _.every(attrs, (v,k)=>o && o[k]===v));
          bootLine("PATCH lodash: _.contains/_.findWhere ok", "ok");
        }

        // EntryStatic local path patch
        if (src.endsWith("/extern/util/static.js") && window.EntryStatic) {
          try {
            // 절대경로(/)로 박혀있으면 로컬 BASE로 교정
            if (typeof EntryStatic.imagePath === "string" && EntryStatic.imagePath.startsWith("/")) {
              EntryStatic.imagePath = BASE + EntryStatic.imagePath.replace(/^\//, "");
            }
            if (typeof EntryStatic.mediaPath === "string" && EntryStatic.mediaPath.startsWith("/")) {
              EntryStatic.mediaPath = BASE + EntryStatic.mediaPath.replace(/^\//, "");
            }
            // 기본값도 로컬로 강제
            if (!EntryStatic.imagePath) EntryStatic.imagePath = BASE + "lib/entryjs/images/";
            if (!EntryStatic.mediaPath) EntryStatic.mediaPath = BASE + "lib/entryjs/media/";
            bootLine("PATCH EntryStatic.imagePath/mediaPath -> local", "ok");
          } catch(_) {}
        }
      }

      // 글로벌 체크
      bootLine("_.memoize = " + (window._ ? typeof _.memoize : "N/A"), window._ ? "ok" : "bad");
      bootLine("$.fn.jquery = " + (window.$ && $.fn ? $.fn.jquery : "N/A"), (window.$ && $.fn) ? "ok" : "bad");
      bootLine("createjs = " + (typeof window.createjs), window.createjs ? "ok" : "bad");
      bootLine("Lang = " + (typeof window.Lang), window.Lang ? "ok" : "bad");
      bootLine("EntryTool = " + (typeof window.EntryTool), window.EntryTool ? "ok" : "bad");
      bootLine("EntryVideoLegacy = " + (typeof window.EntryVideoLegacy), window.EntryVideoLegacy ? "ok" : "bad");
      bootLine("EntryStatic = " + (typeof window.EntryStatic), window.EntryStatic ? "ok" : "bad");
      bootLine("React = " + (typeof window.React), window.React ? "ok" : "bad");
      bootLine("ReactDOM = " + (typeof window.ReactDOM), window.ReactDOM ? "ok" : "bad");
      bootLine("EntrySoundEditor = " + (typeof window.EntrySoundEditor), window.EntrySoundEditor ? "ok" : "bad");
      bootLine("Entry.init = " + (window.Entry ? typeof window.Entry.init : "N/A"),
        (window.Entry && typeof window.Entry.init === "function") ? "ok" : "bad");

      must(window._, "lodash(_)");
      must(window.$, "jQuery($)");
      must(window.createjs, "createjs");
      must(window.Lang, "Lang");
      must(window.EntryTool, "EntryTool");
      must(window.EntryVideoLegacy, "EntryVideoLegacy");
      must(window.EntryStatic, "EntryStatic");
      must(window.EntrySoundEditor, "EntrySoundEditor");
      must(window.Entry && typeof window.Entry.init === "function", "Entry.init");

      bootLine("Starting Entry.init …", "dim");

      Entry.init(document.getElementById("entryContainer"), {
        type: "workspace",
        libDir: BASE + "lib",
        textCodingEnable: true
      });

      Entry.loadProject();
      document.getElementById("boot").remove();
    }

    document.addEventListener("DOMContentLoaded", () => {
      boot().catch(e => {
        bootLine("Boot Error", "bad");
        bootLine(String(e && e.stack ? e.stack : e), "bad");
      });
    });
  </script>
</head>
<body>
  <div id="entryContainer"></div>
  <div id="boot">Entry Offline Editor\nLoading…</div>
</body>
</html>
